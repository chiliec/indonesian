    audio: eb8c4418383f.ogg
    note:
      en: "'Dinaikkan' is passive voice meaning 'to be raised/taken up'; related to
        'naik' (to go up) and 'menaikkan' (to raise something)."
    sentences:
      - id: module-6-0181-s1
        text: Barang itu dinaikkan ke atas truk.
        blank: dinaikkan
        en: The goods were lifted up onto the truck.
      - id: module-6-0181-s2
        text: Anak itu dinaikkan ke atas bahu ayah.
        blank: dinaikkan
        en: The child was lifted up onto father's shoulders.
  - id: module-6-0182
    indonesian: dikunjungi
    english: to be visited
    audio: 21454a24a26e.ogg
    note:
      en: "'dikunjungi' is passive form of 'kunjungi' (to visit); used when a place
        receives visitors, common in formal and everyday speech."
    sentences:
      - id: module-6-0182-s1
        text: Pantai ini sering dikunjungi oleh wisatawan.
        blank: dikunjungi
        en: This beach is often visited by tourists.
      - id: module-6-0182-s2
        text: Pura itu dikunjungi banyak orang setiap hari.
        blank: dikunjungi
        en: That temple is visited by many people every day.
      - id: module-6-0182-s3
        text: Pasar ini dikunjungi ibu-ibu setiap pagi.
        blank: dikunjungi
        en: This market is visited by mothers every morning.
  - id: module-6-0183
    indonesian: diturunkan
    english: to be lowered
    audio: 164e05269e68.ogg
    note:
      en: '"Diturunkan" is the passive form of "turunkan" (to lower/bring down);
        commonly used for prices, volumes, or objects being moved down.'
    sentences:
      - id: module-6-0183-s1
        text: Harga tiket diturunkan oleh pemerintah.
        blank: diturunkan
        en: The ticket price was lowered by the government.
      - id: module-6-0183-s2
        text: Volume musik diturunkan karena sudah malam.
        blank: diturunkan
        en: The music volume was lowered because it was already night.
      - id: module-6-0183-s3
        text: Barang berat itu diturunkan dari truk.
        blank: diturunkan
        en: The heavy goods were lowered from the truck.
  - id: module-6-0184
    indonesian: filsafat
    english: philosophy
    audio: b15a3a9e302e.ogg
    note:
      en: "'Filsafat' means philosophy as an academic subject; commonly used in
        university contexts; related word: 'filosof' (philosopher)."
    sentences:
      - id: module-6-0184-s1
        text: Dia belajar filsafat di universitas.
        blank: filsafat
        en: He studies philosophy at university.
      - id: module-6-0184-s2
        text: Filsafat adalah pelajaran yang menarik.
        blank: filsafat
        en: Philosophy is an interesting subject.
      - id: module-6-0184-s3
        text: Saya suka buku tentang filsafat.
        blank: filsafat
        en: I like books about philosophy.
  - id: module-6-0185
    indonesian: Hindia Belanda
    english: The Netherlands East Indies
    audio: 910a8c91904e.ogg
    note:
      en: "'Hindia Belanda' is a formal/historical term for the Dutch colonial name of
        Indonesia; often seen in history books, not everyday speech."
    sentences:
      - id: module-6-0185-s1
        text: Dulu Indonesia disebut Hindia Belanda.
        blank: Hindia Belanda
        en: In the past, Indonesia was called the Netherlands East Indies.
      - id: module-6-0185-s2
        text: Hindia Belanda adalah nama lama Indonesia.
        blank: Hindia Belanda
        en: The Netherlands East Indies is the old name of Indonesia.
  - id: module-6-0186
    indonesian: istana
    english: a palace
    audio: aee2b467268f.ogg
    note:
      en: "'Istana' means palace or royal residence; often seen in place names like
        Istana Negara (State Palace); not to be confused with 'rumah' (house) or
        'gedung' (building)."
    sentences:
      - id: module-6-0186-s1
        text: Istana itu sangat besar dan indah.
        blank: Istana
        en: That palace is very big and beautiful.
      - id: module-6-0186-s2
        text: Kami melihat istana dari luar.
        blank: istana
        en: We saw the palace from outside.
      - id: module-6-0186-s3
        text: Raja tinggal di dalam istana.
        blank: istana
        en: The king lives inside the palace.
  - id: module-6-0187
    indonesian: jatuh
    english: to fall
    audio: ce78bbe1ad5b.ogg
    note:
      en: '"Jatuh" means to fall physically; also used in "jatuh cinta" (to fall in
        love); informal everyday register.'
    sentences:
      - id: module-6-0187-s1
        text: Anak itu jatuh di jalan.
        blank: jatuh
        en: That child fell on the road.
      - id: module-6-0187-s2
        text: Buah mangga jatuh dari pohon.
        blank: jatuh
        en: The mango fell from the tree.
      - id: module-6-0187-s3
        text: Hati-hati, lantainya licin dan mudah jatuh.
        blank: jatuh
        en: Be careful, the floor is slippery and easy to fall on.
  - id: module-6-0188
    indonesian: kelihatan
    english: visible
    audio: 094e129dbc17.ogg
    note:
      en: "\"Kelihatan\" means 'visible' or 'can be seen'; related to \"lihat\" (to
        see); often interchangeable with \"terlihat\" in casual speech."
    sentences:
      - id: module-6-0188-s1
        text: Gunung itu kelihatan dari sini.
        blank: kelihatan
        en: The mountain is visible from here.
      - id: module-6-0188-s2
        text: Dia kelihatan senang hari ini.
        blank: kelihatan
        en: She looks happy today.
      - id: module-6-0188-s3
        text: Bintang tidak kelihatan malam ini.
        blank: kelihatan
        en: The stars are not visible tonight.
  - id: module-6-0189
    indonesian: pemandu wisata
    english: tour guide
    audio: 0a652079a70f.ogg
    note:
      en: "'Pemandu wisata' means tour guide; 'pemandu' alone can mean guide/leader,
        and 'wisata' means tourism — commonly heard at tourist sites in Bali and
        Java."
    sentences:
      - id: module-6-0189-s1
        text: Pemandu wisata kami sangat ramah dan baik.
        blank: pemandu wisata
        en: Our tour guide is very friendly and kind.
      - id: module-6-0189-s2
        text: Saya ingin menjadi pemandu wisata di Bali.
        blank: pemandu wisata
        en: I want to become a tour guide in Bali.
      - id: module-6-0189-s3
        text: Pemandu wisata itu berbicara bahasa Inggris.
        blank: pemandu wisata
        en: That tour guide speaks English.
  - id: module-6-0190
    indonesian: perang
    english: war
    audio: a36145970d25.ogg
    note:
      en: "'Perang' means 'war'; common in news and history contexts; related words:
        'berperang' (to wage war), 'pertempuran' (battle)."
    sentences:
      - id: module-6-0190-s1
        text: Buku itu bercerita tentang perang dunia.
        blank: perang
        en: That book tells a story about world war.
      - id: module-6-0190-s2
        text: Perang membuat banyak orang sedih.
        blank: perang
        en: War makes many people sad.
  - id: module-6-0191
    indonesian: pohon beringin
    english: a banyan tree
    audio: 193eca917b55.ogg
    note:
      en: "'Pohon beringin' means banyan tree; 'pohon' means tree in general, so
        'pohon mangga' = mango tree; banyan trees are sacred and common in Bali
        temple yards."
    sentences:
      - id: module-6-0191-s1
        text: Ada pohon beringin besar di sana.
        blank: pohon beringin
        en: There is a big banyan tree over there.
      - id: module-6-0191-s2
        text: Anak-anak bermain di bawah pohon beringin.
        blank: pohon beringin
        en: The children play under the banyan tree.
  - id: module-6-0192
    indonesian: ribuan
    english: thousands
    audio: 3ab368eb2d64.ogg
    note:
      en: "'Ribuan' means 'thousands of' and is used before nouns; related words:
        ratus (hundreds), jutaan (millions); common in markets and crowds."
    sentences:
      - id: module-6-0192-s1
        text: Ada ribuan orang di pasar itu.
        blank: ribuan
        en: There are thousands of people at that market.
      - id: module-6-0192-s2
        text: Ribuan turis datang ke Bali setiap tahun.
        blank: ribuan
        en: Thousands of tourists come to Bali every year.
      - id: module-6-0192-s3
        text: Harganya ribuan rupiah saja.
        blank: ribuan
        en: The price is just thousands of rupiah.
  - id: module-6-0193
    indonesian: sebuah
    english: a, one
    audio: e9530019d013.ogg
    note:
      en: '"Sebuah" is used before singular nouns for objects; it is the
        formal/written form of "satu" as an article, similar to "a" or "an" in
        English.'
    sentences:
      - id: module-6-0193-s1
        text: Saya membeli sebuah buku di toko.
        blank: sebuah
        en: I bought a book at the store.
      - id: module-6-0193-s2
        text: Ini sebuah warung yang enak.
        blank: sebuah
        en: This is a restaurant that is delicious.
      - id: module-6-0193-s3
        text: Dia punya sebuah sepeda baru.
        blank: sebuah
        en: She has a new bicycle.
  - id: module-6-0194
    indonesian: terdapat
    english: is to be found at/in/among
    audio: e270f13e6fea.ogg
    note:
      en: '"Terdapat" is formal/written Indonesian for "there is/are" or "can be
        found"; in everyday speech, "ada" is more common, but "terdapat" appears
        often in signs, textbooks, and descriptions.'
    sentences:
      - id: module-6-0194-s1
        text: Di pantai ini terdapat banyak ikan.
        blank: terdapat
        en: At this beach, there are many fish.
      - id: module-6-0194-s2
        text: Di pasar terdapat banyak buah segar.
        blank: terdapat
        en: At the market, there is a lot of fresh fruit.
      - id: module-6-0194-s3
        text: Terdapat warung kecil di dekat hotel.
        blank: terdapat
        en: There is a small food stall near the hotel.
  - id: module-6-0195
    indonesian: zaman
    english: an age, an era
    audio: 1d2c2f28bd39.ogg
    note:
      en: '"Zaman" means a period/era in history or life; often heard in "zaman dulu"
        (old times) or "zaman sekarang" (nowadays); not to be confused with
        "waktu" (time) or "masa" (period/time).'
    sentences:
      - id: module-6-0195-s1
        text: Zaman dulu, orang naik kuda ke pasar.
        blank: Zaman
        en: In the old days, people rode horses to the market.
      - id: module-6-0195-s2
        text: Zaman sekarang, semua orang punya ponsel.
        blank: Zaman
        en: Nowadays, everyone has a mobile phone.
      - id: module-6-0195-s3
        text: Ini cerita dari zaman raja-raja dulu.
        blank: zaman
        en: This is a story from the era of ancient kings.
  - id: module-6-0196
    indonesian: berjuta-juta
    english: millions
    audio: 8d41c8036177.ogg
    note:
      en: "'berjuta-juta' means 'millions' and is used for very large numbers; related
        to 'juta' (one million); common in everyday speech to express huge
        quantities."
    sentences:
      - id: module-6-0196-s1
        text: Berjuta-juta orang tinggal di Jakarta.
        blank: Berjuta-juta
        en: Millions of people live in Jakarta.
      - id: module-6-0196-s2
        text: Ada berjuta-juta bintang di langit.
        blank: berjuta-juta
        en: There are millions of stars in the sky.
      - id: module-6-0196-s3
        text: Bali dikunjungi berjuta-juta turis setiap tahun.
        blank: berjuta-juta
        en: Bali is visited by millions of tourists every year.
  - id: module-6-0197
    indonesian: puncak
    english: a peak
    audio: 546b70842dfb.ogg
    note:
      en: "'Puncak' means peak or summit (of a mountain) but also means 'peak' in
        time, e.g. peak season; related: 'gunung' (mountain), 'atas'
        (top/above)."
    sentences:
      - id: module-6-0197-s1
        text: Kami naik ke puncak gunung itu.
        blank: puncak
        en: We climbed to the top of that mountain.
      - id: module-6-0197-s2
        text: Pemandangan dari puncak sangat indah.
        blank: puncak
        en: The view from the peak is very beautiful.
      - id: module-6-0197-s3
        text: Ini adalah puncak musim hujan.
        blank: puncak
        en: This is the peak of the rainy season.
  - id: module-6-0198
    indonesian: pusat perbelanjaan
    english: a shopping centre
    audio: 71e9fdd54809.ogg
    note:
      en: '"Pusat perbelanjaan" is the formal/standard term for a shopping centre or
        mall; in casual speech Indonesians often just say "mal" (mall).'
    sentences:
      - id: module-6-0198-s1
        text: Saya pergi ke pusat perbelanjaan hari ini.
        blank: pusat perbelanjaan
        en: I am going to the shopping centre today.
      - id: module-6-0198-s2
        text: Pusat perbelanjaan itu sangat besar.
        blank: pusat perbelanjaan
        en: That shopping centre is very big.
      - id: module-6-0198-s3
        text: Ibu membeli baju di pusat perbelanjaan.
        blank: pusat perbelanjaan
        en: Mum buys clothes at the shopping centre.
  - id: module-6-0199
    indonesian: seluruh
    english: the entire, the whole
    audio: 900ca72fec70.ogg
    note:
      en: "'seluruh' means 'the entire/whole' and is used before nouns; similar to
        'semua' (all) but 'seluruh' emphasizes totality of a single thing"
    sentences:
      - id: module-6-0199-s1
        text: Seluruh keluarga makan malam bersama.
        blank: Seluruh
        en: The whole family eats dinner together.
      - id: module-6-0199-s2
        text: Dia membersihkan seluruh rumah hari ini.
        blank: seluruh
        en: She cleans the entire house today.
      - id: module-6-0199-s3
        text: Seluruh siswa hadir di kelas.
        blank: Seluruh
        en: All the students are present in class.
  - id: module-6-0200
    indonesian: suasana
    english: the atmosphere (of a place)
    audio: 10799ce7b87b.ogg
    note:
      en: "'Suasana' means the feel or atmosphere of a place/event; related to
        'nuansa' (nuance) but more everyday; used for both lively and calm
        settings."
    sentences:
      - id: module-6-0200-s1
        text: Suasana pantai ini sangat tenang dan indah.
        blank: Suasana
        en: The atmosphere of this beach is very calm and beautiful.
      - id: module-6-0200-s2
        text: Saya suka suasana pasar pagi hari.
        blank: suasana
        en: I like the atmosphere of the morning market.
      - id: module-6-0200-s3
        text: Suasana restoran ini sangat nyaman.
        blank: Suasana
        en: The atmosphere of this restaurant is very comfortable.
  - id: module-6-0201
    indonesian: tempat makan
    english: a place to eat, food court
    audio: 5056834ec511.ogg
    note:
      en: "'Tempat makan' is casual everyday speech for any eating spot; 'restoran' is
        more formal, while 'warung' is a small local stall."
    sentences:
      - id: module-6-0201-s1
        text: Di mana ada tempat makan yang murah?
        blank: tempat makan
        en: Where is there a cheap place to eat?
      - id: module-6-0201-s2
        text: Tempat makan ini sangat ramai.
        blank: tempat makan
        en: This place to eat is very crowded.
      - id: module-6-0201-s3
        text: Saya cari tempat makan dekat hotel.
        blank: tempat makan
        en: I am looking for a place to eat near the hotel.
  - id: module-6-0202
    indonesian: yakin
    english: to feel/be sure (that)
    audio: 7b04dac999d3.ogg
    note:
      en: '"Yakin" means to feel sure or certain; often used in questions like "Kamu
        yakin?" (Are you sure?); related to "percaya" (to believe/trust) but
        yakin emphasizes personal certainty.'
    sentences:
      - id: module-6-0202-s1
        text: Kamu yakin mau pergi ke pantai?
        blank: yakin
        en: Are you sure you want to go to the beach?
      - id: module-6-0202-s2
        text: Saya yakin dia ada di rumah.
        blank: yakin
        en: I am sure he is at home.
      - id: module-6-0202-s3
        text: Kami tidak yakin tentang harganya.
        blank: yakin
        en: We are not sure about the price.
