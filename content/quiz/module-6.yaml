id: module-6
title:
  en: Module 6
cards:
  - id: module-6-0001
    indonesian: agak
    english: rather
    audio: 0526de303974.ogg
    note:
      en: '"Agak" means "rather/somewhat/a bit" and softens adjectives; similar to
        "sedikit" but more common in speech.'
    sentences:
      - id: module-6-0001-s1
        text: Cuaca hari ini agak panas.
        blank: agak
        en: The weather today is rather hot.
      - id: module-6-0001-s2
        text: Makanan ini agak pedas bagi saya.
        blank: agak
        en: This food is rather spicy for me.
      - id: module-6-0001-s3
        text: Jalannya agak jauh dari sini.
        blank: agak
        en: The road is rather far from here.
  - id: module-6-0002
    indonesian: barat daya
    english: south west
    audio: 3d2e3e76e1cf.ogg
    note:
      en: "'Barat daya' means southwest; it combines 'barat' (west) and 'daya' (south
        in compass terms); used in directions and weather forecasts."
    sentences:
      - id: module-6-0002-s1
        text: Angin datang dari arah barat daya hari ini.
        blank: barat daya
        en: The wind comes from the southwest direction today.
      - id: module-6-0002-s2
        text: Pantai itu ada di barat daya Bali.
        blank: barat daya
        en: That beach is in the southwest of Bali.
  - id: module-6-0003
    indonesian: barat laut
    english: north west
    audio: 7312e5903147.ogg
    note:
      en: "'Barat laut' means northwest; combine 'barat' (west) and 'laut' (sea/north
        in compass context) — not to be confused with 'laut' meaning 'sea'
        alone."
    sentences:
      - id: module-6-0003-s1
        text: Angin datang dari arah barat laut.
        blank: barat laut
        en: The wind comes from the northwest direction.
      - id: module-6-0003-s2
        text: Desa itu ada di barat laut Bali.
        blank: barat laut
        en: That village is in the northwest of Bali.
      - id: module-6-0003-s3
        text: Kami pergi ke barat laut kota.
        blank: barat laut
        en: We go to the northwest of the city.
  - id: module-6-0004
    indonesian: baru-baru ini
    english: recently
    audio: 14fe38fce1bb.ogg
    note:
      en: "'Baru-baru ini' means 'recently' and is used in everyday speech; do not
        confuse with 'baru' alone which means 'new' or 'just'."
    sentences:
      - id: module-6-0004-s1
        text: Baru-baru ini saya pergi ke pantai.
        blank: Baru-baru ini
        en: Recently I went to the beach.
      - id: module-6-0004-s2
        text: Dia baru-baru ini beli sepeda baru.
        blank: baru-baru ini
        en: He recently bought a new bicycle.
      - id: module-6-0004-s3
        text: Baru-baru ini cuaca di Bali panas.
        blank: Baru-baru ini
        en: Recently the weather in Bali has been hot.
  - id: module-6-0005
    indonesian: camat
    english: the head of a sub-district
    audio: cef5e38c1775.ogg
    note:
      en: "'Camat' is a formal/official title for the head of a kecamatan
        (sub-district); often used with 'Pak' or 'Bu' as a respectful address."
    sentences:
      - id: module-6-0005-s1
        text: Pak camat datang ke kantor hari ini.
        blank: camat
        en: The sub-district head comes to the office today.
      - id: module-6-0005-s2
        text: Ibu camat sangat baik kepada warga.
        blank: camat
        en: The sub-district head is very kind to the residents.
      - id: module-6-0005-s3
        text: Surat itu harus ditandatangani oleh camat.
        blank: camat
        en: That letter must be signed by the sub-district head.
  - id: module-6-0006
    indonesian: iklim
    english: climate
    audio: f1be4be44d36.ogg
    note:
      en: "'Iklim' means climate (long-term weather patterns); don't confuse with
        'cuaca' (daily weather); often used in phrases like 'iklim tropis'
        (tropical climate)."
    sentences:
      - id: module-6-0006-s1
        text: Indonesia memiliki iklim tropis yang panas.
        blank: iklim
        en: Indonesia has a hot tropical climate.
      - id: module-6-0006-s2
        text: Iklim di Bali sangat hangat.
        blank: Iklim
        en: The climate in Bali is very warm.
      - id: module-6-0006-s3
        text: Kami belajar tentang iklim di sekolah.
        blank: iklim
        en: We learn about climate at school.
  - id: module-6-0007
    indonesian: jalan layang
    english: a fly over
    audio: 45e646c559cd.ogg
    note:
      en: '"Jalan layang" literally means "flying road" and refers to an elevated
        highway or flyover bridge; commonly used in city traffic contexts, not
        to be confused with "jembatan" (bridge) which crosses water.'
    sentences:
      - id: module-6-0007-s1
        text: Mobil itu lewat di jalan layang.
        blank: jalan layang
        en: That car passes on the flyover.
      - id: module-6-0007-s2
        text: Jalan layang ini ada di Jakarta.
        blank: jalan layang
        en: This flyover is in Jakarta.
      - id: module-6-0007-s3
        text: Kita naik jalan layang sekarang.
        blank: jalan layang
        en: We are going up the flyover now.
  - id: module-6-0008
    indonesian: kawasan
    english: a region, an area
    audio: 7d7eb42ef321.ogg
    note:
      en: "'Kawasan' means a defined region or zone (e.g. tourist area, industrial
        area); more formal than 'daerah' or 'tempat', often seen on signs and in
        official contexts."
    sentences:
      - id: module-6-0008-s1
        text: Ini adalah kawasan wisata yang terkenal.
        blank: kawasan
        en: This is a famous tourist area.
      - id: module-6-0008-s2
        text: Dilarang merokok di kawasan ini.
        blank: kawasan
        en: Smoking is not allowed in this area.
      - id: module-6-0008-s3
        text: Kawasan pantai itu sangat indah.
        blank: kawasan
        en: That beach area is very beautiful.
  - id: module-6-0009
    indonesian: kecamatan
    english: a sub-district
    audio: f72e85b592ca.ogg
    note:
      en: "'Kecamatan' is a formal administrative term for a sub-district, one level
        below a kabupaten (regency); commonly used when filling out forms or
        giving an address."
    sentences:
      - id: module-6-0009-s1
        text: Rumah saya ada di kecamatan Ubud.
        blank: kecamatan
        en: My house is in Ubud sub-district.
      - id: module-6-0009-s2
        text: Kantor kecamatan ini buka setiap hari.
        blank: kecamatan
        en: This sub-district office is open every day.
      - id: module-6-0009-s3
        text: Kami tinggal di kecamatan yang sama.
        blank: kecamatan
        en: We live in the same sub-district.
  - id: module-6-0010
    indonesian: makam
    english: a grave, a tomb
    audio: 2ba97f2186e0.ogg
    note:
      en: "'Makam' means a grave or tomb; not to be confused with 'makan' (to eat) —
        note the final 'm' vs 'n'."
    sentences:
      - id: module-6-0010-s1
        text: Kami mengunjungi makam nenek hari ini.
        blank: makam
        en: We are visiting grandmother's grave today.
      - id: module-6-0010-s2
        text: Ada bunga di depan makam itu.
        blank: makam
        en: There are flowers in front of that tomb.
      - id: module-6-0010-s3
        text: Makam itu ada di dekat pohon besar.
        blank: makam
        en: The grave is near the big tree.
  - id: module-6-0011
    indonesian: mata angin
    english: the points of the compass
    audio: 7f06203b1168.ogg
    note:
      en: "\"Mata angin\" literally means 'eye of the wind' and refers to the
        cardinal/compass directions (north, south, east, west); commonly used in
        navigation, maps, and giving directions in Indonesia."
    sentences:
      - id: module-6-0011-s1
        text: Ada delapan mata angin di kompas.
        blank: mata angin
        en: There are eight points of the compass on a compass.
      - id: module-6-0011-s2
        text: Guru mengajar mata angin kepada murid.
        blank: mata angin
        en: The teacher teaches the points of the compass to the students.
      - id: module-6-0011-s3
        text: Saya belajar mata angin dari peta.
        blank: mata angin
        en: I learn the points of the compass from a map.
  - id: module-6-0012
    indonesian: monumen
    english: monument
    audio: ac329555bdc0.ogg
    note:
      en: "'Monumen' is a neutral formal noun borrowed from Dutch/English; often seen
        in city names like 'Monumen Nasional' (Monas) in Jakarta."
    sentences:
      - id: module-6-0012-s1
        text: Monumen itu sangat tinggi dan besar.
        blank: Monumen
        en: That monument is very tall and big.
      - id: module-6-0012-s2
        text: Kami foto di depan monumen nasional.
        blank: monumen
        en: We took a photo in front of the national monument.
      - id: module-6-0012-s3
        text: Ada monumen baru di kota kami.
        blank: monumen
        en: There is a new monument in our city.
  - id: module-6-0013
    indonesian: pahlawan
    english: a hero
    audio: dda626cea81f.ogg
    note:
      en: "'Pahlawan' means hero or national hero; often used for historical freedom
        fighters (pahlawan nasional), and sometimes informally for everyday
        heroes; related: 'kepahlawanan' (heroism)."
    sentences:
      - id: module-6-0013-s1
        text: Ayah saya adalah pahlawan bagi keluarga kami.
        blank: pahlawan
        en: My father is a hero for our family.
      - id: module-6-0013-s2
        text: Anak itu mimpi menjadi seorang pahlawan.
        blank: pahlawan
        en: That child dreams of becoming a hero.
      - id: module-6-0013-s3
        text: Buku ini tentang pahlawan Indonesia.
        blank: pahlawan
        en: This book is about Indonesian heroes.
  - id: module-6-0014
    indonesian: tenggara
    english: south east
    audio: cfcc320f4d62.ogg
    note:
      en: "'Tenggara' means 'south east' and is used in compass directions; often seen
        in place names like 'Sulawesi Tenggara'; not to be confused with
        'selatan' (south) or 'timur' (east)."
    sentences:
      - id: module-6-0014-s1
        text: Bali ada di tenggara Jawa.
        blank: tenggara
        en: Bali is to the south east of Java.
      - id: module-6-0014-s2
        text: Angin datang dari arah tenggara.
        blank: tenggara
        en: The wind comes from the south east direction.
  - id: module-6-0015
    indonesian: tepi
    english: the edge
    audio: 72391163a120.ogg
    note:
      en: "\"Tepi\" means edge or side (e.g. of a road, river, or table); commonly
        paired with 'jalan' (road) or 'sungai' (river); do not confuse with
        'pinggir' which is a close synonym."
    sentences:
      - id: module-6-0015-s1
        text: Anak itu duduk di tepi sungai.
        blank: tepi
        en: The child is sitting at the edge of the river.
      - id: module-6-0015-s2
        text: Tolong parkir di tepi jalan.
        blank: tepi
        en: Please park on the side of the road.
      - id: module-6-0015-s3
        text: Bunga itu ada di tepi meja.
        blank: tepi
        en: The flower is at the edge of the table.
  - id: module-6-0016
    indonesian: timur laut
    english: north east
    audio: 0dcd9fdcb6cc.ogg
    note:
      en: "\"Timur laut\" means northeast (a compass direction); don't confuse with
        \"laut\" (sea) alone or \"timur\" (east) alone."
    sentences:
      - id: module-6-0016-s1
        text: Bali ada di timur laut Jawa.
        blank: timur laut
        en: Bali is to the northeast of Java.
      - id: module-6-0016-s2
        text: Angin datang dari arah timur laut.
        blank: timur laut
        en: The wind comes from the northeast direction.
      - id: module-6-0016-s3
        text: Pantai itu ada di timur laut desa.
        blank: timur laut
        en: That beach is to the northeast of the village.
  - id: module-6-0017
    indonesian: timur
    english: east, eastern
    audio: 42a82eebd7f9.ogg
    note:
      en: "'Timur' means 'east' or 'eastern'; often seen in place names like 'Nusa
        Tenggara Timur'; do not confuse with 'timun' (cucumber)."
    sentences:
      - id: module-6-0017-s1
        text: Matahari terbit di sebelah timur.
        blank: timur
        en: The sun rises in the east.
      - id: module-6-0017-s2
        text: Angin datang dari arah timur.
        blank: timur
        en: The wind comes from the eastern direction.
  - id: module-6-0018
    indonesian: utara
    english: north, northern
    audio: 53fae8a15a03.ogg
    note:
      en: "'Utara' means 'north' or 'northern'; used in directions and place names;
        opposite is 'selatan' (south); common in addresses and navigation."
    sentences:
      - id: module-6-0018-s1
        text: Rumah saya ada di utara desa.
        blank: utara
        en: My house is in the north of the village.
      - id: module-6-0018-s2
        text: Pantai itu ada di bagian utara Bali.
        blank: utara
        en: That beach is in the northern part of Bali.
      - id: module-6-0018-s3
        text: Angin dari utara terasa sangat dingin.
        blank: utara
        en: The wind from the north feels very cold.
  - id: module-6-0019
    indonesian: berangin
    english: windy
    audio: f5417631f39a.ogg
    note:
      en: "'Berangin' means 'windy'; formed from 'angin' (wind) + prefix 'ber-'; used
        to describe weather, not confused with 'angin' alone which just means
        'wind'."
    sentences:
      - id: module-6-0019-s1
        text: Hari ini sangat berangin di pantai.
        blank: berangin
        en: Today is very windy at the beach.
      - id: module-6-0019-s2
        text: Cuaca berangin, pakai jaket ya.
        blank: berangin
        en: The weather is windy, wear a jacket.
      - id: module-6-0019-s3
        text: Saya suka hari yang berangin.
        blank: berangin
        en: I like windy days.
  - id: module-6-0020
    indonesian: berawan
    english: cloudy
    audio: 4a3cf6c87d9d.ogg
    note:
      en: '"Berawan" describes cloudy weather; related to "awan" (cloud); often paired
        with "cuaca" (weather), e.g. "cuaca berawan".'
    sentences:
      - id: module-6-0020-s1
        text: Hari ini cuaca berawan dan sejuk.
        blank: berawan
        en: Today the weather is cloudy and cool.
      - id: module-6-0020-s2
        text: Langit berawan, mungkin akan hujan.
        blank: berawan
        en: The sky is cloudy, it might rain.
      - id: module-6-0020-s3
        text: Cuaca berawan cocok untuk jalan-jalan.
        blank: berawan
        en: Cloudy weather is great for walking around.
  - id: module-6-0021
    indonesian: celsius
    english: celsius, centigrade
    audio: 5d1d57924d5e.ogg
    note:
      en: "'Celsius' is used in Indonesian just like in English; Indonesians always
        use Celsius (not Fahrenheit) for temperature."
    sentences:
      - id: module-6-0021-s1
        text: Suhu hari ini tiga puluh derajat celsius.
        blank: celsius
        en: The temperature today is thirty degrees Celsius.
      - id: module-6-0021-s2
        text: Air mendidih pada seratus derajat celsius.
        blank: celsius
        en: Water boils at one hundred degrees Celsius.
      - id: module-6-0021-s3
        text: Demamku empat puluh derajat celsius.
        blank: celsius
        en: My fever is forty degrees Celsius.
  - id: module-6-0022
    indonesian: derajat
    english: a degree of temperature
    audio: bbd1a7698508.ogg
    note:
      en: "\"Derajat\" means a degree of temperature; often used with numbers (e.g.,
        37 derajat); not to be confused with its other meaning 'degree of
        status/rank'."
    sentences:
      - id: module-6-0022-s1
        text: Suhu hari ini tiga puluh derajat.
        blank: derajat
        en: The temperature today is thirty degrees.
      - id: module-6-0022-s2
        text: Badanku panas, tiga puluh delapan derajat.
        blank: derajat
        en: My body is hot, thirty-eight degrees.
      - id: module-6-0022-s3
        text: Air ini sangat panas, seratus derajat.
        blank: derajat
        en: This water is very hot, one hundred degrees.
  - id: module-6-0023
    indonesian: hujan
    english: rain
    audio: 2dca4767e031.ogg
    note:
      en: "'Hujan' means rain; commonly used in 'hujan deras' (heavy rain) and 'musim
        hujan' (rainy season); not to be confused with 'angin' (wind)."
    sentences:
      - id: module-6-0023-s1
        text: Hari ini hujan sangat deras.
        blank: hujan
        en: Today the rain is very heavy.
      - id: module-6-0023-s2
        text: Saya tidak keluar karena hujan.
        blank: hujan
        en: I am not going out because of the rain.
      - id: module-6-0023-s3
        text: Bawa payung, nanti hujan.
        blank: hujan
        en: Bring an umbrella, it might rain later.
  - id: module-6-0024
    indonesian: inilah
    english: this is ...
    audio: f07b4b4125a6.ogg
    note:
      en: "'Inilah' emphasises 'this is (the one)'; more emphatic than 'ini', used to
        present or point out something important; related: 'itulah' (that
        is...), 'inilah' cannot be split."
    sentences:
      - id: module-6-0024-s1
        text: Inilah rumah saya di Bali.
        blank: Inilah
        en: This is my house in Bali.
      - id: module-6-0024-s2
        text: Inilah makanan favorit saya.
        blank: Inilah
        en: This is my favourite food.
      - id: module-6-0024-s3
        text: Inilah teman baru saya.
        blank: Inilah
        en: This is my new friend.
  - id: module-6-0025
    indonesian: kering
    english: dry
    audio: 1d15084e5cd9.ogg
    note:
      en: "'Kering' means dry (opposite of 'basah'/wet); used for weather, clothes,
        food, and skin; common phrase 'musim kering' means dry season."
    sentences:
      - id: module-6-0025-s1
        text: Baju saya sudah kering sekarang.
        blank: kering
        en: My clothes are already dry now.
      - id: module-6-0025-s2
        text: Cuaca hari ini sangat kering.
        blank: kering
        en: The weather today is very dry.
      - id: module-6-0025-s3
        text: Kulitku kering karena matahari panas.
        blank: kering
        en: My skin is dry because of the hot sun.
  - id: module-6-0026
    indonesian: lembab
    english: humid
    audio: 9c46be73ba15.ogg
    note:
      en: "'Lembab' means humid or moist; often used for weather or skin; don't
        confuse with 'basah' (wet/soaked)."
    sentences:
      - id: module-6-0026-s1
        text: Udara di Bali sangat lembab hari ini.
        blank: lembab
        en: The air in Bali is very humid today.
      - id: module-6-0026-s2
        text: Musim hujan membuat udara terasa lembab.
        blank: lembab
        en: The rainy season makes the air feel humid.
      - id: module-6-0026-s3
        text: Kamar ini lembab karena dekat pantai.
        blank: lembab
        en: This room is humid because it is near the beach.
  - id: module-6-0027
    indonesian: musim
    english: a season
    audio: 25db9a092ea0.ogg
    note:
      en: '"Musim" means season or period of weather; common phrases include "musim
        hujan" (rainy season) and "musim kemarau" (dry season), which are very
        relevant in Indonesia.'
    sentences:
      - id: module-6-0027-s1
        text: Sekarang adalah musim hujan di Bali.
        blank: musim
        en: Now it is the rainy season in Bali.
      - id: module-6-0027-s2
        text: Musim kemarau sangat panas di sini.
        blank: musim
        en: The dry season is very hot here.
      - id: module-6-0027-s3
        text: Saya suka musim hujan karena sejuk.
        blank: musim
        en: I like the rainy season because it is cool.
  - id: module-6-0028
    indonesian: musim kemarau
    english: the dry season
    audio: 4b4456dbcf90.ogg
    note:
      en: "'Musim kemarau' means the dry season; its opposite is 'musim hujan' (rainy
        season); both are common in Indonesian weather talk."
    sentences:
      - id: module-6-0028-s1
        text: Musim kemarau membuat tanah menjadi kering.
        blank: musim kemarau
        en: The dry season makes the soil dry.
      - id: module-6-0028-s2
        text: Sekarang sedang musim kemarau di Bali.
        blank: musim kemarau
        en: It is currently the dry season in Bali.
      - id: module-6-0028-s3
        text: Petani tidak suka musim kemarau panjang.
        blank: musim kemarau
        en: Farmers do not like a long dry season.
  - id: module-6-0029
    indonesian: musim hujan
    english: the rainy season
    audio: 8795ffb3f0bb.ogg
    note:
      en: "'Musim hujan' means the rainy season (roughly October–April in Indonesia);
        pair it with 'musim kemarau' (dry season) to discuss weather patterns."
    sentences:
      - id: module-6-0029-s1
        text: Musim hujan di Bali mulai bulan Oktober.
        blank: Musim hujan
        en: The rainy season in Bali starts in October.
      - id: module-6-0029-s2
        text: Saya suka minum teh saat musim hujan.
        blank: musim hujan
        en: I like drinking tea during the rainy season.
      - id: module-6-0029-s3
        text: Bawa payung karena sekarang musim hujan.
        blank: musim hujan
        en: Bring an umbrella because it is the rainy season now.
  - id: module-6-0030
    indonesian: musim panas
    english: summer
    audio: 131db446b2a7.ogg
    note:
      en: '"Musim panas" means summer or dry/hot season; in Indonesia it often refers
        to the dry season (musim kemarau), and is commonly confused with "musim
        kemarau" which is more locally accurate.'
    sentences:
      - id: module-6-0030-s1
        text: Musim panas di Bali sangat panas.
        blank: Musim panas
        en: Summer in Bali is very hot.
      - id: module-6-0030-s2
        text: Saya suka musim panas karena cerah.
        blank: musim panas
        en: I like summer because it is sunny.
      - id: module-6-0030-s3
        text: Anak-anak bermain di pantai saat musim panas.
        blank: musim panas
        en: Children play on the beach during summer.
  - id: module-6-0031
    indonesian: musim dingin
    english: winter
    audio: ee0259160417.ogg
    note:
      en: "'Musim dingin' means winter; Indonesia has no winter, so it's used when
        talking about other countries; related words: musim panas (summer),
        musim hujan (rainy season)."
    sentences:
      - id: module-6-0031-s1
        text: Di Jepang, musim dingin sangat dingin.
        blank: musim dingin
        en: In Japan, winter is very cold.
      - id: module-6-0031-s2
        text: Saya suka foto musim dingin di Eropa.
        blank: musim dingin
