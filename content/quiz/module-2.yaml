      - id: module-2-0231-s2
        text: Saya belajar satu kata baru setiap hari.
        blank: kata
        en: I learn one new word every day.
      - id: module-2-0231-s3
        text: Apa arti kata ini dalam bahasa Indonesia?
        blank: kata
        en: What is the meaning of this word in Indonesian?
  - id: module-2-0232
    indonesian: kepala desa
    english: village head
    audio: 1a4ca7c23909.ogg
    note:
      en: '"Kepala desa" is a formal title for the elected leader of a village; often
        shortened to "kades" in informal speech; related: "kepala" (head/chief),
