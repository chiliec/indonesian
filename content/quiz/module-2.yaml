      en: "\"Di sebelah kanan\" means 'on the right side of' something; its pair is
        \"di sebelah kiri\" (on the left); used for giving directions or
        describing locations."
    sentences:
      - id: module-2-0214-s1
        text: Warung itu di sebelah kanan jalan.
        blank: di sebelah kanan
        en: That small restaurant is on the right side of the road.
      - id: module-2-0214-s2
        text: Kamar mandi ada di sebelah kanan.
        blank: di sebelah kanan
        en: The bathroom is on the right-hand side.
      - id: module-2-0214-s3
        text: Toko itu di sebelah kanan hotel.
        blank: di sebelah kanan
        en: That shop is on the right side of the hotel.
  - id: module-2-0215
    indonesian: di sebelah kiri
    english: on the left, on the lefthand side (of)
    audio: beb812db9f18.ogg
    note:
      en: "\"Di sebelah kiri\" means 'on the left side (of something)'; the opposite
        is \"di sebelah kanan\" (on the right); used for giving directions or
        describing locations."
    sentences:
      - id: module-2-0215-s1
        text: Warung itu ada di sebelah kiri jalan.
        blank: di sebelah kiri
        en: That food stall is on the left side of the road.
      - id: module-2-0215-s2
        text: Kamar mandi ada di sebelah kiri.
        blank: di sebelah kiri
        en: The bathroom is on the left side.
      - id: module-2-0215-s3
        text: Toko oleh-oleh di sebelah kiri hotel.
        blank: di sebelah kiri
        en: The souvenir shop is on the left side of the hotel.
  - id: module-2-0216
    indonesian: di tengah-tengah
    english: in the middle, in the very middle of
    audio: eabc15405162.ogg
    note:
      en: "\"di tengah-tengah\" means 'in the very middle of' (people, places, or
        situations); more emphatic than \"di tengah\"; commonly used in both
        formal and informal speech."
    sentences:
      - id: module-2-0216-s1
        text: Dia duduk di tengah-tengah teman-temannya.
        blank: di tengah-tengah
        en: She is sitting in the middle of her friends.
      - id: module-2-0216-s2
        text: Pura itu ada di tengah-tengah desa.
        blank: di tengah-tengah
        en: The temple is in the middle of the village.
      - id: module-2-0216-s3
        text: Anak itu berdiri di tengah-tengah pasar.
        blank: di tengah-tengah
        en: The child is standing in the middle of the market.
  - id: module-2-0217
    indonesian: garasi
    english: garage
    audio: b34d0b1b5b30.ogg
    note:
      en: "'Garasi' is an everyday informal word for garage, borrowed from Dutch;
        commonly used for both parking and storage spaces at home."
    sentences:
      - id: module-2-0217-s1
        text: Mobil saya ada di dalam garasi.
        blank: garasi
        en: My car is inside the garage.
      - id: module-2-0217-s2
        text: Garasi rumah kami sangat besar.
        blank: garasi
        en: Our house's garage is very big.
      - id: module-2-0217-s3
        text: Dia menyimpan sepeda di garasi.
        blank: garasi
        en: He stores his bicycle in the garage.
  - id: module-2-0218
    indonesian: guru
    english: teacher
    audio: d2c22c5efc89.ogg
    note:
      en: '"Guru" means teacher in Indonesian; used for school teachers and spiritual
        guides; related word: "murid" (student).'
    sentences:
      - id: module-2-0218-s1
        text: Guru saya sangat baik dan sabar.
        blank: Guru
        en: My teacher is very kind and patient.
      - id: module-2-0218-s2
        text: Ibu guru mengajar matematika di sekolah.
        blank: guru
        en: The teacher teaches math at school.
      - id: module-2-0218-s3
        text: Saya suka belajar dengan guru itu.
        blank: guru
        en: I like studying with that teacher.
  - id: module-2-0219
    indonesian: kelapa
    english: coconut
    audio: ee04ccfbab00.ogg
    note:
      en: "'Kelapa' means coconut (the whole fruit/tree); 'santan' is coconut milk, a
        common related word; used in everyday food and drink contexts across
        Indonesia."
    sentences:
      - id: module-2-0219-s1
        text: Saya minum air kelapa di pantai.
        blank: kelapa
        en: I drink coconut water at the beach.
      - id: module-2-0219-s2
        text: Ibu membeli kelapa di pasar hari ini.
        blank: kelapa
        en: Mom buys a coconut at the market today.
      - id: module-2-0219-s3
        text: Kelapa itu besar dan segar.
        blank: Kelapa
        en: That coconut is big and fresh.
  - id: module-2-0220
    indonesian: luas
    english: broad, extensive, big (in area)
    audio: b843ffdf2643.ogg
    note:
      en: "'Luas' describes physical area/space (room, land, sea); don't confuse with
        'lebar' (wide in one dimension) or 'besar' (big in general size)."
    sentences:
      - id: module-2-0220-s1
        text: Kamar ini sangat luas dan nyaman.
        blank: luas
        en: This room is very spacious and comfortable.
      - id: module-2-0220-s2
        text: Pantai di Bali sangat luas.
        blank: luas
        en: The beach in Bali is very extensive.
      - id: module-2-0220-s3
        text: Kebun itu luas sekali.
        blank: luas
        en: That garden is very big.
  - id: module-2-0221
    indonesian: mangga
    english: mango
    audio: 347a18b9edcd.ogg
    note:
      en: "'Mangga' means mango (the fruit); do not confuse with 'manga' (Japanese
        comics) or the polite invitation word 'monggo/silakan'."
    sentences:
      - id: module-2-0221-s1
        text: Saya suka makan mangga setiap hari.
        blank: mangga
        en: I like to eat mango every day.
      - id: module-2-0221-s2
        text: Di pasar ada banyak mangga segar.
        blank: mangga
        en: At the market there are many fresh mangoes.
      - id: module-2-0221-s3
        text: Mangga ini manis sekali.
        blank: Mangga
        en: This mango is very sweet.
  - id: module-2-0222
    indonesian: mempunyai (punyai)
    english: to have something, to own something
    audio: 814efcc88a4f.ogg
    note:
      en: "'Mempunyai' is formal; in casual speech Indonesians often shorten it to
        'punya'. Both mean 'to have/own something'."
    sentences:
      - id: module-2-0222-s1
        text: Saya mempunyai satu kucing di rumah.
        blank: mempunyai
        en: I have one cat at home.
      - id: module-2-0222-s2
        text: Dia mempunyai sepeda baru yang bagus.
        blank: mempunyai
        en: She has a nice new bicycle.
      - id: module-2-0222-s3
        text: Kami mempunyai warung kecil di Bali.
        blank: mempunyai
        en: We have a small food stall in Bali.
  - id: module-2-0223
    indonesian: o ya
    english: Oh, before I forget...
    audio: 84118ae01f2e.ogg
    note:
      en: '"O ya" is a casual interjection used to introduce something you just
        remembered, similar to "Oh, by the way" or "Oh, before I forget"; common
        in everyday informal speech.'
    sentences:
      - id: module-2-0223-s1
        text: O ya, kita harus beli air minum.
        blank: O ya
        en: Oh, before I forget, we need to buy drinking water.
      - id: module-2-0223-s2
        text: O ya, toko itu tutup hari ini.
        blank: O ya
        en: Oh, by the way, that shop is closed today.
      - id: module-2-0223-s3
        text: O ya, ibu minta tolong belikan sayur.
        blank: O ya
        en: Oh, before I forget, Mom asked us to buy vegetables.
  - id: module-2-0224
    indonesian: pembantu (bantu)
    english: a household servant
    audio: 19ce96015fb0.ogg
    note:
      en: "'Pembantu' means household helper/servant; 'bantu' is the root verb meaning
        'to help'; avoid confusing 'pembantu' with 'asisten' which is more
        formal."
    sentences:
      - id: module-2-0224-s1
        text: Pembantu saya memasak nasi setiap hari.
        blank: Pembantu
        en: My household helper cooks rice every day.
      - id: module-2-0224-s2
        text: Ibu mencari pembantu baru minggu ini.
        blank: pembantu
        en: Mom is looking for a new household helper this week.
      - id: module-2-0224-s3
        text: Pembantu itu membersihkan rumah kami.
        blank: Pembantu
        en: That household helper cleans our house.
  - id: module-2-0225
    indonesian: tinggi
    english: tall, high
    audio: c9e967ecb6ce.ogg
    note:
      en: "'Tinggi' means both 'tall' (for people/objects) and 'high' (for prices,
        mountains); beginners often confuse it with 'besar' (big/large)."
    sentences:
      - id: module-2-0225-s1
        text: Pohon itu sangat tinggi di taman.
        blank: tinggi
        en: That tree is very tall in the park.
      - id: module-2-0225-s2
        text: Gunung Agung sangat tinggi di Bali.
        blank: tinggi
        en: Mount Agung is very high in Bali.
      - id: module-2-0225-s3
        text: Harga buah itu terlalu tinggi.
        blank: tinggi
        en: The price of that fruit is too high.
  - id: module-2-0226
    indonesian: ayo
    english: come on (let's...)
    audio: eb6ef0db938d.ogg
    note:
      en: '"Ayo" is informal/friendly, used to invite or urge someone to do something
        together; similar to "mari" but more casual and energetic.'
    sentences:
      - id: module-2-0226-s1
        text: Ayo makan bersama di warung ini!
        blank: Ayo
        en: Come on, let's eat together at this warung!
      - id: module-2-0226-s2
        text: Ayo pergi ke pantai sekarang!
        blank: Ayo
        en: Come on, let's go to the beach now!
      - id: module-2-0226-s3
        text: Ayo main bola di sini.
        blank: Ayo
        en: Come on, let's play ball here.
  - id: module-2-0227
    indonesian: berdiri
    english: to stand, to stand up
    audio: 2f9408993405.ogg
    note:
      en: "'Berdiri' means to stand or to stand up; related words: 'duduk' (to sit),
        'bangun' (to wake/rise); used in everyday commands and descriptions."
    sentences:
      - id: module-2-0227-s1
        text: Tolong berdiri di sini sebentar.
        blank: berdiri
        en: Please stand here for a moment.
      - id: module-2-0227-s2
        text: Anak itu berdiri di depan kelas.
        blank: berdiri
        en: That child stands in front of the class.
      - id: module-2-0227-s3
        text: Saya berdiri karena tidak ada kursi.
        blank: berdiri
        en: I am standing because there is no chair.
  - id: module-2-0228
    indonesian: bertemu
    english: to meet
    note:
      en: "'Bertemu' means 'to meet' (someone); use 'bertemu dengan' to say 'meet with
        someone'; related: 'ketemu' (informal spoken form)."
    sentences:
      - id: module-2-0228-s1
        text: Saya bertemu teman saya di pasar.
        blank: bertemu
        en: I meet my friend at the market.
      - id: module-2-0228-s2
        text: Kami bertemu guru di sekolah hari ini.
        blank: bertemu
        en: We meet the teacher at school today.
      - id: module-2-0228-s3
        text: Dia ingin bertemu kamu besok.
        blank: bertemu
        en: She wants to meet you tomorrow.
  - id: module-2-0229
    indonesian: dulu (1)
    english: first (before doing anything, else)
    audio: ff6d5ac164b6.ogg
    note:
      en: '"Dulu" meaning "first" expresses doing something before anything else;
        often confused with "pertama" (first in order/rank) — "dulu" implies
        priority or sequence in actions.'
    sentences:
      - id: module-2-0229-s1
        text: Cuci tangan dulu sebelum makan.
        blank: dulu
        en: Wash your hands first before eating.
      - id: module-2-0229-s2
        text: Duduk dulu, saya ambilkan minuman.
        blank: dulu
        en: Sit down first, I will get you a drink.
      - id: module-2-0229-s3
        text: Tunggu dulu, saya belum siap.
        blank: dulu
        en: Wait first, I am not ready yet.
  - id: module-2-0230
    indonesian: jawab
