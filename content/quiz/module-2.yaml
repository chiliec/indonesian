        "menelepon" for that).'
    sentences:
      - id: module-2-0240-s1
        text: Ibu memanggil nama saya dari dapur.
        blank: memanggil
        en: Mom calls out my name from the kitchen.
      - id: module-2-0240-s2
        text: Guru memanggil semua murid ke kelas.
        blank: memanggil
        en: The teacher summons all students to the classroom.
      - id: module-2-0240-s3
        text: Saya memanggil teman saya di jalan.
        blank: memanggil
        en: I call out to my friend on the street.
  - id: module-2-0241
    indonesian: peraga
    english: character, (in a play, story)
    audio: 7a7f42ebacac.ogg
    note:
      en: "'Peraga' can mean a character in a story or play; note that 'karakter' is
