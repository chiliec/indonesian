      - id: module-2-0237-s2
        text: Dia mungkin ada di rumah sekarang.
        blank: mungkin
        en: She is maybe at home now.
      - id: module-2-0237-s3
        text: Apakah itu mungkin untuk kita?
        blank: mungkin
        en: Is that possible for us?
  - id: module-2-0238
    indonesian: pakaian
    english: clothes, clothing
    audio: f47192281c6b.ogg
    note:
      en: "'Pakaian' is a neutral, everyday word for clothing/clothes; 'baju' refers
        more specifically to a shirt or top, while 'pakaian' covers all
        garments."
    sentences:
      - id: module-2-0238-s1
        text: Saya membeli pakaian baru di pasar.
        blank: pakaian
        en: I am buying new clothes at the market.
      - id: module-2-0238-s2
        text: Pakaian ini sangat murah dan bagus.
        blank: pakaian
        en: These clothes are very cheap and nice.
      - id: module-2-0238-s3
        text: Dia mencuci pakaian setiap hari Minggu.
        blank: pakaian
        en: She washes clothes every Sunday.
  - id: module-2-0239
    indonesian: panggung
    english: stage, raised platform
    audio: 855a4168a366.ogg
    note:
      en: '"Panggung" means a raised stage or platform; commonly used for performances
        and events; related words: "pertunjukan" (performance), "penonton"
        (audience).'
    sentences:
      - id: module-2-0239-s1
        text: Penyanyi itu naik ke atas panggung.
        blank: panggung
        en: The singer goes up onto the stage.
      - id: module-2-0239-s2
        text: Panggung itu besar dan indah.
        blank: panggung
        en: The stage is big and beautiful.
      - id: module-2-0239-s3
        text: Anak-anak menari di panggung sekolah.
        blank: panggung
        en: The children dance on the school stage.
  - id: module-2-0240
    indonesian: memanggil (panggil)
    english: to summon someone, to call out to someone
    audio: b05865b0ba19.ogg
