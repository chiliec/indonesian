        blank: seperti
        en: The sky is blue like the sea.
      - id: module-2-0243-s2
        text: Dia berlari seperti angin.
        blank: seperti
        en: He runs like the wind.
      - id: module-2-0243-s3
        text: Kue ini manis seperti madu.
        blank: seperti
        en: This cake is sweet like honey.
  - id: module-2-0244
    indonesian: tadi
    english: just now, earlier (today)
    audio: 2c7ae9ba7154.ogg
    note:
      en: "'Tadi' refers to something that happened earlier the same day or just a
        moment ago; don't confuse with 'kemarin' (yesterday) or 'sebelumnya'
        (previously/before)."
    sentences:
      - id: module-2-0244-s1
        text: Saya makan nasi tadi pagi.
        blank: tadi
        en: I ate rice earlier this morning.
      - id: module-2-0244-s2
        text: Dia telepon saya tadi.
        blank: tadi
        en: She called me just now.
      - id: module-2-0244-s3
        text: Tadi saya lihat kucing di sini.
        blank: Tadi
        en: Just now I saw a cat here.
  - id: module-2-0245
    indonesian: tanya
    english: ask, ... asked so-and-so (in a, narrative)
    audio: ae8c7c4d1b90.ogg
    note:
      en: '"Tanya" means to ask a question; used in conversation and storytelling
        (e.g., "tanya Budi" = "Budi asked"); related words: "bertanya" (more
        formal), "pertanyaan" (question).'
    sentences:
      - id: module-2-0245-s1
        text: Dia tanya nama saya.
        blank: tanya
        en: He asked my name.
      - id: module-2-0245-s2
        text: Saya tanya harga nasi goreng ini.
        blank: tanya
        en: I asked the price of this fried rice.
      - id: module-2-0245-s3
        text: Ibu tanya di mana toilet.
        blank: tanya
        en: Mom asked where the toilet is.
  - id: module-2-0246
    indonesian: tiba-tiba
    english: suddenly
    audio: 9c4015220ade.ogg
    note:
      en: "'tiba-tiba' means 'suddenly/all of a sudden'; used in informal and formal
        speech; related to 'tiba' (to arrive); do not confuse with 'segera'
        (immediately/soon)."
    sentences:
      - id: module-2-0246-s1
        text: Tiba-tiba hujan turun sangat deras.
        blank: Tiba-tiba
        en: Suddenly it rained very heavily.
      - id: module-2-0246-s2
        text: Kucing itu tiba-tiba lari ke jalan.
        blank: tiba-tiba
        en: The cat suddenly ran into the street.
      - id: module-2-0246-s3
        text: Teman saya tiba-tiba datang ke rumah.
        blank: tiba-tiba
        en: My friend suddenly came to the house.
  - id: module-2-0247
    indonesian: tidak usah
    english: (you) don't need to, don't bother
    audio: 0c8bfb1e33f6.ogg
    note:
      en: '"Tidak usah" is informal/neutral and means there is no need to do
        something; similar to "tidak perlu" but more casual and common in
        everyday speech.'
    sentences:
      - id: module-2-0247-s1
        text: Tidak usah membawa uang banyak ke sini.
        blank: Tidak usah
        en: You don't need to bring a lot of money here.
      - id: module-2-0247-s2
        text: Tidak usah malu, semua orang belajar.
        blank: Tidak usah
        en: Don't be shy, everyone is learning.
      - id: module-2-0247-s3
        text: Tidak usah masak, kita makan di luar.
        blank: Tidak usah
        en: Don't bother cooking, we'll eat out.
  - id: module-2-0248
    indonesian: minta diri
    english: to take one's leave of, to ask permission to leave
    audio: 4b0bc63aae8e.ogg
    note:
      en: "\"Minta diri\" is a polite, slightly formal phrase used when excusing
        yourself before leaving; common in social and family settings, similar
        to saying 'I'll take my leave now'."
    sentences:
      - id: module-2-0248-s1
        text: Saya minta diri dulu, sudah malam.
        blank: minta diri
        en: I'll take my leave now, it's already late.
      - id: module-2-0248-s2
        text: Dia minta diri kepada tuan rumah.
        blank: minta diri
        en: He took his leave of the host.
      - id: module-2-0248-s3
        text: Kami minta diri sebelum hujan turun.
        blank: minta diri
        en: We took our leave before the rain fell.
  - id: module-2-0249
    indonesian: pegawai
    english: office worker, employee
    audio: c833796fed39.ogg
    note:
      en: "'Pegawai' means employee or office worker; 'karyawan' is a common synonym,
        while 'pegawai negeri' specifically means government civil servant."
    sentences:
      - id: module-2-0249-s1
        text: Ayah saya adalah pegawai di kantor itu.
        blank: pegawai
        en: My father is an employee at that office.
      - id: module-2-0249-s2
        text: Pegawai itu bekerja setiap hari.
        blank: pegawai
        en: That employee works every day.
      - id: module-2-0249-s3
        text: Ibu saya seorang pegawai bank.
        blank: pegawai
        en: My mother is a bank employee.
