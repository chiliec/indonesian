id: module-2
title:
  en: Module 2
cards:
  - id: module-2-0001
    indonesian: alun-alun
    english: town square
    audio: b53eb8b3875a.ogg
    note:
      en: '"Alun-alun" refers to a traditional public town square, common in Javanese
        cities; often the social and civic center of a town.'
    sentences:
      - id: module-2-0001-s1
        text: Kami bermain di alun-alun kota.
        blank: alun-alun
        en: We are playing at the town square.
      - id: module-2-0001-s2
        text: Alun-alun itu sangat ramai hari ini.
        blank: alun-alun
        en: The town square is very crowded today.
      - id: module-2-0001-s3
        text: Saya suka jalan-jalan di alun-alun.
        blank: alun-alun
        en: I like to walk around the town square.
  - id: module-2-0002
    indonesian: bupati
    english: the head of a regency or a, sub-provincial district
    audio: 7758f4982c30.ogg
    note:
      en: "'Bupati' is a formal/official title for a regional district head, similar
        to a county executive; often seen with the prefix 'Pak' or 'Bu' as a
        sign of respect."
    sentences:
      - id: module-2-0002-s1
        text: Bupati membuka acara festival budaya hari ini.
        blank: Bupati
        en: The district head opens the cultural festival today.
      - id: module-2-0002-s2
        text: Pak bupati tinggal di kantor kabupaten.
        blank: bupati
        en: The district head lives at the regency office.
      - id: module-2-0002-s3
        text: Kami bertemu bupati di balai desa.
        blank: bupati
        en: We met the district head at the village hall.
  - id: module-2-0003
    indonesian: desa
    english: a village (administrative unit)
    audio: ec44ec285ebb.ogg
    note:
      en: "'Desa' refers to a village as an official administrative unit in Indonesia;
        more formal than 'kampung' (neighborhood/hometown)."
    sentences:
      - id: module-2-0003-s1
        text: Saya tinggal di desa yang kecil.
        blank: desa
        en: I live in a small village.
      - id: module-2-0003-s2
        text: Desa ini sangat indah dan tenang.
        blank: desa
        en: This village is very beautiful and peaceful.
      - id: module-2-0003-s3
        text: Nenek saya lahir di desa.
        blank: desa
        en: My grandmother was born in a village.
  - id: module-2-0004
    indonesian: kampung
    english: a village
    audio: 678e43bf28bd.ogg
    note:
      en: "'Kampung' means village or hometown; often used warmly to refer to one's
        home village, distinct from 'desa' which is more formal/administrative."
    sentences:
      - id: module-2-0004-s1
        text: Saya tinggal di kampung yang kecil.
        blank: kampung
        en: I live in a small village.
      - id: module-2-0004-s2
        text: Kampung saya ada di Bali.
        blank: kampung
        en: My village is in Bali.
      - id: module-2-0004-s3
        text: Anak-anak bermain di kampung itu.
        blank: kampung
        en: The children are playing in that village.
  - id: module-2-0005
    indonesian: kebun
    english: a garden, a plantation
    audio: 5e88a6c50556.ogg
    note:
      en: "'Kebun' means garden or plantation; commonly used in phrases like 'kebun
        binatang' (zoo) and 'kebun sayur' (vegetable garden); not to be confused
        with 'taman' which refers to a decorative park."
    sentences:
      - id: module-2-0005-s1
        text: Ibu menanam bunga di kebun.
        blank: kebun
        en: Mother plants flowers in the garden.
      - id: module-2-0005-s2
        text: Kebun sayur kami sangat besar.
        blank: kebun
        en: Our vegetable garden is very big.
      - id: module-2-0005-s3
        text: Ayah bekerja di kebun setiap pagi.
        blank: kebun
        en: Father works in the garden every morning.
  - id: module-2-0006
    indonesian: kelas
    english: a classroom, grade/schoolyear
    audio: df419ace2d39.ogg
    note:
      en: "'Kelas' means both a physical classroom and a grade/year level in school;
        very common in everyday school contexts."
    sentences:
      - id: module-2-0006-s1
        text: Saya belajar di kelas dua.
        blank: kelas
        en: I study in grade two.
      - id: module-2-0006-s2
        text: Kelas kami bersih dan nyaman.
        blank: Kelas
        en: Our classroom is clean and comfortable.
      - id: module-2-0006-s3
        text: Ibu guru masuk ke kelas.
        blank: kelas
        en: The teacher enters the classroom.
  - id: module-2-0007
    indonesian: kue
    english: a cake
    audio: 07411d7bcc68.ogg
    note:
      en: "'Kue' refers broadly to cakes, pastries, and sweet snacks; very common in
        daily life; related words: 'kue ulang tahun' (birthday cake), 'kue
        basah' (moist traditional snack)."
    sentences:
      - id: module-2-0007-s1
        text: Ibu membuat kue untuk ulang tahun saya.
        blank: kue
        en: Mom makes a cake for my birthday.
      - id: module-2-0007-s2
        text: Saya makan kue di warung tadi.
        blank: kue
        en: I ate a cake at the stall earlier.
      - id: module-2-0007-s3
        text: Kue ini sangat manis dan enak.
        blank: Kue
        en: This cake is very sweet and delicious.
  - id: module-2-0008
    indonesian: meja
    english: a table
    audio: 87f1ccd950bf.ogg
    note:
      en: "'Meja' means table; common in daily life; related words: 'kursi' (chair),
        'meja makan' (dining table), 'meja tulis' (desk)."
    sentences:
      - id: module-2-0008-s1
        text: Ada buku di atas meja.
        blank: meja
        en: There is a book on the table.
      - id: module-2-0008-s2
        text: Kami makan di meja bersama.
        blank: meja
        en: We eat at the table together.
      - id: module-2-0008-s3
        text: Tolong taruh piring di meja.
        blank: meja
        en: Please put the plate on the table.
  - id: module-2-0009
    indonesian: perahu
    english: a small boat, a traditional Indonesian, sailboat, a yacht
    audio: 7d7d40fc4ba9.ogg
    note:
      en: "'Perahu' refers to a small traditional boat, often seen on rivers, lakes,
        or coastal areas in Indonesia; do not confuse with 'kapal' which is a
        larger ship or vessel."
    sentences:
      - id: module-2-0009-s1
        text: Saya naik perahu di danau itu.
        blank: perahu
        en: I ride a small boat on that lake.
      - id: module-2-0009-s2
        text: Perahu itu berwarna merah dan putih.
        blank: perahu
        en: That small boat is red and white.
      - id: module-2-0009-s3
        text: Nelayan itu punya perahu kecil.
        blank: perahu
        en: That fisherman has a small boat.
  - id: module-2-0010
    indonesian: pertandingan
    english: a (sports) match, a football match
    audio: 342ffe812d5f.ogg
    note:
      en: "'Pertandingan' means a competitive match or game (sports); related:
        'permainan' (game/play), 'kompetisi' (competition); commonly used for
        football, badminton, and other sports."
    sentences:
      - id: module-2-0010-s1
        text: Pertandingan sepak bola itu sangat seru.
        blank: Pertandingan
        en: That football match was very exciting.
      - id: module-2-0010-s2
        text: Kami menonton pertandingan bola bersama teman.
        blank: pertandingan
        en: We watched a football match with friends.
      - id: module-2-0010-s3
        text: Kapan pertandingan badminton itu mulai?
        blank: pertandingan
        en: When does the badminton match start?
  - id: module-2-0011
    indonesian: pesta
    english: a party, a festival
    audio: 03c22aa15c19.ogg
    note:
      en: "'Pesta' means a party or festival; more festive/large-scale than
        'perayaan'; commonly used for birthday parties ('pesta ulang tahun') and
        community celebrations."
    sentences:
      - id: module-2-0011-s1
        text: Kami pergi ke pesta ulang tahun Budi.
        blank: pesta
        en: We went to Budi's birthday party.
      - id: module-2-0011-s2
        text: Pesta di desa itu sangat meriah.
        blank: pesta
        en: The festival in that village is very lively.
      - id: module-2-0011-s3
        text: Saya suka makan di pesta keluarga.
        blank: pesta
        en: I like eating at family parties.
  - id: module-2-0012
    indonesian: pulau, Pulau Bali
    english: an island, the island of Bali
    audio: 29e8069bd4e7.ogg
    note:
      en: "'Pulau' means 'island'; when used as a proper name prefix (e.g., Pulau
        Bali), it is capitalized, similar to saying 'the island of Bali'."
    sentences:
      - id: module-2-0012-s1
        text: Saya ingin pergi ke Pulau Bali.
        blank: Pulau Bali
        en: I want to go to the island of Bali.
      - id: module-2-0012-s2
        text: Indonesia mempunyai banyak pulau yang indah.
        blank: pulau
        en: Indonesia has many beautiful islands.
      - id: module-2-0012-s3
        text: Pulau Bali sangat terkenal di dunia.
        blank: Pulau Bali
        en: The island of Bali is very famous in the world.
  - id: module-2-0013
    indonesian: sayuran
    english: a vegetable, vegetables
    audio: 0c2ea935b48a.ogg
    note:
      en: "'Sayuran' is the general word for vegetables (collective/plural); a single
        vegetable type is often just named directly (e.g., 'wortel' for carrot);
        related: 'buah' (fruit), 'makanan' (food)."
    sentences:
      - id: module-2-0013-s1
        text: Ibu membeli sayuran di pasar pagi.
        blank: sayuran
        en: Mom buys vegetables at the morning market.
      - id: module-2-0013-s2
        text: Saya suka makan sayuran setiap hari.
        blank: sayuran
        en: I like to eat vegetables every day.
      - id: module-2-0013-s3
        text: Sayuran ini sangat segar dan murah.
        blank: sayuran
        en: These vegetables are very fresh and cheap.
  - id: module-2-0014
    indonesian: sepak bola
    english: football, (especially soccer)
    audio: 235065b57928.ogg
    note:
      en: '"Sepak bola" is the standard term for soccer/football in Indonesia; "bola"
        alone can mean any ball, so use the full phrase to be specific.'
    sentences:
      - id: module-2-0014-s1
        text: Anak-anak bermain sepak bola di lapangan.
        blank: sepak bola
        en: The children are playing football in the field.
      - id: module-2-0014-s2
        text: Saya suka menonton sepak bola bersama teman.
        blank: sepak bola
        en: I like watching football with friends.
      - id: module-2-0014-s3
        text: Sepak bola adalah olahraga populer di Indonesia.
        blank: sepak bola
        en: Football is a popular sport in Indonesia.
  - id: module-2-0015
    indonesian: sungai
    english: a river
    audio: 78efcb83ef64.ogg
    note:
      en: "'Sungai' means river; commonly confused with 'danau' (lake) or 'laut'
        (sea); used in everyday speech across Indonesia."
    sentences:
      - id: module-2-0015-s1
        text: Anak-anak bermain di sungai setiap hari.
        blank: sungai
        en: The children play in the river every day.
      - id: module-2-0015-s2
        text: Sungai ini sangat panjang dan indah.
        blank: sungai
        en: This river is very long and beautiful.
      - id: module-2-0015-s3
        text: Kami melihat ikan di sungai itu.
        blank: sungai
        en: We saw fish in that river.
  - id: module-2-0016
    indonesian: -belas
    english: -teen
    audio: 70393e988998.ogg
    note:
      en: "'-belas' is the suffix added to numbers 11–19 (e.g., 'sebelas'=11, 'dua
        belas'=12, 'tiga belas'=13); note that 11 is 'sebelas' (not 'satu
        belas')."
    sentences:
      - id: module-2-0016-s1
        text: Saya berumur empat belas tahun.
        blank: belas
        en: I am fourteen years old.
      - id: module-2-0016-s2
        text: Ada lima belas siswa di kelas.
        blank: belas
        en: There are fifteen students in the class.
      - id: module-2-0016-s3
        text: Toko itu tutup jam tujuh belas.
        blank: belas
        en: The shop closes at seventeen o'clock.
  - id: module-2-0017
    indonesian: berapa
    english: how much, how many, what (when asking about a, number)
    audio: b2ca0164df76.ogg
    note:
      en: '"Berapa" is used in questions about numbers, prices, ages, and quantities;
        often paired with "harga" (price) or "umur" (age); very common in
        markets and daily transactions.'
    sentences:
      - id: module-2-0017-s1
        text: Berapa harga nasi goreng ini?
        blank: Berapa
        en: How much does this fried rice cost?
      - id: module-2-0017-s2
        text: Kamu berapa tahun sekarang?
        blank: berapa
        en: How old are you now?
      - id: module-2-0017-s3
        text: Ada berapa orang di sini?
        blank: berapa
        en: How many people are here?
  - id: module-2-0018
    indonesian: delapan
    english: eight
    audio: f21b63d1fa87.ogg
    note:
      en: "'Delapan' means eight; it is a standalone cardinal number — related words
        include 'kedelapan' (eighth/the eighth) and 'delapan belas' (eighteen)."
    sentences:
      - id: module-2-0018-s1
        text: Saya punya delapan ekor ayam di rumah.
        blank: delapan
        en: I have eight chickens at home.
      - id: module-2-0018-s2
        text: Toko itu buka jam delapan pagi.
        blank: delapan
        en: That shop opens at eight in the morning.
      - id: module-2-0018-s3
        text: Ada delapan siswa di kelas ini.
        blank: delapan
        en: There are eight students in this class.
  - id: module-2-0019
    indonesian: dua
    english: two
    audio: ecf9707cc12e.ogg
    note:
      en: "'Dua' means 'two'; used for counting and quantities; related words: 'kedua'
        (second/both), 'dua kali' (twice)."
    sentences:
      - id: module-2-0019-s1
        text: Saya punya dua kucing di rumah.
        blank: dua
        en: I have two cats at home.
      - id: module-2-0019-s2
        text: Dia memesan dua kopi pagi ini.
        blank: dua
        en: She ordered two coffees this morning.
      - id: module-2-0019-s3
        text: Ada dua anak bermain di pantai.
        blank: dua
        en: There are two children playing on the beach.
  - id: module-2-0020
    indonesian: enam
    english: six
    audio: 1ff9a1d83379.ogg
    note:
      en: "'Enam' means 'six' and is used for counting; remember it differs from
        'delapan' (eight) and 'tujuh' (seven), which beginners often mix up."
    sentences:
      - id: module-2-0020-s1
        text: Saya punya enam ekor ayam di rumah.
        blank: enam
        en: I have six chickens at home.
      - id: module-2-0020-s2
        text: Warung itu buka jam enam pagi.
        blank: enam
        en: That food stall opens at six in the morning.
      - id: module-2-0020-s3
        text: Ada enam kursi di meja makan.
        blank: enam
        en: There are six chairs at the dining table.
  - id: module-2-0021
    indonesian: empat
    english: four
    audio: 5c3f63d9bcb1.ogg
    note:
      en: "'Empat' means four; used in counting, age, time, and prices; related:
        'keempat' (fourth), 'empat belas' (fourteen)."
    sentences:
      - id: module-2-0021-s1
        text: Saya punya empat ekor kucing di rumah.
        blank: empat
        en: I have four cats at home.
      - id: module-2-0021-s2
        text: Toko itu buka jam empat sore.
        blank: empat
        en: That shop opens at four in the afternoon.
      - id: module-2-0021-s3
        text: Dia membeli empat buah mangga di pasar.
        blank: empat
        en: She bought four mangoes at the market.
  - id: module-2-0022
    indonesian: Ibu
    english: Mrs
    audio: b4009314fc6b.ogg
    note:
      en: "'Ibu' means 'Mrs' or 'mother'; used as a respectful title for older women;
        often shortened to 'Bu' in casual speech."
    sentences:
      - id: module-2-0022-s1
        text: Ibu guru mengajar di kelas hari ini.
        blank: Ibu
        en: The teacher (Mrs) is teaching in class today.
      - id: module-2-0022-s2
        text: Selamat pagi, Ibu!
        blank: Ibu
        en: Good morning, Mrs!
      - id: module-2-0022-s3
        text: Ibu membeli sayur di pasar.
        blank: Ibu
        en: The lady (Mrs) is buying vegetables at the market.
  - id: module-2-0023
    indonesian: Kartu Tanda Penduduk (KTP)
    english: identity card
    audio: 1b128ba406db.ogg
  - id: module-2-0024
    indonesian: KTP (Kartu Tanda Penduduk)
    english: identity card (acronym)
    audio: a8cefc322297.ogg
    note:
      en: KTP is the Indonesian national identity card; always use the acronym in
        everyday speech, not the full form.
    sentences:
      - id: module-2-0024-s1
        text: Saya perlu membawa KTP ke kantor.
        blank: KTP
        en: I need to bring my identity card to the office.
      - id: module-2-0024-s2
        text: Tolong tunjukkan KTP Anda kepada saya.
        blank: KTP
        en: Please show me your identity card.
      - id: module-2-0024-s3
        text: KTP saya hilang kemarin.
        blank: KTP
        en: My identity card was lost yesterday.
  - id: module-2-0025
    indonesian: lima
    english: five
    audio: 40963cdd4efe.ogg
    note:
      en: "'Lima' means 'five' and is used in counting, prices, and telling time; do
        not confuse with 'lemon' or 'limau' (citrus fruit)."
    sentences:
      - id: module-2-0025-s1
        text: Saya punya lima ekor kucing di rumah.
        blank: lima
        en: I have five cats at home.
      - id: module-2-0025-s2
        text: Toko itu buka jam lima sore.
        blank: lima
        en: The shop opens at five in the afternoon.
      - id: module-2-0025-s3
        text: Dia membeli lima mangga di pasar.
        blank: lima
        en: She bought five mangoes at the market.
  - id: module-2-0026
    indonesian: nol
    english: zero, nought
    audio: d08dbaf4000e.ogg
    note:
      en: "\"Nol\" is the standard word for zero in Indonesian, used in numbers,
        scores, and temperatures; also heard as the digit '0' when reading phone
        numbers or codes."
    sentences:
      - id: module-2-0026-s1
        text: Suhu hari ini nol derajat di sana.
        blank: nol
        en: The temperature there is zero degrees today.
      - id: module-2-0026-s2
        text: Nilai ujiannya nol karena tidak hadir.
        blank: nol
        en: His exam score is zero because he did not attend.
      - id: module-2-0026-s3
        text: Nomor teleponnya dimulai dari nol delapan.
        blank: nol
        en: His phone number starts with zero eight.
  - id: module-2-0027
    indonesian: nomor
    english: number (such-and-such), such-and-such a number, in room number 6
    audio: 0183283f7304.ogg
    note:
      en: '"Nomor" means "number" when referring to a specific number (room, phone,
        ticket, etc.); often abbreviated "No." in writing; not used for counting
        quantities (use "angka" for digits or "jumlah" for amounts).'
    sentences:
      - id: module-2-0027-s1
        text: Kamar saya nomor enam.
        blank: nomor
        en: My room is number six.
      - id: module-2-0027-s2
        text: Nomor telepon saya mudah diingat.
        blank: nomor
        en: My phone number is easy to remember.
      - id: module-2-0027-s3
        text: Tiket saya nomor dua puluh.
        blank: nomor
        en: My ticket is number twenty.
  - id: module-2-0028
    indonesian: puluh
    english: the number-word, indicating multiples of ten, thirty
    audio: 53e520b52da6.ogg
    note:
      en: "'Puluh' is a suffix/word used with numbers to mean multiples of ten (e.g.,
        tiga puluh = thirty, lima puluh = fifty); never used alone for a single
        ten — use 'sepuluh' for ten."
    sentences:
      - id: module-2-0028-s1
        text: Harga ini tiga puluh ribu rupiah.
        blank: puluh
        en: This price is thirty thousand rupiah.
      - id: module-2-0028-s2
        text: Ada dua puluh siswa di kelas.
        blank: puluh
        en: There are twenty students in the class.
      - id: module-2-0028-s3
        text: Saya punya lima puluh ribu rupiah.
        blank: puluh
        en: I have fifty thousand rupiah.
  - id: module-2-0029
    indonesian: satu
    english: one
    audio: 7a54e5c86584.ogg
    note:
      en: '"Satu" means "one" (the number); also used in "satu-satu" (one by one) and
        combined in numbers like "dua puluh satu" (twenty-one); not to be
        confused with "pertama" (first/ordinal).'
    sentences:
      - id: module-2-0029-s1
        text: Saya mau pesan satu nasi goreng.
        blank: satu
        en: I want to order one fried rice.
      - id: module-2-0029-s2
        text: Ada satu kucing di taman.
        blank: satu
        en: There is one cat in the park.
      - id: module-2-0029-s3
        text: Dia punya satu adik perempuan.
        blank: satu
        en: She has one younger sister.
  - id: module-2-0030
    indonesian: sebelas
    english: eleven
    audio: e5eeae97695e.ogg
    note:
      en: "'Sebelas' means eleven; part of the basic number series (satu, dua,
        tiga...), commonly used for time, age, and counting."
    sentences:
      - id: module-2-0030-s1
        text: Saya bangun jam sebelas pagi.
        blank: sebelas
        en: I wake up at eleven in the morning.
      - id: module-2-0030-s2
        text: Ada sebelas orang di warung itu.
        blank: sebelas
        en: There are eleven people at that food stall.
      - id: module-2-0030-s3
        text: Adik saya umur sebelas tahun.
        blank: sebelas
        en: My younger sibling is eleven years old.
  - id: module-2-0031
    indonesian: sepuluh
    english: ten
    audio: b450c729ed87.ogg
    note:
      en: "'Sepuluh' means 'ten' and is used in everyday counting, prices, and time;
        combine with 'ribu' (thousand) for prices like 'sepuluh ribu' (ten
        thousand rupiah)."
    sentences:
      - id: module-2-0031-s1
        text: Saya punya sepuluh ekor ayam di rumah.
        blank: sepuluh
        en: I have ten chickens at home.
      - id: module-2-0031-s2
        text: Harga jeruk ini sepuluh ribu rupiah.
        blank: sepuluh
        en: The price of these oranges is ten thousand rupiah.
      - id: module-2-0031-s3
        text: Kami mulai belajar jam sepuluh pagi.
        blank: sepuluh
        en: We start studying at ten in the morning.
  - id: module-2-0032
    indonesian: se-
    english: a, one (prefix as in seratus)
    audio: 7064e056ec7c.ogg
    note:
      en: The prefix 'se-' means 'one' or 'a/an' when attached to a number or noun
        (e.g., seratus = one hundred, semangkok = a bowl); avoid confusing it
