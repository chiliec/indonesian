    sentences:
      - id: module-2-0232-s1
        text: Kepala desa tinggal di rumah besar.
        blank: Kepala desa
        en: The village head lives in a big house.
      - id: module-2-0232-s2
        text: Kami bertemu kepala desa hari ini.
        blank: kepala desa
        en: We met the village head today.
      - id: module-2-0232-s3
        text: Kepala desa membantu warga setiap hari.
        blank: Kepala desa
        en: The village head helps the residents every day.
  - id: module-2-0233
    indonesian: lari
    english: to run, to run away, to escape
    audio: 594be4e92304.ogg
    note:
      en: "'Lari' means to run or run away; don't confuse with 'pergi' (to go/leave) —
        'lari' implies speed or escape; related: 'berlari' (running, more
        formal)."
    sentences:
      - id: module-2-0233-s1
        text: Dia lari ke pantai setiap pagi.
        blank: lari
