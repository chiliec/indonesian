    sentences:
      - id: module-2-0235-s1
        text: Saya melihat pantai yang indah hari ini.
        blank: melihat
        en: I see a beautiful beach today.
      - id: module-2-0235-s2
        text: Dia melihat burung di pohon itu.
        blank: melihat
        en: She sees a bird in that tree.
      - id: module-2-0235-s3
        text: Anak itu lihat kucing di jalan.
        blank: lihat
        en: That child looks at a cat on the street.
  - id: module-2-0236
    indonesian: membuka (buka)
    english: to open something
    audio: d389e910454e.ogg
    note:
      en: "'Membuka' is the formal/written form; 'buka' is used in casual speech and
        commands (e.g. 'Buka pintunya!'); also seen in 'buka puasa' (break the
        fast)."
    sentences:
      - id: module-2-0236-s1
        text: Tolong buka pintu itu untuk saya.
        blank: buka
        en: Please open that door for me.
      - id: module-2-0236-s2
        text: Dia membuka jendela setiap pagi hari.
        blank: membuka
        en: She opens the window every morning.
      - id: module-2-0236-s3
        text: Ayo buka tasmu di sini.
        blank: buka
        en: Come on, open your bag here.
  - id: module-2-0237
    indonesian: mungkin
    english: possibly, maybe, perhaps, possible, may,
    audio: b59429edf7e9.ogg
