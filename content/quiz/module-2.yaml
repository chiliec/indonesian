      - id: module-2-0234-s1
        text: Anak-anak bermain di luar rumah.
        blank: luar
        en: The children are playing outside the house.
      - id: module-2-0234-s2
        text: Di luar sangat panas hari ini.
        blank: luar
        en: It is very hot outside today.
  - id: module-2-0235
    indonesian: melihat (lihat)
    english: to see something/someone, to look at
    audio: 8ff1f70f23dc.ogg
    note:
      en: '"Melihat" is the formal/written form; in casual speech "lihat" is used
