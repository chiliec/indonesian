    audio: 3fe50b9be88f.ogg
    note:
      en: "\"Jawab\" means \"answer/reply\"; used as a verb (menjawab) or in narration
        as \"kata/jawab\" meaning \"so-and-so answered/said\"; don't confuse
        with \"tanya\" (to ask)."
    sentences:
      - id: module-2-0230-s1
        text: '"Ya, saya bisa," jawab Budi dengan senang.'
        blank: jawab
        en: '"Yes, I can," Budi answered happily.'
      - id: module-2-0230-s2
        text: '"Tidak tahu," jawab Sari pelan.'
        blank: jawab
        en: "\"I don't know,\" Sari answered quietly."
      - id: module-2-0230-s3
        text: '"Rumah saya di sini," jawab anak itu.'
        blank: jawab
        en: '"My house is here," the child answered.'
  - id: module-2-0231
    indonesian: kata
    english: a word, ... said so-and-so (in a, narrative)
    audio: c616ec4d64a0.ogg
    note:
      en: "'Kata' means 'word' as a noun (e.g., 'a new word') and also functions as a
        quotative marker meaning 'said/according to' in informal narration;
        related to 'berkata' (to speak/say)."
    sentences:
      - id: module-2-0231-s1
        text: Kata ibu, warung itu tutup hari ini.
        blank: Kata
