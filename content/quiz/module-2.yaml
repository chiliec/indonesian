      - id: module-2-0233-s2
        text: Anak itu lari karena takut anjing.
        blank: lari
        en: That child runs away because he is afraid of the dog.
      - id: module-2-0233-s3
        text: Ayo lari! Hujan datang sekarang.
        blank: lari
        en: Let's run! The rain is coming now.
  - id: module-2-0234
    indonesian: luar
    english: the outside, the exterior
    audio: d0d483b0f80a.ogg
    note:
      en: "'Luar' means 'outside/exterior'; often used in phrases like 'di luar'
