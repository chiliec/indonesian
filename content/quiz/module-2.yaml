      - id: module-2-0242-s1
        text: Ada pohon di sekeliling rumah itu.
        blank: sekeliling
        en: There are trees all around that house.
      - id: module-2-0242-s2
        text: Anak-anak berlari sekeliling taman.
        blank: sekeliling
        en: The children run around the park.
      - id: module-2-0242-s3
        text: Saya melihat sawah di sekeliling desa.
        blank: sekeliling
        en: I see rice fields all around the village.
