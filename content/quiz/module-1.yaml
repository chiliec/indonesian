      - id: module-1-0154-s2
        text: Ibu memanggil saya ke sini.
        blank: ke sini
        en: Mom called me here.
      - id: module-1-0154-s3
        text: Tolong bawa tasnya ke sini.
        blank: ke sini
        en: Please bring the bag here.
  - id: module-1-0155
    indonesian: kembali
    english: to go back, to come back, you're welcome, (in reply to 'thank you')
    audio: d42be696e5a2.ogg
