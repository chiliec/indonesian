      - id: module-1-0158-s2
        text: Kami naik bus ke pasar pagi ini.
        blank: naik
        en: We go to the market by bus this morning.
      - id: module-1-0158-s3
        text: Adik naik tangga ke lantai dua.
        blank: naik
        en: My younger sibling goes up the stairs to the second floor.
  - id: module-1-0159
    indonesian: pergi
    english: to go
    audio: e899505d29f7.ogg
    note:
      en: "'Pergi' means 'to go' and is used for leaving or traveling; often paired
