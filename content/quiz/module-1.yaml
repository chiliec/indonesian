id: module-1
title:
  en: Module 1
  ru: Модуль 1
cards:
  - id: module-1-0001
    indonesian: Anda
    english: you
    audio: dc1bda04a833.ogg
    note:
      en: "'Anda' is a formal/polite 'you', used with strangers or in professional
        settings; 'kamu' is the informal version used with friends."
      ru: "'Anda' — это вежливое 'вы/ты', используется с незнакомыми людьми или в
        официальных ситуациях; 'kamu' — неформальный вариант для друзей."
    sentences:
      - id: module-1-0001-s1
        text: Anda tinggal di mana?
        blank: Anda
        en: Where do you live?
      - id: module-1-0001-s2
        text: Apakah Anda mau kopi?
        blank: Anda
        en: Do you want coffee?
      - id: module-1-0001-s3
        text: Nama Anda siapa?
        blank: Anda
        en: What is your name?
  - id: module-1-0002
    indonesian: apa kabar?
    english: How are you?
    note:
      en: '"Apa kabar?" is an informal, everyday greeting used between friends and
        acquaintances; respond with "baik" (good) or "baik-baik saja" (fine);
        literally means "what news?"'
      ru: "«Apa kabar?» — неформальное повседневное приветствие, используемое между
        друзьями и знакомыми; ответ: «baik» (хорошо) или «baik-baik saja» (всё
        хорошо); буквально означает «какие новости?»"
    sentences:
      - id: module-1-0002-s1
        text: Halo, apa kabar hari ini?
        blank: apa kabar
        en: Hello, how are you today?
      - id: module-1-0002-s2
        text: Pak Wayan, apa kabar?
        blank: apa kabar
        en: Mr. Wayan, how are you?
      - id: module-1-0002-s3
        text: Teman saya tanya apa kabar.
        blank: apa kabar
        en: My friend asked how I am.
  - id: module-1-0003
    indonesian: apa?
    english: what
    audio: 08d444fe7b57.ogg
    note:
      en: "'Apa?' means 'what' and is used in both formal and informal speech; it also
        appears in yes/no questions as a sentence-opener (e.g. 'Apa kamu
        suka...?'); related: 'apa-apa' (anything/nothing)."
      ru: "'Apa?' означает 'что' и используется как в формальной, так и в неформальной
        речи; также ставится в начале вопросов для уточнения (например, 'Apa
        kamu suka...?'); связанное слово: 'apa-apa' (что-либо/ничего)."
    sentences:
      - id: module-1-0003-s1
        text: Ini apa?
        blank: apa
        en: What is this?
      - id: module-1-0003-s2
        text: Kamu mau makan apa hari ini?
        blank: apa
        en: What do you want to eat today?
      - id: module-1-0003-s3
        text: Nama tempat itu apa?
        blank: apa
        en: What is the name of that place?
  - id: module-1-0004
    indonesian: baik-baik saja
    english: fine, good (in reply to 'How are you?')
    audio: 83e3f3a8a3dc.ogg
    note:
      en: "Used as a polite reply meaning 'I'm fine'; often heard as a response to
        'Apa kabar?'; related phrase: 'tidak apa-apa' (it's okay/no problem)."
      ru: "Вежливый ответ со значением «всё хорошо»; часто звучит в ответ на «Apa
        kabar?»; похожая фраза: «tidak apa-apa» (всё в порядке/ничего
        страшного)."
    sentences:
      - id: module-1-0004-s1
        text: Saya baik-baik saja, terima kasih.
        blank: baik-baik saja
        en: I am fine, thank you.
      - id: module-1-0004-s2
        text: Dia baik-baik saja di Bali.
        blank: baik-baik saja
        en: She is fine in Bali.
      - id: module-1-0004-s3
        text: Kami semua baik-baik saja hari ini.
        blank: baik-baik saja
        en: We are all fine today.
  - id: module-1-0005
    indonesian: biasa
    english: usual, ordinary, normal
    audio: a6c4a9f256ad.ogg
    note:
      en: "'Biasa' means usual/ordinary/normal; 'biasa saja' means just okay/nothing
        special; often confused with 'normal' (borrowed word); related: 'seperti
        biasa' = as usual"
      ru: "'Biasa' означает обычный/нормальный; 'biasa saja' — просто так/ничего
        особенного; часто путают с 'normal' (заимствованное слово); связанное:
        'seperti biasa' = как обычно"
    sentences:
      - id: module-1-0005-s1
        text: Saya minum kopi seperti biasa setiap pagi.
        blank: biasa
        en: I drink coffee as usual every morning.
      - id: module-1-0005-s2
        text: Ini adalah hari yang biasa saja.
        blank: biasa
        en: This is just an ordinary day.
      - id: module-1-0005-s3
        text: Harga di pasar ini biasa saja.
        blank: biasa
        en: The prices at this market are normal.
  - id: module-1-0006
    indonesian: dan
    english: and
    audio: 4ced0824f2cc.ogg
    note:
      en: "'Dan' means 'and', used to connect nouns or clauses; neutral register, very
        common in speech and writing; similar to 'serta' (more formal) or 'sama'
        (informal spoken)."
      ru: "'Dan' означает 'и', используется для соединения существительных или
        предложений; нейтральный стиль, очень распространено в речи и письме;
        похоже на 'serta' (более официально) или 'sama' (разговорное)."
    sentences:
      - id: module-1-0006-s1
        text: Saya makan nasi dan ayam.
        blank: dan
        en: I eat rice and chicken.
      - id: module-1-0006-s2
        text: Dia membeli kopi dan teh.
        blank: dan
        en: She buys coffee and tea.
      - id: module-1-0006-s3
        text: Pantai ini indah dan bersih.
        blank: dan
        en: This beach is beautiful and clean.
  - id: module-1-0007
    indonesian: duduk
    english: to sit, to sit down
    audio: 287e5fcdc12d.ogg
    note:
      en: "'Duduk' means to sit or sit down; often paired with 'di' (at/on) to
        indicate location, e.g. 'duduk di kursi' (sit on the chair); related
        word: 'tempat duduk' (seat)."
      ru: "'Duduk' означает 'сидеть' или 'садиться'; часто используется с предлогом
        'di' для указания места, например 'duduk di kursi' (сидеть на стуле);
        связанное слово: 'tempat duduk' (место для сидения)."
    sentences:
      - id: module-1-0007-s1
        text: Saya duduk di kursi merah.
        blank: duduk
        en: I am sitting on the red chair.
      - id: module-1-0007-s2
        text: Anak itu duduk di lantai.
        blank: duduk
        en: That child is sitting on the floor.
      - id: module-1-0007-s3
        text: Mari duduk di sini bersama.
        blank: duduk
        en: Let's sit here together.
  - id: module-1-0008
    indonesian: kenalkan
    english: This is ... (when you are introducing someone)
    audio: cc5440cedfec.ogg
    note:
      en: "'Kenalkan' is an informal contraction of 'perkenalkan' (formal); use it
        when introducing a person, not a thing; often followed by 'ini' or a
        name."
      ru: "'Kenalkan' — неформальное сокращение от 'perkenalkan' (формальное);
        используется при представлении человека, не предмета; часто следует
        'ini' или имя."
    sentences:
      - id: module-1-0008-s1
        text: Kenalkan, ini teman saya, Budi.
        blank: Kenalkan
        en: This is my friend, Budi.
      - id: module-1-0008-s2
        text: Kenalkan, nama saya adalah Sari.
        blank: Kenalkan
        en: Let me introduce myself — my name is Sari.
      - id: module-1-0008-s3
        text: Kenalkan, ini kakak saya.
        blank: Kenalkan
        en: This is my older sibling.
  - id: module-1-0009
    indonesian: makan
    english: to eat
    audio: 827ab6accccd.ogg
    note:
      en: "'Makan' means 'to eat' and is used for all meals; related words include
        'makanan' (food) and 'minum' (to drink); it is neutral register and very
        common in daily speech."
      ru: "'Makan' означает 'есть/кушать' и используется для всех приёмов пищи;
        связанные слова: 'makanan' (еда) и 'minum' (пить); нейтральный стиль
        речи, очень употребительно в повседневной жизни."
    sentences:
      - id: module-1-0009-s1
        text: Saya makan nasi setiap hari.
        blank: makan
        en: I eat rice every day.
      - id: module-1-0009-s2
        text: Ayo kita makan di warung ini.
        blank: makan
        en: Let's eat at this small restaurant.
      - id: module-1-0009-s3
        text: Dia makan buah setiap pagi.
        blank: makan
        en: She eats fruit every morning.
  - id: module-1-0010
    indonesian: malam
    english: night
    audio: 75407b681ff9.ogg
    note:
      en: "'Malam' means 'night' and is also used as a greeting 'Selamat malam' (Good
        evening/night); do not confuse with 'malam-malam' which means 'late at
        night'."
      ru: "'Malam' означает 'ночь' и используется в приветствии 'Selamat malam'
        (Добрый вечер/ночи); не путайте с 'malam-malam', что означает 'поздно
        ночью'."
    sentences:
      - id: module-1-0010-s1
        text: Selamat malam, apa kabar?
        blank: malam
        en: Good evening, how are you?
      - id: module-1-0010-s2
        text: Malam ini ada pertunjukan tari Bali.
        blank: malam
        en: Tonight there is a Balinese dance show.
      - id: module-1-0010-s3
        text: Saya tidur lebih awal malam ini.
        blank: malam
        en: I am going to sleep early tonight.
  - id: module-1-0011
    indonesian: masuk
    english: to go in, to come in, to enter
    audio: c1859d5aa1c3.ogg
    note:
      en: "'Masuk' is a common everyday verb used for entering rooms, buildings, or
        joining groups; opposite is 'keluar' (to go out)."
      ru: "'Masuk' — распространённый глагол, означающий вход в комнату, здание или
        вступление в группу; антоним — 'keluar' (выходить)."
    sentences:
      - id: module-1-0011-s1
        text: Silakan masuk ke dalam rumah.
        blank: masuk
        en: Please come in to the house.
      - id: module-1-0011-s2
        text: Anak-anak masuk ke sekolah pagi ini.
        blank: masuk
        en: The children go into school this morning.
      - id: module-1-0011-s3
        text: Dia masuk ke kamar mandi.
        blank: masuk
        en: He goes into the bathroom.
  - id: module-1-0012
    indonesian: minum
    english: to drink
    audio: 8222f3a2ea62.ogg
    note:
      en: "'Minum' means 'to drink'; used for all beverages; related word 'minuman'
        means 'drink/beverage' (noun); not to be confused with 'makan' (to
        eat)."
      ru: "'Minum' означает 'пить'; используется для любых напитков; родственное слово
        'minuman' означает 'напиток' (существительное); не путать с 'makan'
        (есть)."
    sentences:
      - id: module-1-0012-s1
        text: Saya minum air setiap pagi.
        blank: minum
        en: I drink water every morning.
      - id: module-1-0012-s2
        text: Dia minum kopi di warung.
        blank: minum
        en: She drinks coffee at the small café.
      - id: module-1-0012-s3
        text: Anak itu minum jus jeruk.
        blank: minum
        en: That child drinks orange juice.
  - id: module-1-0013
    indonesian: nama
    english: (someone's) name, the name (of something)
    audio: 32566ae61708.ogg
    note:
      en: "'Nama' is a neutral, everyday word for 'name'; commonly used in
        introductions with 'Nama saya...' (My name is...); related phrase:
        'siapa namamu?' (what is your name?)."
      ru: "'Nama' — нейтральное повседневное слово для обозначения имени; часто
        используется в представлениях: 'Nama saya...' (Меня зовут...); связанная
        фраза: 'siapa namamu?' (как тебя зовут?)."
    sentences:
      - id: module-1-0013-s1
        text: Nama saya Budi.
        blank: Nama
        en: My name is Budi.
      - id: module-1-0013-s2
        text: Siapa nama teman kamu?
        blank: nama
        en: What is your friend's name?
      - id: module-1-0013-s3
        text: Nama restoran itu sangat unik.
        blank: Nama
        en: The name of that restaurant is very unique.
  - id: module-1-0014
    indonesian: pagi
    english: morning
    audio: 207953499045.ogg
    note:
      en: "'Pagi' means 'morning' and is also used as an informal greeting 'Selamat
        pagi' (Good morning); related words: 'siang' (midday), 'sore'
        (afternoon), 'malam' (evening/night)."
      ru: "'Pagi' означает 'утро' и используется в приветствии 'Selamat pagi' (Доброе
        утро); связанные слова: 'siang' (полдень), 'sore' (вечер), 'malam'
        (ночь)."
    sentences:
      - id: module-1-0014-s1
        text: Selamat pagi, Bu Made!
        blank: pagi
        en: Good morning, Mrs. Made!
      - id: module-1-0014-s2
        text: Saya minum kopi setiap pagi.
        blank: pagi
        en: I drink coffee every morning.
      - id: module-1-0014-s3
        text: Pasar ramai di pagi hari.
        blank: pagi
        en: The market is busy in the morning.
  - id: module-1-0015
    indonesian: saja
    english: just, only
    audio: 6f49c8f68eb4.ogg
    note:
      en: "'Saja' means 'just/only' and is placed after the word it limits; very
        common in casual speech, often confused with 'hanya' which is more
        formal and placed before the word."
      ru: "'Saja' означает 'просто/только' и ставится после ограничиваемого слова;
        очень распространено в разговорной речи, часто путают с 'hanya' — более
        формальным словом, которое ставится перед словом."
    sentences:
      - id: module-1-0015-s1
        text: Saya mau air saja, terima kasih.
        blank: saja
        en: I just want water, thank you.
      - id: module-1-0015-s2
        text: Dia beli satu saja di pasar.
        blank: saja
        en: She bought only one at the market.
      - id: module-1-0015-s3
        text: Tunggu sebentar saja, ya!
        blank: saja
        en: Just wait a moment, okay!
  - id: module-1-0016
    indonesian: saya
    english: I, me
    audio: 71960c6d1cc4.ogg
    note:
      en: "'Saya' is a polite, neutral first-person pronoun; more formal than 'aku',
        suitable for talking to strangers or in most everyday situations."
      ru: "'Saya' — вежливое нейтральное местоимение первого лица; более формальное,
        чем 'aku', подходит для общения с незнакомыми людьми и большинства
        повседневных ситуаций."
    sentences:
      - id: module-1-0016-s1
        text: Saya mau pesan nasi goreng.
        blank: Saya
        en: I want to order fried rice.
      - id: module-1-0016-s2
        text: Nama saya adalah Budi.
        blank: saya
        en: My name is Budi.
      - id: module-1-0016-s3
        text: Saya tinggal di Bali.
        blank: Saya
        en: I live in Bali.
  - id: module-1-0017
    indonesian: selamat
    english: "safe (from trouble), Also: Congratulations!"
    audio: dc9459172fd4.ogg
    note:
      en: '"Selamat" means both "safe/well" and is used in congratulatory phrases like
        "Selamat pagi" (Good morning) or "Selamat ulang tahun" (Happy birthday);
        very common in greetings.'
      ru: «Selamat» означает и «в безопасности/благополучно», и используется в
        поздравлениях, например «Selamat pagi» (Доброе утро) или «Selamat ulang
        tahun» (С днём рождения); очень часто встречается в приветствиях.
    sentences:
      - id: module-1-0017-s1
        text: Selamat pagi, Bu Wayan!
        blank: Selamat
        en: Good morning, Mrs. Wayan!
      - id: module-1-0017-s2
        text: Selamat ulang tahun, ya!
        blank: Selamat
        en: Happy birthday!
      - id: module-1-0017-s3
        text: Dia selamat dari kecelakaan itu.
        blank: selamat
        en: He was safe from that accident.
  - id: module-1-0018
    indonesian: siang
    english: late morning to mid afternoon
    audio: b673cc409feb.ogg
    note:
      en: "'Siang' covers roughly 11am–3pm; often used in greetings ('Selamat siang')
        and confused with 'sore' (late afternoon) or 'malam' (evening/night)."
      ru: "'Siang' охватывает примерно 11:00–15:00; часто используется в приветствиях
        ('Selamat siang') и путается с 'sore' (поздний день) или 'malam'
        (вечер/ночь)."
    sentences:
      - id: module-1-0018-s1
        text: Selamat siang, apa kabar?
        blank: siang
        en: Good afternoon, how are you?
      - id: module-1-0018-s2
        text: Saya makan siang di warung.
        blank: siang
        en: I eat lunch at the food stall.
      - id: module-1-0018-s3
        text: Hari ini sangat panas di siang hari.
        blank: siang
        en: Today is very hot in the afternoon.
  - id: module-1-0019
    indonesian: siapa
    english: who
    audio: 4f2974169d23.ogg
    note:
      en: "'Siapa' means 'who' and is used for people only; do not confuse with 'apa'
        (what) or 'mana' (which/where)."
      ru: "'Siapa' означает 'кто' и используется только для людей; не путайте с 'apa'
        (что) или 'mana' (который/где)."
    sentences:
      - id: module-1-0019-s1
        text: Siapa nama kamu?
        blank: Siapa
        en: What is your name? (lit. Who is your name?)
      - id: module-1-0019-s2
        text: Dia siapa?
        blank: siapa
        en: Who is she/he?
      - id: module-1-0019-s3
        text: Siapa guru bahasa Indonesia kamu?
        blank: Siapa
        en: Who is your Indonesian language teacher?
  - id: module-1-0020
    indonesian: silakan
    english: please (go ahead and...)
    audio: 361471be94a3.ogg
    note:
      en: "'Silakan' is a polite word meaning 'please go ahead' or 'you are welcome
        to'; often used to invite someone to do something, not to be confused
        with 'tolong' which asks for help."
      ru: "'Silakan' — вежливое слово, означающее 'пожалуйста, проходите' или 'прошу
        вас'; используется для приглашения кого-либо что-то сделать, не путать с
        'tolong', которое означает просьбу о помощи."
    sentences:
      - id: module-1-0020-s1
        text: Silakan duduk di kursi ini.
        blank: Silakan
        en: Please go ahead and sit in this chair.
      - id: module-1-0020-s2
        text: Silakan makan, makanannya sudah siap.
        blank: Silakan
        en: Please go ahead and eat, the food is ready.
      - id: module-1-0020-s3
        text: Silakan masuk ke dalam rumah.
        blank: Silakan
        en: Please come inside the house.
  - id: module-1-0021
    indonesian: sore
    english: mid afternoon to early evening
    audio: 9898825581dc.ogg
    note:
      en: "'Sore' means roughly 3–6 PM; do not confuse with 'malam' (night) or 'siang'
        (midday); commonly used in greetings as 'selamat sore'."
      ru: "'Sore' означает примерно 15:00–18:00; не путайте с 'malam' (ночь) или
        'siang' (полдень); часто используется в приветствии 'selamat sore'."
    sentences:
      - id: module-1-0021-s1
        text: Selamat sore, apa kabar?
        blank: sore
        en: Good afternoon, how are you?
      - id: module-1-0021-s2
        text: Saya minum teh pada sore hari.
        blank: sore
        en: I drink tea in the afternoon.
      - id: module-1-0021-s3
        text: Dia pulang ke rumah sore ini.
        blank: sore
        en: He goes home this afternoon.
  - id: module-1-0022
    indonesian: terima kasih
    english: thank you
    audio: 57b688b15143.ogg
    note:
      en: "\"Terima kasih\" is neutral and polite in all registers; the informal
        shortening \"makasih\" is very common in casual speech; the response is
        \"sama-sama\" (you're welcome)."
      ru: «Terima kasih» — нейтральное вежливое выражение для любого стиля общения; в
        разговорной речи часто сокращают до «makasih»; ответ на благодарность —
        «sama-sama» (пожалуйста).
    sentences:
      - id: module-1-0022-s1
        text: Terima kasih atas bantuannya, Pak.
        blank: Terima kasih
        en: Thank you for your help, Sir.
      - id: module-1-0022-s2
        text: Saya bilang terima kasih kepada ibu.
        blank: terima kasih
        en: I said thank you to the woman.
      - id: module-1-0022-s3
        text: Terima kasih, nasinya enak sekali!
        blank: Terima kasih
        en: Thank you, the rice is very delicious!
  - id: module-1-0023
    indonesian: Amerika Serikat
    english: The United States of America
    audio: e39540866899.ogg
    note:
      en: '"Amerika Serikat" is the formal name for the USA; informally Indonesians
        also say "Amerika" alone. Do not confuse with "Amerika Selatan" (South
        America).'
      ru: '"Amerika Serikat" — официальное название США; в разговорной речи
        индонезийцы также говорят просто "Amerika". Не путайте с "Amerika
        Selatan" (Южная Америка).'
    sentences:
      - id: module-1-0023-s1
        text: Dia berasal dari Amerika Serikat.
        blank: Amerika Serikat
        en: He/She is from the United States of America.
      - id: module-1-0023-s2
        text: Ibu ingin pergi ke Amerika Serikat.
        blank: Amerika Serikat
        en: Mom wants to go to the United States of America.
      - id: module-1-0023-s3
        text: Amerika Serikat adalah negara yang besar.
        blank: Amerika Serikat
        en: The United States of America is a big country.
