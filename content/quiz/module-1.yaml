        text: Sana dulu, adik, kami mau bicara.
        blank: sana
        en: Off you go for now, little one, we need to talk.
      - id: module-1-0161-s3
        text: Ayo sana, toko sudah mau tutup.
        blank: sana
        en: Off you go, the shop is about to close.
