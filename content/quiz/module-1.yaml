      - id: module-1-0142-s2
        text: Berapa harga bemo ke stasiun?
        blank: bemo
        en: How much is the bemo to the station?
      - id: module-1-0142-s3
        text: Bemo itu penuh dengan penumpang.
        blank: Bemo
        en: The bemo is full of passengers.
  - id: module-1-0143
    indonesian: berjalan
    english: to go, to move forward, to walk
    audio: 0d6382061af9.ogg
    note:
      en: "'Berjalan' means to walk or move forward; often confused with 'pergi' (to
        go somewhere); related words: 'jalan' (road/walk), 'berjalan-jalan' (to
        take a stroll)."
      ru: "'Berjalan' означает идти пешком или двигаться вперёд; часто путают с
        'pergi' (уходить куда-то); связанные слова: 'jalan' (дорога/ходьба),
        'berjalan-jalan' (прогуливаться)."
    sentences:
      - id: module-1-0143-s1
        text: Saya berjalan ke pasar setiap pagi.
        blank: berjalan
