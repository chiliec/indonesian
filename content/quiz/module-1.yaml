    indonesian: mobil
    english: car
    audio: de904f84c968.ogg
    note:
      en: "'Mobil' means car (four-wheeled vehicle); distinct from 'motor'
        (motorcycle), which is very common in Indonesia."
      ru: "'Mobil' означает легковой автомобиль; не путайте с 'motor' (мотоцикл),
