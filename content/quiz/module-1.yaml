      - id: module-1-0160-s2
        text: Pesawat terbang itu sangat besar.
        blank: pesawat terbang
        en: That aeroplane is very big.
      - id: module-1-0160-s3
        text: Dia melihat pesawat terbang di langit.
        blank: pesawat terbang
        en: He sees an aeroplane in the sky.
  - id: module-1-0161
    indonesian: sana
    english: off you go
    audio: a1d8c052b2fa.ogg
