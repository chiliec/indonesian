    sentences:
      - id: module-1-0162-s1
        text: Saya naik sepeda ke sekolah setiap hari.
        blank: sepeda
        en: I ride a bicycle to school every day.
      - id: module-1-0162-s2
        text: Ini sepeda baru saya.
        blank: sepeda
        en: This is my new bicycle.
      - id: module-1-0162-s3
        text: Anak itu bermain sepeda di taman.
        blank: sepeda
        en: That child is riding a bicycle in the park.
