        text: Kami berjalan di pantai sore ini.
        blank: berjalan
        en: We walk on the beach this afternoon.
      - id: module-1-0143-s3
        text: Dia berjalan pelan-pelan ke warung.
        blank: berjalan
        en: He walks slowly to the small shop.
  - id: module-1-0144
    indonesian: bus
    english: bus
    audio: b193fd861428.ogg
    note:
      en: '"Bus" is used in Indonesian just like in English; also commonly heard as
        "bis" in informal speech.'
      ru: '"Bus" используется в индонезийском так же, как в английском; в разговорной
        речи часто говорят "bis".'
    sentences:
      - id: module-1-0144-s1
        text: Saya naik bus ke sekolah setiap hari.
        blank: bus
        en: I take the bus to school every day.
      - id: module-1-0144-s2
        text: Bus ini pergi ke Kuta.
        blank: bus
        en: This bus goes to Kuta.
      - id: module-1-0144-s3
        text: Di mana halte bus terdekat?
        blank: bus
        en: Where is the nearest bus stop?
  - id: module-1-0145
    indonesian: dari sana
    english: (from) there
    audio: d1b27c912884.ogg
    note:
      en: "'Dari sana' means 'from there'; 'sana' alone means 'there (far)', often
        confused with 'sini' (here) and 'situ' (there, closer)."
      ru: "'Dari sana' означает 'оттуда'; 'sana' само по себе значит 'там (далеко)',
        часто путают с 'sini' (здесь) и 'situ' (там, поближе)."
    sentences:
      - id: module-1-0145-s1
        text: Dia baru datang dari sana tadi.
        blank: dari sana
        en: He just came from there a moment ago.
      - id: module-1-0145-s2
        text: Oleh-oleh ini saya beli dari sana.
        blank: dari sana
        en: I bought this souvenir from there.
      - id: module-1-0145-s3
        text: Kamu bisa jalan kaki dari sana.
        blank: dari sana
        en: You can walk from there.
  - id: module-1-0146
    indonesian: datang
    english: to come
    audio: a663e6af91a3.ogg
    note:
      en: "'Datang' means 'to come' or 'to arrive'; it is neutral/everyday register
        and often confused with 'pergi' (to go); related words include
        'kedatangan' (arrival)."
      ru: "'Datang' означает 'приходить' или 'приезжать'; это нейтральное повседневное
        слово, которое часто путают с 'pergi' (уходить/уезжать); родственное
        слово — 'kedatangan' (прибытие)."
    sentences:
      - id: module-1-0146-s1
        text: Dia datang ke pasar setiap pagi.
        blank: datang
        en: She comes to the market every morning.
      - id: module-1-0146-s2
        text: Teman saya datang dari Bali.
        blank: datang
        en: My friend comes from Bali.
      - id: module-1-0146-s3
        text: Kapan kamu datang ke sini?
        blank: datang
        en: When are you coming here?
  - id: module-1-0147
    indonesian: di sini
    english: here
    audio: a42a9d7b8588.ogg
    note:
      en: "'Di sini' means 'here' (a location); don't confuse with 'di sana' (there)
        or 'di mana' (where); used in both formal and informal speech."
      ru: "'Di sini' означает 'здесь'; не путайте с 'di sana' (там) и 'di mana' (где);
        используется как в формальной, так и в неформальной речи."
    sentences:
      - id: module-1-0147-s1
        text: Saya tinggal di sini.
        blank: di sini
        en: I live here.
      - id: module-1-0147-s2
        text: Tolong duduk di sini, ya.
        blank: di sini
        en: Please sit here, okay.
      - id: module-1-0147-s3
        text: Ada pantai indah di sini.
        blank: di sini
        en: There is a beautiful beach here.
  - id: module-1-0148
    indonesian: dokar
    english: horse cart
    audio: 121a2dcae7bd.ogg
    note:
      en: A 'dokar' is a traditional two-wheeled horse-drawn cart; common in rural
        Indonesia and Bali; also called 'delman' in some regions.
      ru: "'Dokar' — традиционная двухколёсная повозка, запряжённая лошадью;
        распространена в сельской Индонезии и на Бали; в некоторых регионах
        называется 'delman'."
    sentences:
      - id: module-1-0148-s1
        text: Kami naik dokar ke pasar pagi ini.
        blank: dokar
        en: We rode a horse cart to the market this morning.
      - id: module-1-0148-s2
        text: Dokar itu ditarik oleh seekor kuda.
        blank: dokar
        en: That horse cart is pulled by a horse.
      - id: module-1-0148-s3
        text: Adik suka naik dokar di desa.
        blank: dokar
        en: My younger sibling likes riding the horse cart in the village.
  - id: module-1-0149
    indonesian: harus
    english: must, have to
    audio: 89838109fe00.ogg
    note:
      en: "'Harus' expresses obligation or necessity; similar to 'wajib' (more formal)
        but more common in everyday speech."
      ru: "'Harus' выражает обязательность или необходимость; похоже на 'wajib' (более
        формальное), но чаще используется в повседневной речи."
    sentences:
      - id: module-1-0149-s1
        text: Kamu harus minum air setiap hari.
        blank: harus
        en: You must drink water every day.
      - id: module-1-0149-s2
        text: Saya harus pergi ke pasar sekarang.
        blank: harus
        en: I have to go to the market now.
      - id: module-1-0149-s3
        text: Dia harus tidur lebih awal.
        blank: harus
        en: She has to sleep earlier.
  - id: module-1-0150
    indonesian: kaki
    english: leg, foot
    audio: 386c87823674.ogg
    note:
      en: "'Kaki' means both 'leg' and 'foot' in Indonesian; also used in 'kaki lima'
        (street vendor stall); not to be confused with 'tangan' (hand/arm)."
      ru: "'Kaki' означает и 'нога', и 'ступня' по-индонезийски; также входит в
        выражение 'kaki lima' (уличный торговец); не путать с 'tangan' (рука)."
    sentences:
      - id: module-1-0150-s1
        text: Kaki saya sakit setelah berjalan jauh.
        blank: Kaki
        en: My leg hurts after walking far.
      - id: module-1-0150-s2
        text: Dia mencuci kaki sebelum masuk rumah.
        blank: kaki
        en: She washes her feet before entering the house.
      - id: module-1-0150-s3
        text: Kaki anak itu kecil sekali.
        blank: Kaki
        en: That child's feet are very small.
  - id: module-1-0151
    indonesian: kapal
    english: ship
    audio: 0c9000a5dee2.ogg
    note:
      en: "'Kapal' means ship or large boat; for small boats use 'perahu'; common in
        island travel contexts."
      ru: "'Kapal' означает корабль или большое судно; для маленьких лодок используйте
        'perahu'; часто встречается в контексте путешествий между островами."
    sentences:
      - id: module-1-0151-s1
        text: Kapal itu besar dan putih.
        blank: Kapal
        en: That ship is big and white.
      - id: module-1-0151-s2
        text: Saya naik kapal ke Lombok.
        blank: kapal
        en: I take a ship to Lombok.
      - id: module-1-0151-s3
        text: Kapal berangkat jam delapan pagi.
        blank: Kapal
        en: The ship departs at eight in the morning.
  - id: module-1-0152
    indonesian: katanya
    english: I heard that..., they say..., people say that...
    audio: 6578ca1d8a0b.ogg
    note:
      en: "'Katanya' is casual/informal, used to report hearsay; it combines 'kata'
        (word/say) + '-nya' (he/she/they); avoid in formal writing."
      ru: "'Katanya' — разговорное слово для передачи слухов или чужих слов; состоит
        из 'kata' (слово/говорить) + '-nya' (он/она/они); не используется в
        официальной речи."
    sentences:
      - id: module-1-0152-s1
        text: Katanya pantai ini sangat indah.
        blank: Katanya
        en: I heard that this beach is very beautiful.
      - id: module-1-0152-s2
        text: Restoran itu enak, katanya.
        blank: katanya
        en: That restaurant is delicious, they say.
      - id: module-1-0152-s3
        text: Katanya besok ada pasar malam.
        blank: Katanya
        en: I heard there is a night market tomorrow.
  - id: module-1-0153
    indonesian: ke sana
    english: (to) there
    audio: 7d17da43e8c0.ogg
    note:
      en: "'Ke sana' means moving toward 'there' (away from speaker); contrast with
        'di sana' (at/in there, no movement) and 'dari sana' (from there)."
      ru: "'Ke sana' означает движение 'туда' (от говорящего); не путайте с 'di sana'
        (там, без движения) и 'dari sana' (оттуда)."
    sentences:
      - id: module-1-0153-s1
        text: Saya mau pergi ke sana besok.
        blank: ke sana
        en: I want to go there tomorrow.
      - id: module-1-0153-s2
        text: Ayo kita jalan ke sana sekarang.
        blank: ke sana
        en: Let's walk there now.
      - id: module-1-0153-s3
        text: Bus ini pergi ke sana.
        blank: ke sana
        en: This bus goes there.
  - id: module-1-0154
    indonesian: ke sini
    english: (to) here
    audio: 438964d6a043.ogg
    note:
      en: "'Ke sini' means movement toward the speaker ('come here'); contrast with
        'ke sana' (there, away from speaker) and 'di sini' (here, no movement)."
      ru: "'Ke sini' означает движение к говорящему ('сюда'); не путайте с 'ke sana'
        (туда, от говорящего) и 'di sini' (здесь, без движения)."
    sentences:
      - id: module-1-0154-s1
        text: Ayo datang ke sini sekarang!
        blank: ke sini
