      ru: "'Pesawat terbang' означает самолёт; в повседневной речи часто сокращается
        до 'pesawat'; не путать с 'kapal' (корабль) и 'kereta' (поезд)."
    sentences:
      - id: module-1-0160-s1
        text: Saya naik pesawat terbang ke Bali.
        blank: pesawat terbang
