      - id: module-1-0159-s2
        text: Dia pergi ke pantai bersama teman.
        blank: pergi
        en: She goes to the beach with a friend.
      - id: module-1-0159-s3
        text: Kami pergi ke sekolah naik motor.
        blank: pergi
        en: We go to school by motorbike.
  - id: module-1-0160
    indonesian: pesawat terbang
    english: aeroplane
    audio: 26d4e4547583.ogg
    note:
      en: "'Pesawat terbang' means aeroplane; often shortened to just 'pesawat' in
        everyday speech; not to be confused with 'kapal' (ship) or 'kereta'
