    indonesian: becak
    english: a three-wheeled pedicab
    audio: df41568163c7.ogg
    note:
      en: "Becak is an everyday word for a three-wheeled cycle rickshaw; common in
        Java and Sumatra but rare in Bali; related word: 'ojek' (motorcycle
        taxi)."
      ru: "Becak — повседневное слово для трёхколёсного велорикши; распространено на
        Яве и Суматре, но редко встречается на Бали; похожее слово: 'ojek'
        (мотоциклетное такси)."
    sentences:
      - id: module-1-0141-s1
        text: Saya naik becak ke pasar pagi.
        blank: becak
