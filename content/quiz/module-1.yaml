      ru: "'Kereta api' означает поезд (букв. 'огненный экипаж'); в разговорной речи
        часто сокращается до 'kereta'; не путать со старым значением слова
        'kereta' — повозка или карета."
    sentences:
      - id: module-1-0156-s1
        text: Saya naik kereta api ke Jakarta.
        blank: kereta api
        en: I take the train to Jakarta.
      - id: module-1-0156-s2
        text: Kereta api itu cepat dan murah.
        blank: kereta api
        en: That train is fast and cheap.
      - id: module-1-0156-s3
        text: Di mana stasiun kereta api ini?
        blank: kereta api
        en: Where is this train station?
