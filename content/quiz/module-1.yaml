      - id: module-1-0157-s2
        text: Mobil itu warnanya merah.
        blank: Mobil
        en: That car is red.
      - id: module-1-0157-s3
        text: Bapak mencuci mobil di depan rumah.
        blank: mobil
        en: Dad washes the car in front of the house.
  - id: module-1-0158
