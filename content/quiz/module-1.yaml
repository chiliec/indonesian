        equally common and natural."
      ru: "\"Kembali\" означает и 'вернуться/возвращаться', и 'пожалуйста' (в ответ на
        'спасибо'); в магазинах также можно услышать \"sama-sama\", но
        \"kembali\" столь же распространено."
    sentences:
      - id: module-1-0155-s1
        text: Saya ingin kembali ke Bali besok.
        blank: kembali
        en: I want to go back to Bali tomorrow.
      - id: module-1-0155-s2
        text: Terima kasih! — Kembali.
        blank: Kembali
        en: Thank you! — You're welcome.
      - id: module-1-0155-s3
        text: Dia kembali ke rumah sore ini.
        blank: kembali
        en: She comes back home this afternoon.
  - id: module-1-0156
    indonesian: kereta api
    english: train
    audio: 13fd93bdc229.ogg
