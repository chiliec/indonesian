      - id: module-1-0141-s2
        text: Becak itu berwarna kuning dan biru.
        blank: becak
        en: That pedicab is yellow and blue.
      - id: module-1-0141-s3
        text: Berapa harga naik becak ke sini?
        blank: becak
        en: How much does it cost to ride a pedicab here?
  - id: module-1-0142
    indonesian: bemo
    english: a three-wheeled taxicab
    audio: eb08a4291460.ogg
    note:
      en: '"Bemo" is an informal, everyday word for a small three-wheeled or minivan
        taxi common in Indonesia; older and more regional than "taksi".'
      ru: «Bemo» — разговорное повседневное слово для маленького трёхколёсного такси
        или маршрутки, распространённого в Индонесии; более старое и
        региональное, чем «taksi».
    sentences:
      - id: module-1-0142-s1
        text: Saya naik bemo ke pasar pagi.
        blank: bemo
