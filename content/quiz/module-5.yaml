id: module-5
title:
  en: Module 5
cards:
  - id: module-5-0001
    indonesian: berganti
    english: to have one thing replaced with another, to change
    audio: 44aa1bd77f64.ogg
    note:
      en: "'Berganti' means something changes or is replaced (e.g. clothes, seasons,
        shifts); related to 'ganti' (replace/change), often used in everyday
        contexts like changing clothes or shifts."
    sentences:
      - id: module-5-0001-s1
        text: Dia berganti baju sebelum pergi ke sekolah.
        blank: berganti
        en: She changes her clothes before going to school.
      - id: module-5-0001-s2
        text: Musim hujan berganti menjadi musim panas.
        blank: berganti
        en: The rainy season changes into the dry season.
      - id: module-5-0001-s3
        text: Ayah berganti sepatu di depan rumah.
        blank: berganti
        en: Dad changes his shoes in front of the house.
  - id: module-5-0002
    indonesian: berubah
    english: to change, to evolve, to be different from before
    audio: a61dde0a1087.ogg
    note:
      en: '"Berubah" is a common everyday verb meaning something has changed state;
        often confused with "mengubah" (to actively change something); related
        words: "perubahan" (change/noun), "berubah-ubah" (keeps changing).'
    sentences:
      - id: module-5-0002-s1
        text: Cuaca di Bali sering berubah.
        blank: berubah
        en: The weather in Bali often changes.
      - id: module-5-0002-s2
        text: Harga makanan itu sudah berubah.
        blank: berubah
        en: The price of that food has already changed.
      - id: module-5-0002-s3
        text: Dia berubah setelah tinggal di sini.
        blank: berubah
        en: She changed after living here.
  - id: module-5-0003
    indonesian: kata kerja
    english: a verb
    audio: f904beba4310.ogg
    note:
      en: "'Kata kerja' literally means 'action word' and is the standard term for
        verb in Indonesian grammar; beginners often confuse it with 'kata benda'
        (noun) or 'kata sifat' (adjective)."
    sentences:
      - id: module-5-0003-s1
        text: "'Makan' adalah kata kerja dalam bahasa Indonesia."
        blank: kata kerja
        en: "'Makan' (eat) is a verb in the Indonesian language."
      - id: module-5-0003-s2
        text: Guru menjelaskan apa itu kata kerja.
        blank: kata kerja
        en: The teacher explains what a verb is.
      - id: module-5-0003-s3
        text: Saya belajar kata kerja baru hari ini.
        blank: kata kerja
        en: I learned a new verb today.
  - id: module-5-0004
    indonesian: memukul (pukul)
    english: to hit someone/something, to strike
    audio: 0790f1271bd4.ogg
    note:
      en: Informal/neutral verb; 'pukul' is the root, 'memukul' is the active form;
        also note 'pukul' separately means 'o'clock' (e.g., pukul tiga = 3
        o'clock).
    sentences:
      - id: module-5-0004-s1
        text: Anak itu memukul bola dengan keras.
        blank: memukul
        en: That child hits the ball hard.
      - id: module-5-0004-s2
        text: Jangan memukul temanmu di sekolah.
        blank: memukul
        en: Don't hit your friend at school.
      - id: module-5-0004-s3
        text: Dia memukul meja karena marah.
        blank: memukul
        en: He hit the table because he was angry.
  - id: module-5-0005
    indonesian: menerima (terima)
    english: to receive something, to accept something
    audio: 2164451e94e9.ogg
    note:
      en: '"Menerima" is the formal/active form; "terima" appears in common phrases
        like "terima kasih" (thank you); often confused with "mendapat" (to
        get/receive by chance).'
    sentences:
      - id: module-5-0005-s1
        text: Saya menerima hadiah dari teman saya.
        blank: menerima
        en: I receive a gift from my friend.
      - id: module-5-0005-s2
        text: Dia menerima telepon di kamar.
        blank: menerima
        en: She accepts a phone call in the room.
      - id: module-5-0005-s3
        text: Kami menerima tamu di rumah.
        blank: menerima
        en: We receive guests at home.
  - id: module-5-0006
    indonesian: mengantar (antar)
    english: to take/accompany someone somewhere, to deliver something or someone to
      a certain place
    audio: 77629bfc1133.ogg
    note:
      en: '"Mengantar" is the formal/written form; in casual speech Indonesians often
        drop the prefix and say "antar" — it means to take or accompany someone
        to a place, not just to go yourself.'
    sentences:
      - id: module-5-0006-s1
        text: Ayah mengantar saya ke sekolah setiap pagi.
        blank: mengantar
        en: Dad takes me to school every morning.
      - id: module-5-0006-s2
        text: Saya mengantar teman ke bandara kemarin.
        blank: mengantar
        en: I took my friend to the airport yesterday.
      - id: module-5-0006-s3
        text: Bisakah kamu antar saya ke pasar?
        blank: antar
        en: Can you take me to the market?
  - id: module-5-0007
    indonesian: mengatur (atur)
    english: to arrange something, to regulate something
    audio: 291bf8f3eab5.ogg
    note:
      en: "'Mengatur' is the formal/written form; 'atur' is the root used in casual
        speech; related words include 'peraturan' (rule/regulation) and
        'teratur' (orderly)."
    sentences:
      - id: module-5-0007-s1
        text: Ibu mengatur meja makan setiap hari.
        blank: mengatur
        en: Mom arranges the dining table every day.
      - id: module-5-0007-s2
        text: Pak guru mengatur jadwal kelas kami.
        blank: mengatur
        en: The teacher regulates our class schedule.
      - id: module-5-0007-s3
        text: Dia mengatur barang-barang di kamar.
        blank: mengatur
        en: She arranges the items in the room.
  - id: module-5-0008
    indonesian: menggoreng (goreng)
    english: to fry something
    audio: c7c59554d1b3.ogg
    note:
      en: "'Menggoreng' is the formal/active form; everyday speech often shortens to
        'goreng' (e.g., 'goreng telur'); commonly confused with 'memasak' (to
        cook in general)."
    sentences:
      - id: module-5-0008-s1
        text: Ibu menggoreng ayam di dapur.
        blank: menggoreng
        en: Mom is frying chicken in the kitchen.
      - id: module-5-0008-s2
        text: Saya suka goreng tempe setiap pagi.
        blank: goreng
        en: I like to fry tempeh every morning.
      - id: module-5-0008-s3
        text: Dia menggoreng telur untuk sarapan.
        blank: menggoreng
        en: He is frying an egg for breakfast.
  - id: module-5-0009
    indonesian: menghitung (hitung)
    english: to count something
    audio: b22343381b68.ogg
    note:
      en: '"Menghitung" is the formal/full form; "hitung" is the root used in commands
        or compounds (e.g., "hitung dulu" = count first); do not confuse with
        "menghitung" (to calculate) vs. "membayar" (to pay).'
    sentences:
      - id: module-5-0009-s1
        text: Ayo hitung jumlah mangga di keranjang.
        blank: hitung
        en: Let's count the number of mangoes in the basket.
      - id: module-5-0009-s2
        text: Ibu menghitung uang di dompetnya.
        blank: menghitung
        en: Mom is counting the money in her wallet.
      - id: module-5-0009-s3
        text: Tolong hitung murid di kelas ini.
        blank: hitung
        en: Please count the students in this class.
  - id: module-5-0010
    indonesian: mengirim (kirim)
    english: to send something
    audio: 57f051d6908e.ogg
    note:
      en: "'Mengirim' is the formal/full form; 'kirim' is the informal root often used
        in casual speech; commonly used for sending messages, packages, or
        money."
    sentences:
      - id: module-5-0010-s1
        text: Saya mengirim pesan kepada teman saya.
        blank: mengirim
        en: I send a message to my friend.
      - id: module-5-0010-s2
        text: Ibu kirim uang ke adik setiap bulan.
        blank: kirim
        en: Mom sends money to my younger sibling every month.
      - id: module-5-0010-s3
        text: Kami mengirim paket ke Bali hari ini.
        blank: mengirim
        en: We send a package to Bali today.
  - id: module-5-0011
    indonesian: mengisi (isi)
    english: to fill something,
    audio: 2b14d6e1e6d0.ogg
    note:
      en: "\"Mengisi\" is the active verb form; \"isi\" is the root meaning
        'content/fill'; commonly used for filling forms, bottles, or fuel."
    sentences:
      - id: module-5-0011-s1
        text: Tolong mengisi botol ini dengan air.
        blank: mengisi
        en: Please fill this bottle with water.
      - id: module-5-0011-s2
        text: Saya harus mengisi formulir itu sekarang.
        blank: mengisi
        en: I have to fill out that form now.
      - id: module-5-0011-s3
        text: Dia mengisi bensin di pom bensin.
        blank: mengisi
        en: He fills up fuel at the gas station.
  - id: module-5-0012
    indonesian: menikah (nikah)
    english: to get married
    audio: ac8f5202cdcb.ogg
    note:
      en: "'Nikah' is the base form (formal/Islamic context); 'menikah' is the active
        verb meaning 'to get married'; related: 'pernikahan' (wedding/marriage),
        'suami' (husband), 'istri' (wife)."
    sentences:
      - id: module-5-0012-s1
        text: Kakak saya akan menikah bulan depan.
        blank: menikah
        en: My older sibling will get married next month.
      - id: module-5-0012-s2
        text: Mereka menikah di Bali tahun lalu.
        blank: menikah
        en: They got married in Bali last year.
      - id: module-5-0012-s3
        text: Kapan kamu mau nikah?
        blank: nikah
        en: When do you want to get married?
  - id: module-5-0013
    indonesian: menutup (tutup)
    english: to shut something, to close something
    audio: 402582cf6255.ogg
    note:
      en: "\"Tutup\" is the root; \"menutup\" is the active verb form (me- prefix);
        also means 'closed' as an adjective (e.g. toko tutup = the shop is
        closed); don't confuse with \"menutup\" (to cover) vs \"mengunci\" (to
        lock)."
    sentences:
      - id: module-5-0013-s1
        text: Tolong tutup pintu itu sekarang.
        blank: tutup
        en: Please close that door now.
      - id: module-5-0013-s2
        text: Dia menutup jendela karena hujan.
        blank: menutup
        en: She closes the window because of rain.
      - id: module-5-0013-s3
        text: Anak itu menutup bukunya dengan cepat.
        blank: menutup
        en: The child closes his book quickly.
  - id: module-5-0014
    indonesian: menyimpan (simpan)
    english: to store something away, to save/deposit money
    audio: 86bd980cb508.ogg
    note:
      en: "\"Menyimpan\" is the active verb form; use \"simpan\" for commands (e.g.,
        'Simpan ini!'); often confused with \"menabung\" which specifically
        means saving money in a bank."
    sentences:
      - id: module-5-0014-s1
        text: Saya menyimpan uang di bank setiap minggu.
        blank: menyimpan
        en: I save money at the bank every week.
      - id: module-5-0014-s2
        text: Ibu menyimpan baju bersih di lemari.
        blank: menyimpan
        en: Mom stores the clean clothes in the wardrobe.
      - id: module-5-0014-s3
        text: Tolong simpan makanan ini di kulkas.
        blank: simpan
        en: Please store this food in the fridge.
  - id: module-5-0015
    indonesian: merasa (rasa)
    english: to feel (an emotion), to feel that...
    audio: 37adb782c5cb.ogg
    note:
      en: '"Merasa" means to feel an emotion or sense something; often confused with
        "merasakan" (to experience/taste); "rasa" alone can mean feeling or
        taste.'
    sentences:
      - id: module-5-0015-s1
        text: Saya merasa senang hari ini.
        blank: merasa
        en: I feel happy today.
      - id: module-5-0015-s2
        text: Dia merasa lelah setelah bekerja.
        blank: merasa
        en: She feels tired after working.
      - id: module-5-0015-s3
        text: Kami merasa lapar sekarang.
        blank: merasa
        en: We feel hungry now.
  - id: module-5-0016
    indonesian: mohon
    english: to ask someone for something (respectfully)
    audio: dd62158a8c3e.ogg
    note:
      en: "'Mohon' is a formal/polite way to request something, stronger than 'minta';
        often seen in signs, announcements, and respectful speech."
    sentences:
      - id: module-5-0016-s1
        text: Mohon tunggu sebentar, ya.
        blank: Mohon
        en: Please wait a moment, okay.
      - id: module-5-0016-s2
        text: Saya mohon bantuan dari kamu.
        blank: mohon
        en: I respectfully ask for your help.
      - id: module-5-0016-s3
        text: Mohon maaf, saya terlambat hari ini.
        blank: Mohon
        en: I sincerely apologize, I am late today.
  - id: module-5-0017
    indonesian: pena
    english: a pen
    audio: 1668496c724e.ogg
    note:
      en: "'Pena' means pen (writing instrument); not to be confused with 'pensil'
        (pencil); commonly used in school and office contexts."
    sentences:
      - id: module-5-0017-s1
        text: Saya butuh pena untuk menulis surat.
        blank: pena
        en: I need a pen to write a letter.
      - id: module-5-0017-s2
        text: Boleh saya pinjam pena kamu?
        blank: pena
        en: May I borrow your pen?
      - id: module-5-0017-s3
        text: Pena saya ada di dalam tas.
        blank: pena
        en: My pen is inside the bag.
  - id: module-5-0018
    indonesian: pensil
    english: a pencil
    audio: dfae739a2c02.ogg
    note:
      en: "'Pensil' is an everyday neutral word for pencil; borrowed from Dutch
        'penseel'; often paired with 'buku' (book) or 'kertas' (paper) in school
        contexts."
    sentences:
      - id: module-5-0018-s1
        text: Saya punya satu pensil di tas.
        blank: pensil
        en: I have one pencil in my bag.
      - id: module-5-0018-s2
        text: Tolong berikan pensil itu kepada saya.
        blank: pensil
        en: Please give that pencil to me.
      - id: module-5-0018-s3
        text: Pensil saya hilang di sekolah.
        blank: pensil
        en: My pencil got lost at school.
  - id: module-5-0019
    indonesian: rasa
    english: a feeling, a sense, a sensation of something
    audio: a91f521f252d.ogg
    note:
      en: "\"Rasa\" means feeling, taste, or sensation; also used in \"rasanya\" (it
        feels like); don't confuse with \"merasa\" (to feel as a verb)."
    sentences:
      - id: module-5-0019-s1
        text: Saya punya rasa senang hari ini.
        blank: rasa
        en: I have a feeling of happiness today.
      - id: module-5-0019-s2
        text: Ada rasa dingin di pantai ini.
        blank: rasa
        en: There is a cold sensation at this beach.
      - id: module-5-0019-s3
        text: Rasa makanan ini sangat enak.
        blank: Rasa
        en: The taste of this food is very delicious.
  - id: module-5-0020
    indonesian: sedih
    english: sad, to feel sadness
    audio: 42572cfe4a31.ogg
    note:
      en: "'Sedih' is a common, neutral word for sadness; related words include
        'kesedihan' (sadness/noun) and 'menyedihkan' (sad/pitiful as
        adjective)."
    sentences:
      - id: module-5-0020-s1
        text: Dia sedih karena kehilangan kucing kesayangannya.
        blank: sedih
        en: She is sad because she lost her beloved cat.
      - id: module-5-0020-s2
        text: Saya merasa sedih hari ini.
        blank: sedih
        en: I feel sad today.
      - id: module-5-0020-s3
        text: Anak itu menangis karena sangat sedih.
        blank: sedih
        en: The child is crying because they are very sad.
  - id: module-5-0021
    indonesian: kamus
    english: a dictionary
    audio: 70418598fd6f.ogg
    note:
      en: "'Kamus' means dictionary; it is a noun used the same for singular and
        plural; commonly paired with 'kamus bahasa Inggris' (English
        dictionary)."
    sentences:
      - id: module-5-0021-s1
        text: Saya punya kamus bahasa Inggris di rumah.
        blank: kamus
        en: I have an English dictionary at home.
      - id: module-5-0021-s2
        text: Tolong bawa kamus ke kelas besok.
        blank: kamus
        en: Please bring a dictionary to class tomorrow.
      - id: module-5-0021-s3
        text: Dia mencari kata di kamus itu.
        blank: kamus
        en: He is looking up a word in that dictionary.
  - id: module-5-0022
    indonesian: memotong (potong)
    english: to cut something, to cut something off
    audio: ba43b6e9a06d.ogg
    note:
      en: "Use 'memotong' in formal/written contexts and 'potong' in everyday speech;
        also means 'to cut' hair, paper, or food; related: 'gunting'
        (scissors)."
    sentences:
      - id: module-5-0022-s1
        text: Ibu memotong sayuran di dapur.
        blank: memotong
        en: Mom is cutting vegetables in the kitchen.
      - id: module-5-0022-s2
        text: Ayah potong rambut saya hari ini.
        blank: potong
        en: Dad cuts my hair today.
      - id: module-5-0022-s3
        text: Tolong potong kue itu untuk kami.
        blank: potong
        en: Please cut that cake for us.
  - id: module-5-0023
    indonesian: menanam (tanam)
    english: to plant something, to grow something e.g. a crop
    audio: 16fdde923a1a.ogg
    note:
      en: '"Menanam" is the active verb form (me- prefix on root "tanam"); used for
        planting crops, seeds, or trees; beginners sometimes confuse it with
        "tumbuh" (to grow/sprout, intransitive).'
    sentences:
      - id: module-5-0023-s1
        text: Ibu menanam sayuran di kebun.
        blank: menanam
        en: Mother plants vegetables in the garden.
      - id: module-5-0023-s2
        text: Kami menanam padi setiap tahun.
        blank: menanam
        en: We grow rice every year.
      - id: module-5-0023-s3
        text: Ayah menanam pohon di depan rumah.
        blank: menanam
        en: Father plants a tree in front of the house.
  - id: module-5-0024
    indonesian: mengubah (ubah)
    english: to change, to alter
    audio: a5336257cd02.ogg
    note:
      en: "'Mengubah' is the formal/active form; 'ubah' is the root — use 'mengubah'
        in everyday sentences; not to be confused with 'mengganti' (to
        replace/swap)."
    sentences:
      - id: module-5-0024-s1
        text: Dia ingin mengubah warna rambutnya.
        blank: mengubah
        en: She wants to change her hair color.
      - id: module-5-0024-s2
        text: Tolong ubah jadwal kita besok.
        blank: ubah
        en: Please change our schedule for tomorrow.
      - id: module-5-0024-s3
        text: Saya mengubah resep masakan ini.
        blank: mengubah
        en: I am changing this cooking recipe.
  - id: module-5-0025
    indonesian: padi
    english: rice (as it grows in a paddy field or dry field), a rice plant
    audio: 6613af1ef2bc.ogg
    note:
      en: "'Padi' refers to the rice plant or unhusked rice in the field; 'beras' is
        uncooked milled rice and 'nasi' is cooked rice — a common source of
        confusion for beginners."
    sentences:
      - id: module-5-0025-s1
        text: Petani menanam padi di sawah.
        blank: padi
        en: The farmer plants rice in the paddy field.
      - id: module-5-0025-s2
        text: Padi itu sudah tumbuh tinggi.
        blank: padi
        en: The rice plant has already grown tall.
      - id: module-5-0025-s3
        text: Kami melihat padi di ladang.
        blank: padi
        en: We see rice plants in the field.
  - id: module-5-0026
    indonesian: akuntan
    english: an accountant
    audio: 69b7e383ba24.ogg
    note:
      en: '"Akuntan" is a formal/neutral noun for accountant; related words include
        "akuntansi" (accounting) and "keuangan" (finance).'
    sentences:
      - id: module-5-0026-s1
        text: Ayah saya bekerja sebagai akuntan.
        blank: akuntan
        en: My father works as an accountant.
      - id: module-5-0026-s2
        text: Dia adalah akuntan di kantor besar.
        blank: akuntan
        en: She is an accountant at a big office.
      - id: module-5-0026-s3
        text: Saya ingin menjadi akuntan profesional.
        blank: akuntan
        en: I want to become a professional accountant.
  - id: module-5-0027
    indonesian: dokter gigi
    english: a dentist
    audio: 51fc0951b62b.ogg
    note:
      en: '"Dokter gigi" literally means "tooth doctor"; use it with "ke" (to go to)
        or "adalah" (is); related: "dokter" (doctor), "gigi" (tooth/teeth).'
    sentences:
      - id: module-5-0027-s1
        text: Saya pergi ke dokter gigi hari ini.
        blank: dokter gigi
        en: I am going to the dentist today.
      - id: module-5-0027-s2
        text: Dokter gigi itu sangat baik.
        blank: dokter gigi
        en: That dentist is very kind.
      - id: module-5-0027-s3
        text: Ibu membawa adik ke dokter gigi.
        blank: dokter gigi
        en: Mom takes my younger sibling to the dentist.
  - id: module-5-0028
    indonesian: efisien
    english: efficient
    audio: d20b82a2dc86.ogg
    note:
      en: "'Efisien' is a neutral/formal loanword from English; often paired with
        'kerja' (work) or 'cara' (method); synonym 'hemat' focuses more on
        saving resources."
    sentences:
      - id: module-5-0028-s1
        text: Cara ini sangat efisien untuk memasak nasi.
        blank: efisien
        en: This way is very efficient for cooking rice.
      - id: module-5-0028-s2
        text: Pak Made bekerja dengan cara yang efisien.
        blank: efisien
        en: Mr. Made works in an efficient way.
      - id: module-5-0028-s3
        text: Motor lebih efisien daripada mobil di Bali.
        blank: efisien
        en: Motorcycles are more efficient than cars in Bali.
  - id: module-5-0029
    indonesian: gagal
    english: to not succeed, to fail
    audio: 8a94ce0374b0.ogg
    note:
      en: "'Gagal' means to fail or not succeed; often used with 'ujian' (exam) or
        plans; related: 'berhasil' (to succeed) is its opposite."
    sentences:
      - id: module-5-0029-s1
        text: Dia gagal ujian matematika kemarin.
        blank: gagal
        en: He failed the math exam yesterday.
      - id: module-5-0029-s2
        text: Saya tidak mau gagal lagi.
        blank: gagal
        en: I don't want to fail again.
      - id: module-5-0029-s3
        text: Rencana kami gagal karena hujan.
        blank: gagal
        en: Our plan failed because of rain.
  - id: module-5-0030
    indonesian: ibu rumah tangga
    english: a housewife
