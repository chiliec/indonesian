  - id: module-5-0154
    indonesian: soal
    english: about (informal)
    audio: 3828197b40be.ogg
    note:
      en: "'Soal' informally means 'about/regarding'; often used in casual speech
        instead of 'tentang', common in everyday conversation."
    sentences:
      - id: module-5-0154-s1
        text: Dia bertanya soal harga kamar itu.
        blank: soal
