  - id: module-5-0158
    indonesian: terus (2)
    english: and then (informal)
    audio: e7b1eef4d0f4.ogg
    note:
      en: "\"Terus\" as a discourse connector means \"and then\" in informal speech;
        don't confuse with terus meaning \"continue\" or \"straight ahead\"."
