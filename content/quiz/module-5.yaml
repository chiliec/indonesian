  - id: module-5-0155
    indonesian: soalnya
    english: (informal) the thing is, because
    audio: 60a19934437e.ogg
    note:
      en: "'Soalnya' is casual/informal, used to explain a reason; similar to 'karena'
        but more conversational, common in spoken Indonesian."
