        text: Para penari itu memakai baju merah.
        blank: penari
        en: The dancers are wearing red clothes.
      - id: module-5-0162-s3
        text: Adik saya ingin jadi penari.
        blank: penari
        en: My younger sibling wants to become a dancer.
  - id: module-5-0163
    indonesian: perdana menteri
    english: prime minister
    audio: 99ecfe4c8a23.ogg
    note:
      en: '"Perdana menteri" means prime minister; Indonesia has a president
