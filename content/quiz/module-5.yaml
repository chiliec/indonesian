      - id: module-5-0158-s3
        text: Kami main, terus pulang ke rumah.
        blank: terus
        en: We played, and then went home.
  - id: module-5-0159
    indonesian: bangsawan
    english: a noble
    audio: 80febe97485e.ogg
    note:
      en: "'Bangsawan' means a noble or aristocrat; used in formal or historical
        contexts; related words: 'kebangsawanan' (nobility), not to be confused
        with 'bangsa' (nation/ethnic group)."
    sentences:
      - id: module-5-0159-s1
        text: Dia adalah seorang bangsawan dari Bali.
        blank: bangsawan
