  - id: module-5-0153
    indonesian: pengacara (acara)
    english: lawyer
    audio: 9ed0ea3ecc94.ogg
    note:
      en: "'Pengacara' means lawyer; note that 'acara' alone means 'event/program', so
        context matters."
