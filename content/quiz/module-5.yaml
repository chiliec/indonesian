      - id: module-5-0209-s3
        text: Dia belajar mengendarai sepeda hari ini.
        blank: mengendarai
        en: She is learning to ride a bicycle today.
  - id: module-5-0210
    indonesian: perhatian
    english: attention
    audio: b280de7bb393.ogg
    note:
      en: "'Perhatian' means attention or notice; used in announcements ('perhatian!')
        and to mean care/concern; related: 'memperhatikan' (to pay attention
        to)."
    sentences:
      - id: module-5-0210-s1
        text: Perhatian! Bus akan segera berangkat.
        blank: Perhatian
        en: Attention! The bus will depart soon.
      - id: module-5-0210-s2
        text: Guru meminta perhatian dari semua siswa.
        blank: perhatian
        en: The teacher asked for attention from all students.
      - id: module-5-0210-s3
        text: Tolong beri perhatian kepada adikmu.
        blank: perhatian
        en: Please give attention to your younger sibling.
  - id: module-5-0211
    indonesian: terserah
    english: it's up to you
    audio: dd62bed40da6.ogg
    note:
      en: "'Terserah' means 'up to you / whatever you like'; very common in casual
        speech; can sound dismissive if said with a flat tone; related: 'bebas'
        (free choice), 'pilih saja' (just choose)."
    sentences:
      - id: module-5-0211-s1
        text: Mau makan apa? Terserah kamu saja.
        blank: Terserah
        en: What do you want to eat? It's up to you.
      - id: module-5-0211-s2
        text: Terserah, kita bisa pergi ke pantai.
        blank: Terserah
        en: Up to you, we can go to the beach.
      - id: module-5-0211-s3
        text: Pilih bajunya terserah kamu ya.
        blank: terserah
        en: Choose the clothes, it's up to you.
  - id: module-5-0212
    indonesian: wawancara
    english: interview
    audio: d3f309625bc4.ogg
    note:
      en: "'Wawancara' means interview (job or media); formal register, not used for
        casual chats; related: 'pewawancara' (interviewer), 'diwawancarai' (to
        be interviewed)."
    sentences:
      - id: module-5-0212-s1
        text: Besok saya ada wawancara kerja pagi.
        blank: wawancara
        en: Tomorrow I have a job interview in the morning.
      - id: module-5-0212-s2
        text: Dia gugup sebelum wawancara itu.
        blank: wawancara
        en: She was nervous before the interview.
      - id: module-5-0212-s3
        text: Wawancara saya berlangsung satu jam.
        blank: Wawancara
        en: My interview lasted one hour.
  - id: module-5-0213
    indonesian: bidan
    english: a midwife
    audio: 9548abda05bb.ogg
    note:
      en: "'Bidan' means midwife; commonly confused with 'dokter' (doctor) — a bidan
        specialises in pregnancy and childbirth, not general medicine."
    sentences:
      - id: module-5-0213-s1
        text: Ibu pergi ke bidan setiap bulan.
        blank: bidan
        en: Mother goes to the midwife every month.
      - id: module-5-0213-s2
        text: Bidan itu sangat baik dan sabar.
        blank: Bidan
        en: The midwife is very kind and patient.
      - id: module-5-0213-s3
        text: Adik lahir dibantu oleh bidan.
        blank: bidan
        en: My younger sibling was born with help from a midwife.
  - id: module-5-0214
    indonesian: cucu
    english: a grandson/a granddaughter
    audio: b2de5a049deb.ogg
    note:
      en: "'Cucu' means grandchild (grandson or granddaughter); it is gender-neutral,
        related words include 'kakek' (grandfather) and 'nenek' (grandmother)."
    sentences:
      - id: module-5-0214-s1
        text: Nenek sangat menyayangi cucu perempuannya.
        blank: cucu
        en: Grandma loves her granddaughter very much.
      - id: module-5-0214-s2
        text: Cucu kakek bermain di taman.
        blank: cucu
        en: Grandfather's grandchild plays in the park.
      - id: module-5-0214-s3
        text: Saya punya satu cucu laki-laki.
        blank: cucu
        en: I have one grandson.
  - id: module-5-0215
    indonesian: dibandingkan
    english: to be compared
    audio: aa3fc3846599.ogg
    note:
      en: '"Dibandingkan" means "compared to" and is often used to contrast two
        things; commonly confused with "membandingkan" (to compare actively);
        related: "sama" (same), "lebih" (more).'
    sentences:
      - id: module-5-0215-s1
        text: Apel ini lebih manis dibandingkan jeruk itu.
        blank: dibandingkan
        en: This apple is sweeter compared to that orange.
      - id: module-5-0215-s2
        text: Bali lebih panas dibandingkan Jakarta.
        blank: dibandingkan
        en: Bali is hotter compared to Jakarta.
      - id: module-5-0215-s3
        text: Motor ini lebih murah dibandingkan mobil.
        blank: dibandingkan
        en: This motorbike is cheaper compared to a car.
  - id: module-5-0216
    indonesian: dokter hewan
    english: a vetinary doctor, a vet
    audio: da81e24ed091.ogg
    note:
      en: "\"Dokter hewan\" literally means 'animal doctor'; use it for vets treating
        pets or farm animals — do not shorten to just \"dokter\" as that refers
        to a human doctor."
    sentences:
      - id: module-5-0216-s1
        text: Anjing saya sakit, perlu ke dokter hewan.
        blank: dokter hewan
        en: My dog is sick, needs to go to the vet.
      - id: module-5-0216-s2
        text: Dokter hewan itu baik sekali.
        blank: dokter hewan
        en: That vet is very kind.
      - id: module-5-0216-s3
        text: Ibu membawa kucing ke dokter hewan.
        blank: dokter hewan
        en: Mom is taking the cat to the vet.
  - id: module-5-0217
    indonesian: film horor
    english: a horror movie/film
    audio: 3eb69496a3ca.ogg
    note:
      en: "'Film horor' is casual everyday Indonesian for a horror movie; 'film' can
        also mean 'movie' generally, and 'horor' is borrowed from English."
    sentences:
      - id: module-5-0217-s1
        text: Saya tidak suka nonton film horor.
        blank: film horor
        en: I don't like watching a horror movie.
      - id: module-5-0217-s2
        text: Adik saya takut film horor.
        blank: film horor
        en: My younger sibling is scared of horror movies.
      - id: module-5-0217-s3
        text: Malam ini kita nonton film horor.
        blank: film horor
        en: Tonight we are watching a horror movie.
  - id: module-5-0218
    indonesian: hobi
    english: hobby
    audio: b6460dcedc32.ogg
    note:
      en: '"Hobi" is an informal loanword from English; used in casual speech and
        writing, interchangeable with "kegemaran" in formal contexts.'
    sentences:
      - id: module-5-0218-s1
        text: Hobi saya adalah memasak dan membaca.
        blank: Hobi
        en: My hobby is cooking and reading.
      - id: module-5-0218-s2
        text: Apa hobi kamu sehari-hari?
        blank: hobi
        en: What is your everyday hobby?
      - id: module-5-0218-s3
        text: Dia punya hobi bermain gitar.
        blank: hobi
        en: He has a hobby of playing guitar.
  - id: module-5-0219
    indonesian: ijazah
    english: a diploma
    audio: 04b970170bf5.ogg
    note:
      en: '"Ijazah" is a formal/neutral word for a school or university diploma; often
        needed for job applications; related: "gelar" (degree title),
        "sertifikat" (certificate).'
    sentences:
      - id: module-5-0219-s1
        text: Saya sudah mendapat ijazah dari universitas.
        blank: ijazah
        en: I have already received a diploma from the university.
      - id: module-5-0219-s2
        text: Ijazah saya ada di rumah.
        blank: Ijazah
        en: My diploma is at home.
      - id: module-5-0219-s3
        text: Dia butuh ijazah untuk melamar kerja.
        blank: ijazah
        en: She needs a diploma to apply for a job.
  - id: module-5-0220
    indonesian: kaca mata
    english: glasses
    audio: b9a31acf4363.ogg
    note:
      en: '"Kaca mata" (also spelled "kacamata") means eyeglasses; not to be confused
        with "kaca" (glass/mirror) alone; related: "kaca mata hitam"
        (sunglasses).'
    sentences:
      - id: module-5-0220-s1
        text: Saya pakai kaca mata setiap hari.
        blank: kaca mata
        en: I wear glasses every day.
      - id: module-5-0220-s2
        text: Di mana kaca mata saya?
        blank: kaca mata
        en: Where are my glasses?
      - id: module-5-0220-s3
        text: Ibu membeli kaca mata baru kemarin.
        blank: kaca mata
        en: Mom bought new glasses yesterday.
  - id: module-5-0221
    indonesian: kekurangan
    english: to be short of
    audio: 9aaff2e827ed.ogg
    note:
      en: "'Kekurangan' means 'to lack' or 'to be short of'; it combines 'kurang' (not
        enough) with the prefix/suffix ke-an; often confused with 'tidak ada'
        (there is none at all)."
    sentences:
      - id: module-5-0221-s1
        text: Kami kekurangan beras di dapur.
        blank: kekurangan
        en: We are short of rice in the kitchen.
      - id: module-5-0221-s2
        text: Toko itu kekurangan air minum.
        blank: kekurangan
        en: That shop is short of drinking water.
      - id: module-5-0221-s3
        text: Saya kekurangan uang untuk makan.
        blank: kekurangan
        en: I am short of money to eat.
  - id: module-5-0222
    indonesian: kuda
    english: a horse
    audio: a895311c03ff.ogg
    note:
      en: "'Kuda' means horse; related words include 'kuda-kuda' (a stance/tripod) and
        'berkuda' (to ride a horse); neutral everyday register."
    sentences:
      - id: module-5-0222-s1
        text: Anak itu melihat kuda di ladang.
        blank: kuda
        en: That child sees a horse in the field.
      - id: module-5-0222-s2
        text: Kuda itu berlari sangat cepat.
        blank: Kuda
        en: The horse runs very fast.
      - id: module-5-0222-s3
        text: Saya ingin naik kuda besok.
        blank: kuda
        en: I want to ride a horse tomorrow.
  - id: module-5-0223
    indonesian: mata
    english: an eye
    audio: 05da3689f40d.ogg
    note:
      en: "'Mata' means 'eye'; also appears in compounds like 'kacamata' (glasses) and
        'mata uang' (currency); register is neutral/everyday."
    sentences:
      - id: module-5-0223-s1
        text: Mata saya sakit hari ini.
        blank: Mata
        en: My eye hurts today.
      - id: module-5-0223-s2
        text: Dia menutup mata karena lelah.
        blank: mata
        en: She closes her eyes because she is tired.
      - id: module-5-0223-s3
        text: Anak itu punya mata biru.
        blank: mata
        en: That child has blue eyes.
  - id: module-5-0224
    indonesian: melayani
    english: to serve someone, to attend to (customers)
    audio: 188f58238945.ogg
    note:
      en: "'Melayani' means to serve or attend to someone, commonly used in shops,
        restaurants, and hotels; related to 'layanan' (service) and 'pelayan'
        (waiter/server)."
    sentences:
      - id: module-5-0224-s1
        text: Dia melayani tamu di hotel itu.
        blank: melayani
        en: She serves the guests at that hotel.
      - id: module-5-0224-s2
        text: Ibu melayani pembeli di toko kecil.
        blank: melayani
        en: Mom attends to customers at the small shop.
      - id: module-5-0224-s3
        text: Pelayan itu melayani kami dengan ramah.
        blank: melayani
        en: That waiter served us in a friendly way.
  - id: module-5-0225
    indonesian: panitia
    english: a committee
    audio: d15c34570896.ogg
    note:
      en: "'Panitia' means a committee or organizing team; commonly used for events
        and school activities; related: 'ketua panitia' (committee head)."
    sentences:
      - id: module-5-0225-s1
        text: Panitia acara itu bekerja dengan keras.
        blank: Panitia
        en: The event committee works very hard.
      - id: module-5-0225-s2
        text: Saya bergabung dengan panitia sekolah.
        blank: panitia
        en: I joined the school committee.
      - id: module-5-0225-s3
        text: Panitia sudah menyiapkan semua makanan.
        blank: Panitia
        en: The committee has prepared all the food.
  - id: module-5-0226
    indonesian: penyakit
    english: a disease
    audio: 696c11a1e67a.ogg
    note:
      en: "'Penyakit' means 'disease' or 'illness'; related words include 'sakit'
        (sick/pain) and 'obat' (medicine); used in both formal and everyday
        speech."
    sentences:
      - id: module-5-0226-s1
        text: Dokter bilang dia punya penyakit serius.
        blank: penyakit
        en: The doctor said he has a serious disease.
      - id: module-5-0226-s2
        text: Penyakit flu sangat mudah menular.
        blank: penyakit
        en: The flu disease spreads very easily.
      - id: module-5-0226-s3
        text: Cuci tangan bisa mencegah penyakit.
        blank: penyakit
        en: Washing hands can prevent disease.
  - id: module-5-0227
    indonesian: praktis
    english: practical
    audio: 6335b6217a29.ogg
    note:
      en: "'Praktis' means practical or convenient; often used to describe handy tools
        or easy solutions; related to 'praktik' (practice/clinic)."
    sentences:
      - id: module-5-0227-s1
        text: Tas ini sangat praktis untuk dibawa.
        blank: praktis
        en: This bag is very practical to carry.
      - id: module-5-0227-s2
        text: Cara ini lebih praktis dan mudah.
        blank: praktis
        en: This way is more practical and easy.
      - id: module-5-0227-s3
        text: Sepatu itu praktis untuk sehari-hari.
        blank: praktis
        en: Those shoes are practical for everyday use.
  - id: module-5-0228
    indonesian: Puskesmas
    english: a community health centre
    audio: 6a86f98c54cf.ogg
    note:
      en: "'Puskesmas' is an acronym for 'Pusat Kesehatan Masyarakat'; it refers to a
        government-run community health clinic found in every district across
        Indonesia, often the first point of care for locals."
    sentences:
      - id: module-5-0228-s1
        text: Saya pergi ke Puskesmas hari ini.
        blank: Puskesmas
        en: I am going to the community health centre today.
      - id: module-5-0228-s2
        text: Puskesmas ini dekat dengan rumah saya.
        blank: Puskesmas
        en: This community health centre is close to my house.
      - id: module-5-0228-s3
        text: Dokter di Puskesmas sangat ramah.
        blank: Puskesmas
        en: The doctor at the community health centre is very friendly.
  - id: module-5-0229
    indonesian: sakit jantung
    english: to have a heart disease
    audio: da9d57435a97.ogg
    note:
      en: '"Sakit jantung" literally means "heart sickness"; use "punya sakit jantung"
        (to have heart disease) or simply say someone "kena sakit jantung"; not
        to be confused with "serangan jantung" (heart attack).'
    sentences:
      - id: module-5-0229-s1
        text: Kakek saya punya sakit jantung sejak lama.
        blank: sakit jantung
        en: My grandfather has had heart disease for a long time.
      - id: module-5-0229-s2
        text: Dokter bilang dia kena sakit jantung.
        blank: sakit jantung
        en: The doctor said he has heart disease.
      - id: module-5-0229-s3
        text: Ibu tidak makan lemak karena sakit jantung.
        blank: sakit jantung
        en: Mom does not eat fat because of heart disease.
  - id: module-5-0230
    indonesian: salon kecantikan
    english: a beauty salon
    audio: 46807f96b467.ogg
    note:
      en: '"Salon kecantikan" means beauty salon; "kecantikan" comes from "cantik"
        (beautiful/pretty); commonly shortened to just "salon" in everyday
        speech.'
    sentences:
      - id: module-5-0230-s1
        text: Ibu pergi ke salon kecantikan hari ini.
        blank: salon kecantikan
        en: Mom goes to the beauty salon today.
      - id: module-5-0230-s2
        text: Ada salon kecantikan dekat pasar.
        blank: salon kecantikan
        en: There is a beauty salon near the market.
      - id: module-5-0230-s3
        text: Saya potong rambut di salon kecantikan.
        blank: salon kecantikan
        en: I cut my hair at the beauty salon.
  - id: module-5-0231
    indonesian: sarjana muda
    english: Bachelor of Arts
    audio: 92c96d4a9a60.ogg
    note:
      en: "\"Sarjana muda\" is a formal/academic term for a bachelor's degree holder;
        in everyday speech Indonesians often just say \"S1\" or \"sarjana\"."
    sentences:
      - id: module-5-0231-s1
        text: Kakak saya sudah lulus sarjana muda.
        blank: sarjana muda
        en: My older sibling has already graduated with a bachelor's degree.
      - id: module-5-0231-s2
        text: Dia ingin mendapat gelar sarjana muda.
        blank: sarjana muda
        en: He wants to get a bachelor's degree.
  - id: module-5-0232
    indonesian: seksi
    english: a section
    audio: 948b7c237ab8.ogg
    note:
      en: "\"Seksi\" means 'section' or 'department' in formal/organizational
        contexts; beginners may confuse it with the English loanword 'sexy' —
        they are spelled the same but context makes the meaning clear."
    sentences:
      - id: module-5-0232-s1
        text: Saya bekerja di seksi keuangan.
        blank: seksi
        en: I work in the finance section.
      - id: module-5-0232-s2
        text: Seksi makanan ada di lantai dua.
        blank: seksi
        en: The food section is on the second floor.
      - id: module-5-0232-s3
        text: Tolong pergi ke seksi informasi.
        blank: seksi
        en: Please go to the information section.
  - id: module-5-0233
    indonesian: skripsi
    english: a thesis
    audio: edbd3147f454.ogg
    note:
      en: "'Skripsi' refers specifically to an undergraduate thesis in Indonesia;
        commonly discussed by university students; related words: 'tesis'
        (graduate thesis), 'sidang' (thesis defense)."
    sentences:
      - id: module-5-0233-s1
        text: Dia sedang menulis skripsi di perpustakaan.
        blank: skripsi
        en: She is writing a thesis in the library.
      - id: module-5-0233-s2
        text: Skripsi saya tentang budaya Bali.
        blank: skripsi
        en: My thesis is about Balinese culture.
      - id: module-5-0233-s3
        text: Kapan kamu selesai skripsi?
        blank: skripsi
        en: When will you finish your thesis?
  - id: module-5-0234
    indonesian: tebal
    english: thick
    audio: 881ba0a8cc78.ogg
    note:
      en: "'Tebal' means thick (for objects like books, walls, or fabric); opposite is
        'tipis' (thin); do not confuse with 'gemuk' (fat, for people)."
    sentences:
      - id: module-5-0234-s1
        text: Buku ini sangat tebal dan berat.
        blank: tebal
        en: This book is very thick and heavy.
      - id: module-5-0234-s2
        text: Dinding rumah itu tebal sekali.
        blank: tebal
        en: That house's wall is very thick.
      - id: module-5-0234-s3
        text: Saya pakai baju tebal karena dingin.
        blank: tebal
        en: I wear a thick shirt because it is cold.
  - id: module-5-0235
    indonesian: tergantung pada
    english: to depend on
    audio: 15b9365c9ebe.ogg
    note:
      en: "'Tergantung pada' means 'to depend on'; often shortened to just
        'tergantung' in casual speech; do not confuse with 'menggantung' (to
        hang something)."
    sentences:
      - id: module-5-0235-s1
        text: Harga tiket tergantung pada musim liburan.
        blank: tergantung pada
        en: The ticket price depends on the holiday season.
      - id: module-5-0235-s2
        text: Rencana kami tergantung pada cuaca hari ini.
        blank: tergantung pada
        en: Our plan depends on today's weather.
      - id: module-5-0235-s3
        text: Pilihan makanan tergantung pada selera kamu.
        blank: tergantung pada
        en: The food choice depends on your taste.
  - id: module-5-0236
    indonesian: tergantung
    english: to hang, be suspended
    audio: 18b9e76c77f9.ogg
    note:
      en: '"Tergantung" means physically hanging/suspended, but is also very commonly
        used to mean "it depends" in everyday speech.'
    sentences:
      - id: module-5-0236-s1
        text: Tas itu tergantung di balik pintu.
        blank: tergantung
        en: That bag is hanging behind the door.
      - id: module-5-0236-s2
        text: Handuk saya tergantung di kamar mandi.
        blank: tergantung
        en: My towel is hanging in the bathroom.
