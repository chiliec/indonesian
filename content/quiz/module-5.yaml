      - id: module-5-0159-s3
        text: Istana itu milik seorang bangsawan tua.
        blank: bangsawan
        en: That palace belongs to an old noble.
  - id: module-5-0160
    indonesian: belum pernah
    english: has/have never
    audio: ed2636cb4fe6.ogg
    note:
      en: '"Belum pernah" means "have never (done something yet)"; "belum" alone means
        "not yet", while "pernah" alone means "ever"; together they express that
        something has not happened up to now.'
    sentences:
      - id: module-5-0160-s1
        text: Saya belum pernah makan nasi goreng.
        blank: belum pernah
        en: I have never eaten fried rice.
      - id: module-5-0160-s2
        text: Dia belum pernah pergi ke Bali.
        blank: belum pernah
        en: She has never gone to Bali.
      - id: module-5-0160-s3
        text: Kami belum pernah naik motor bersama.
        blank: belum pernah
        en: We have never ridden a motorbike together.
  - id: module-5-0161
    indonesian: bintang
    english: star
    audio: fdfcb27a3849.ogg
    note:
      en: "'Bintang' means 'star' (in the sky); it also refers to the popular
        Indonesian beer brand and is used for celebrity/famous person ('artis
