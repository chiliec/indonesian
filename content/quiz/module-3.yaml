      en: '"Sekolah menengah" covers both junior (SMP) and senior (SMA) secondary
        school; Indonesians often specify "sekolah menengah atas" (SMA) for high
        school or "sekolah menengah pertama" (SMP) for middle school.'
    sentences:
      - id: module-3-0265-s1
        text: Kakak saya belajar di sekolah menengah.
        blank: sekolah menengah
        en: My older sibling studies at secondary school.
      - id: module-3-0265-s2
        text: Sekolah menengah itu dekat pasar.
        blank: sekolah menengah
        en: That high school is near the market.
      - id: module-3-0265-s3
        text: Dia ingin masuk sekolah menengah baru.
        blank: sekolah menengah
        en: He wants to enter a new secondary school.
  - id: module-3-0266
    indonesian: setiap
    english: each, every
    audio: fee60aeb9415.ogg
    note:
      en: "\"Setiap\" means 'each/every' and is used before nouns or time expressions;
        beginners sometimes confuse it with \"semua\" (all), but \"setiap\"
        focuses on each individual item or occasion."
    sentences:
      - id: module-3-0266-s1
        text: Saya minum kopi setiap pagi.
        blank: setiap
        en: I drink coffee every morning.
      - id: module-3-0266-s2
        text: Setiap siswa membawa buku ke sekolah.
        blank: Setiap
        en: Every student brings a book to school.
      - id: module-3-0266-s3
        text: Dia pergi ke pasar setiap hari.
        blank: setiap
        en: She goes to the market every day.
  - id: module-3-0267
    indonesian: takbiran
    english: to chant Allahu Akbar (God is Great) in chorus over and over
    audio: 282df314b707.ogg
    note:
      en: "\"Takbiran\" refers to the communal chanting of 'Allahu Akbar' on the eve
        of Eid; it is a festive religious activity, not just a single utterance,
        and is closely associated with Lebaran celebrations in Indonesia."
    sentences:
      - id: module-3-0267-s1
        text: Kami takbiran bersama di masjid malam ini.
        blank: takbiran
        en: We chant Allahu Akbar together at the mosque tonight.
      - id: module-3-0267-s2
        text: Anak-anak takbiran keliling kampung dengan gembira.
        blank: takbiran
        en: The children chant Allahu Akbar around the village happily.
  - id: module-3-0268
    indonesian: tempat kerja
    english: place of work
    audio: 8bfa3829d4d0.ogg
    note:
      en: "'Tempat kerja' means workplace/place of work; 'tempat' means place and
        'kerja' means work, so it is a compound noun; related: 'tempat tinggal'
        (place of residence)."
    sentences:
      - id: module-3-0268-s1
        text: Tempat kerja saya dekat dari rumah.
        blank: Tempat kerja
        en: My workplace is close to home.
      - id: module-3-0268-s2
        text: Dia pergi ke tempat kerja setiap hari.
        blank: tempat kerja
        en: He goes to his workplace every day.
      - id: module-3-0268-s3
        text: Tempat kerja ini sangat bersih.
        blank: Tempat kerja
        en: This workplace is very clean.
  - id: module-3-0269
    indonesian: ulama
    english: very learned and pious Muslim
    audio: 4b82d5e6e511.ogg
    note:
      en: '"Ulama" refers to Islamic scholars with deep religious knowledge; often
        used as a title of respect in Indonesian Muslim communities; plural form
        is also "ulama" (not "ulamas").'
    sentences:
      - id: module-3-0269-s1
        text: Ulama itu berbicara tentang agama Islam.
        blank: Ulama
        en: The Islamic scholar speaks about the religion of Islam.
      - id: module-3-0269-s2
        text: Kami mendengarkan ceramah dari ulama terkenal.
        blank: ulama
        en: We listen to a lecture from a famous Islamic scholar.
      - id: module-3-0269-s3
        text: Banyak ulama tinggal di pesantren ini.
        blank: ulama
        en: Many Islamic scholars live in this Islamic boarding school.
