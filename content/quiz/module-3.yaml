        text: Saya tidak pernah makan durian.
        blank: tidak pernah
        en: I never eat durian.
      - id: module-3-0202-s2
        text: Dia tidak pernah datang terlambat.
        blank: tidak pernah
        en: He never comes late.
      - id: module-3-0202-s3
        text: Kami tidak pernah pergi ke pantai.
        blank: tidak pernah
        en: We never go to the beach.
  - id: module-3-0203
    indonesian: waktu
    english: time
    audio: 317adebaa181.ogg
    note:
      en: "'Waktu' means 'time' in general; also used as 'when' in formal writing;
        related words: 'jam' (clock/hour), 'hari' (day)"
    sentences:
      - id: module-3-0203-s1
        text: Saya tidak punya waktu sekarang.
        blank: waktu
        en: I don't have time right now.
      - id: module-3-0203-s2
        text: Waktu makan siang sudah tiba.
        blank: Waktu
        en: Lunchtime has arrived.
      - id: module-3-0203-s3
        text: Berapa waktu yang kamu butuhkan?
        blank: waktu
        en: How much time do you need?
  - id: module-3-0204
    indonesian: akhirnya
