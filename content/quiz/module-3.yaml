    english: to repair something, to fix something broken
    audio: 69470fd9ac8a.ogg
    note:
      en: '"Memperbaiki" is the formal/full form; "perbaiki" is the informal
        imperative or base form — both mean to fix/repair something broken,
        commonly used for objects like phones, bikes, or appliances.'
    sentences:
      - id: module-3-0178-s1
        text: Ayah memperbaiki sepeda saya yang rusak.
        blank: memperbaiki
        en: Dad is fixing my broken bicycle.
      - id: module-3-0178-s2
        text: Tolong perbaiki lampu di kamar ini.
        blank: perbaiki
        en: Please fix the light in this room.
      - id: module-3-0178-s3
        text: Dia memperbaiki hp-nya sendiri.
        blank: memperbaiki
        en: She is fixing her own phone.
  - id: module-3-0179
    indonesian: menang
    english: to win
    audio: c31b743cb045.ogg
    note:
      en: "'Menang' means 'to win' or 'winning'; the opposite is 'kalah' (to lose);
        commonly used in games, competitions, and sports."
    sentences:
      - id: module-3-0179-s1
        text: Tim kami menang dalam pertandingan sepak bola.
        blank: menang
        en: Our team won the football match.
      - id: module-3-0179-s2
        text: Dia menang lomba lari di sekolah.
        blank: menang
        en: She won the running race at school.
      - id: module-3-0179-s3
        text: Saya harap kamu menang hari ini.
        blank: menang
        en: I hope you win today.
  - id: module-3-0180
    indonesian: menjadi (jadi)
    english: to become, to be
    audio: 90d9126c93b5.ogg
    note:
      en: "'Menjadi' is the formal form; 'jadi' is the casual spoken form; both mean
        'to become/to be'; often confused with 'adalah' which states a fixed
        identity rather than a change or result"
    sentences:
      - id: module-3-0180-s1
        text: Dia ingin menjadi dokter suatu hari.
        blank: menjadi
        en: She wants to become a doctor someday.
      - id: module-3-0180-s2
        text: Air itu jadi dingin sekarang.
        blank: jadi
        en: The water became cold now.
      - id: module-3-0180-s3
        text: Budi menjadi guru di Bali.
        blank: menjadi
        en: Budi became a teacher in Bali.
  - id: module-3-0181
    indonesian: menjual (jual)
    english: to sell
    audio: 538926797b28.ogg
    note:
      en: "'Menjual' is the formal form; 'jual' is used in casual speech and compounds
        like 'dijual' (for sale) or 'jual-beli' (buying and selling)."
    sentences:
      - id: module-3-0181-s1
        text: Ibu menjual sayur di pasar setiap hari.
        blank: menjual
        en: Mom sells vegetables at the market every day.
      - id: module-3-0181-s2
        text: Toko ini jual buah segar dan murah.
        blank: jual
        en: This shop sells fresh and cheap fruit.
      - id: module-3-0181-s3
        text: Dia menjual souvenir kepada para wisatawan.
        blank: menjual
        en: He sells souvenirs to tourists.
  - id: module-3-0182
    indonesian: menyanyi (nyanyi)
    english: to sing
    audio: 73cd0d105a60.ogg
    note:
      en: "'Menyanyi' is the formal form; 'nyanyi' is the casual spoken shortform —
        both mean 'to sing'; related words: 'lagu' (song), 'penyanyi' (singer)."
    sentences:
      - id: module-3-0182-s1
        text: Dia suka menyanyi di kamar mandi.
        blank: menyanyi
        en: She likes to sing in the bathroom.
      - id: module-3-0182-s2
        text: Anak-anak nyanyi lagu bersama di kelas.
        blank: nyanyi
        en: The children sing a song together in class.
      - id: module-3-0182-s3
        text: Saya mau nyanyi di pesta besok.
        blank: nyanyi
        en: I want to sing at the party tomorrow.
  - id: module-3-0183
    indonesian: menyanyikan (nyanyikan)
    english: to sing (a certain song)
    audio: 379bc2e02311.ogg
    note:
      en: Use 'menyanyikan' (or informal 'nyanyikan') when singing a specific song for
        someone; contrast with 'bernyanyi', which means to sing in general
        without a specific object.
    sentences:
      - id: module-3-0183-s1
        text: Dia menyanyikan lagu untuk ibunya.
        blank: menyanyikan
        en: She sings a song for her mother.
      - id: module-3-0183-s2
        text: Tolong nyanyikan lagu itu sekali lagi.
        blank: nyanyikan
        en: Please sing that song one more time.
      - id: module-3-0183-s3
        text: Anak itu menyanyikan lagu kebangsaan.
        blank: menyanyikan
        en: That child sings the national anthem.
  - id: module-3-0184
    indonesian: pandai
    english: to be good at (doing something), clever, intelligent, smart
    audio: 9da442c1ff26.ogg
    note:
      en: "'Pandai' means clever or skilled at something; similar to 'pintar' (both
        common), often used with 'bermain', 'memasak', etc.; neutral, everyday
        register."
    sentences:
      - id: module-3-0184-s1
        text: Dia pandai bermain gitar.
        blank: pandai
        en: She is good at playing guitar.
      - id: module-3-0184-s2
        text: Anak itu sangat pandai di sekolah.
        blank: pandai
        en: That child is very clever at school.
      - id: module-3-0184-s3
        text: Saya ingin pandai berbicara bahasa Indonesia.
        blank: pandai
        en: I want to be good at speaking Indonesian.
  - id: module-3-0185
    indonesian: pernah
    english: once, ever, at some time in the past
    audio: b145febf7279.ogg
    note:
      en: '"Pernah" expresses past experience (have ever done something); often
        confused with "sudah" (already done); commonly used with "tidak pernah"
        (never).'
    sentences:
      - id: module-3-0185-s1
        text: Saya pernah makan nasi goreng di Bali.
        blank: pernah
        en: I once ate fried rice in Bali.
      - id: module-3-0185-s2
        text: Dia tidak pernah pergi ke pantai.
        blank: pernah
        en: She has never gone to the beach.
      - id: module-3-0185-s3
        text: Kamu pernah belajar bahasa Indonesia?
        blank: pernah
        en: Have you ever studied Indonesian?
  - id: module-3-0186
    indonesian: pintar
    english: clever, intelligent, smart
    audio: 69e680e7c1cd.ogg
    note:
      en: "'Pintar' means clever or smart and is used for people and animals; often
        confused with 'pandai', which is a close synonym, but 'pintar' is more
        common in everyday speech."
    sentences:
      - id: module-3-0186-s1
        text: Ani sangat pintar di kelas matematika.
        blank: pintar
        en: Ani is very smart in math class.
      - id: module-3-0186-s2
        text: Anjing itu pintar dan suka bermain.
        blank: pintar
        en: That dog is clever and likes to play.
      - id: module-3-0186-s3
        text: Saya ingin pintar seperti kakak saya.
        blank: pintar
        en: I want to be smart like my older sibling.
  - id: module-3-0187
    indonesian: sama sekali
    english: absolutely, at all, completely, totally (in negative expressions)
    audio: 47d842448cb9.ogg
    note:
      en: Used in negative sentences with 'tidak/tak/bukan' to intensify negation
        (e.g., 'tidak sama sekali' = 'not at all'); avoid using it in positive
        statements.
    sentences:
      - id: module-3-0187-s1
        text: Saya tidak lapar sama sekali hari ini.
        blank: sama sekali
        en: I am not hungry at all today.
      - id: module-3-0187-s2
        text: Dia tidak mengerti sama sekali.
        blank: sama sekali
        en: He does not understand at all.
      - id: module-3-0187-s3
        text: Saya tidak tahu sama sekali tentang itu.
        blank: sama sekali
        en: I know absolutely nothing about that.
  - id: module-3-0188
    indonesian: tidak begitu
    english: not very..., not especially, not particularly...
    audio: 84e72367ecae.ogg
    note:
      en: '"Tidak begitu" softens a negative, meaning "not very" or "not that much";
        it is more polite than a flat "tidak" (no/not), and beginners often
        confuse it with "tidak terlalu" which is nearly synonymous.'
    sentences:
      - id: module-3-0188-s1
        text: Saya tidak begitu suka kopi.
        blank: tidak begitu
        en: I don't really like coffee.
      - id: module-3-0188-s2
        text: Cuaca hari ini tidak begitu panas.
        blank: tidak begitu
        en: The weather today is not very hot.
      - id: module-3-0188-s3
        text: Dia tidak begitu lapar sekarang.
        blank: tidak begitu
        en: She is not particularly hungry right now.
  - id: module-3-0189
    indonesian: yang + (adjective)
    english: the (adjective) one
    audio: 6a467a1fd5e8.ogg
    note:
      en: Use 'yang + adjective' after a noun to mean 'the [adjective] one'; very
        common in everyday speech, e.g. 'yang besar' = 'the big one'.
    sentences:
      - id: module-3-0189-s1
        text: Saya mau yang merah, bukan yang biru.
        blank: yang merah
        en: I want the red one, not the blue one.
      - id: module-3-0189-s2
        text: Tolong ambilkan baju yang bersih.
        blank: yang bersih
        en: Please get the clean clothes.
      - id: module-3-0189-s3
        text: Mana tas yang besar?
        blank: yang besar
        en: Which one is the big bag?
  - id: module-3-0190
    indonesian: yang lain
    english: the other one
    audio: bb592df9fe1c.ogg
    note:
      en: '"Yang lain" means "the other one" or "the others"; often confused with
        "lainnya" which is slightly more formal; commonly used in everyday
        choices and comparisons.'
    sentences:
      - id: module-3-0190-s1
        text: Saya mau yang lain, bukan ini.
        blank: yang lain
        en: I want the other one, not this one.
      - id: module-3-0190-s2
        text: Di mana yang lain pergi?
        blank: yang lain
        en: Where did the others go?
      - id: module-3-0190-s3
        text: Coba baju yang lain saja.
        blank: yang lain
        en: Just try the other shirt.
  - id: module-3-0191
    indonesian: memakai (pakai)
    english: to use something, to wear something
    audio: f69509cf48e5.ogg
    note:
      en: "'Pakai' is informal/everyday; 'memakai' is the formal me- verb form; both
        mean to use or wear something — often confused with 'mengenakan' which
        is more formal for wearing clothes."
    sentences:
      - id: module-3-0191-s1
        text: Dia memakai baju merah hari ini.
        blank: memakai
        en: She is wearing a red shirt today.
      - id: module-3-0191-s2
        text: Saya pakai sepeda ke pasar.
        blank: pakai
        en: I use a bicycle to go to the market.
      - id: module-3-0191-s3
        text: Anak itu memakai sandal baru.
        blank: memakai
        en: That child is wearing new sandals.
  - id: module-3-0192
    indonesian: memelihara (pelihara)
    english: to keep (as a pet, domestic animal or farm animal)
    audio: 934689e17ba8.ogg
    note:
      en: '"Memelihara" is the formal/full form; "pelihara" appears in compounds like
        "hewan peliharaan" (pet animal); not to be confused with "merawat" (to
        care for/nurse).'
    sentences:
      - id: module-3-0192-s1
        text: Saya memelihara kucing di rumah.
        blank: memelihara
        en: I keep a cat at home.
      - id: module-3-0192-s2
        text: Kakak saya memelihara ayam di kebun.
        blank: memelihara
        en: My older sibling keeps chickens in the yard.
      - id: module-3-0192-s3
        text: Apakah kamu memelihara ikan di sini?
        blank: memelihara
        en: Do you keep fish here?
  - id: module-3-0193
    indonesian: mengajar (ajar)
    english: to teach (someone / students / pupils / a subject), to do teaching
    audio: 0661ccb3db96.ogg
    note:
      en: "\"Mengajar\" means to teach others (students/pupils); don't confuse with
        \"belajar\" (to learn/study) — they are opposites; related: \"guru\"
        (teacher), \"pelajaran\" (lesson)."
    sentences:
      - id: module-3-0193-s1
        text: Bu Sari mengajar matematika di sekolah.
        blank: mengajar
        en: Mrs. Sari teaches mathematics at school.
      - id: module-3-0193-s2
        text: Ayah saya mengajar anak-anak di sini.
        blank: mengajar
        en: My father teaches children here.
      - id: module-3-0193-s3
        text: Dia mengajar bahasa Inggris setiap hari.
        blank: mengajar
        en: She teaches English every day.
  - id: module-3-0194
    indonesian: menolong (tolong)
    english: to help someone (especially someone in difficulty)
    audio: d6e47721f250.ogg
    note:
      en: '"Tolong" is the casual/polite request form ("please help" or just
        "please"), while "menolong" is the full verb "to help someone"; both are
        very common and interchangeable in everyday speech.'
    sentences:
      - id: module-3-0194-s1
        text: Dia menolong nenek membawa tas berat.
        blank: menolong
        en: He helps the grandmother carry a heavy bag.
      - id: module-3-0194-s2
        text: Tolong, saya tidak bisa membuka pintu ini.
        blank: Tolong
        en: Please help, I can't open this door.
      - id: module-3-0194-s3
        text: Saya mau menolong teman saya.
        blank: menolong
        en: I want to help my friend.
  - id: module-3-0195
    indonesian: menunggu (tunggu)
    english: to wait, to wait for (someone / something), to await
    audio: 74eb5f9ed27b.ogg
    note:
      en: '"Menunggu" is the formal/written form; "tunggu" is used in casual speech
        and commands (e.g., "Tunggu sebentar!" = "Wait a moment!"); commonly
        paired with objects like orang (person) or bis (bus).'
    sentences:
      - id: module-3-0195-s1
        text: Saya menunggu bis di halte.
        blank: menunggu
        en: I am waiting for the bus at the stop.
      - id: module-3-0195-s2
        text: Dia menunggu teman di kafe.
        blank: menunggu
        en: She is waiting for a friend at the café.
      - id: module-3-0195-s3
        text: Tunggu saya di sini, ya!
        blank: Tunggu
        en: Wait for me here, okay!
  - id: module-3-0196
    indonesian: minta tolong
    english: to ask for assistance/help
    audio: 16a635a0441b.ogg
    note:
      en: "'Minta tolong' is a polite, everyday phrase used to ask someone for help;
        very common in casual and formal speech; related to 'tolong' alone which
        can mean 'please help' or 'please'."
    sentences:
      - id: module-3-0196-s1
        text: Saya minta tolong kepada ibu saya.
        blank: minta tolong
        en: I ask for help from my mother.
      - id: module-3-0196-s2
        text: Dia minta tolong membuka pintu itu.
        blank: minta tolong
        en: He asks for help opening that door.
      - id: module-3-0196-s3
        text: Kami minta tolong ke tetangga kami.
        blank: minta tolong
        en: We ask for help from our neighbor.
  - id: module-3-0197
    indonesian: sejarah
    english: history
    audio: 805900668c96.ogg
    note:
      en: "'Sejarah' means history as a subject or concept; used in school contexts
        (mata pelajaran sejarah = history subject); not to be confused with
        'cerita' (story)."
    sentences:
      - id: module-3-0197-s1
        text: Saya suka belajar sejarah di sekolah.
        blank: sejarah
        en: I like studying history at school.
      - id: module-3-0197-s2
        text: Bali punya sejarah yang sangat menarik.
        blank: sejarah
        en: Bali has a very interesting history.
      - id: module-3-0197-s3
        text: Guru sejarah saya sangat baik.
        blank: sejarah
        en: My history teacher is very kind.
  - id: module-3-0198
    indonesian: selalu
    english: always
    audio: 0d92c9963626.ogg
    note:
      en: "'Selalu' means 'always' and is placed before the verb; not to be confused
        with 'sering' (often) or 'biasanya' (usually)."
    sentences:
      - id: module-3-0198-s1
        text: Saya selalu makan nasi setiap hari.
        blank: selalu
        en: I always eat rice every day.
      - id: module-3-0198-s2
        text: Dia selalu pergi ke pantai pagi-pagi.
        blank: selalu
        en: She always goes to the beach early in the morning.
      - id: module-3-0198-s3
        text: Kami selalu minum kopi di warung.
        blank: selalu
        en: We always drink coffee at the small café.
  - id: module-3-0199
    indonesian: selama
    english: for (a certain period of time)
    audio: 1b70f5b7dc42.ogg
    note:
      en: "'Selama' means 'for' a duration of time (e.g. selama dua jam = for two
        hours); don't confuse with 'untuk' (for a purpose/recipient)."
    sentences:
      - id: module-3-0199-s1
        text: Saya belajar bahasa Indonesia selama dua jam.
        blank: selama
        en: I study Indonesian for two hours.
      - id: module-3-0199-s2
        text: Dia tinggal di Bali selama satu minggu.
        blank: selama
        en: She stays in Bali for one week.
      - id: module-3-0199-s3
        text: Kami berenang selama satu jam.
        blank: selama
        en: We swim for one hour.
  - id: module-3-0200
    indonesian: sendirian
    english: alone, on your own (i.e. without a companion)
    audio: c10a0283638e.ogg
    note:
      en: "'Sendirian' means alone/by oneself (no companion); don't confuse with
        'saja' (just/only) or 'sendiri' (self/own), though 'sendiri' is closely
        related and sometimes interchangeable."
    sentences:
      - id: module-3-0200-s1
        text: Dia makan malam sendirian di rumah.
        blank: sendirian
        en: She eats dinner alone at home.
      - id: module-3-0200-s2
        text: Saya pergi ke pantai sendirian hari ini.
        blank: sendirian
        en: I went to the beach alone today.
      - id: module-3-0200-s3
        text: Anak itu bermain sendirian di taman.
        blank: sendirian
        en: That child is playing alone in the park.
  - id: module-3-0201
    indonesian: sudah cukup
    english: that's enough, that will do
    audio: 8705e40c4d99.ogg
