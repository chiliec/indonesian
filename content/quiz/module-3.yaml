id: module-3
title:
  en: Module 3
cards:
  - id: module-3-0001
    indonesian: berangkat
    english: to depart, to set off (to go somewhere) to leave (on a trip)
    audio: ddb5c9d7778d.ogg
    note:
      en: '"Berangkat" refers to setting off or departing for a destination; commonly
        confused with "pergi" (to go) — "berangkat" emphasizes the moment of
        leaving, often used for trips, school, or work; related: "keberangkatan"
        (departure).'
    sentences:
      - id: module-3-0001-s1
        text: Saya berangkat ke sekolah pukul tujuh.
        blank: berangkat
        en: I leave for school at seven o'clock.
      - id: module-3-0001-s2
        text: Kami berangkat ke Bali besok pagi.
        blank: berangkat
        en: We depart for Bali tomorrow morning.
      - id: module-3-0001-s3
        text: Bus itu berangkat dari terminal sekarang.
        blank: berangkat
        en: The bus is departing from the terminal now.
  - id: module-3-0002
    indonesian: berkunjung (ke)
    english: to visit (a place)
    audio: e59e337924e3.ogg
    note:
      en: '"Berkunjung (ke)" means to visit a place (not a person); use "mengunjungi"
        for visiting people; common in polite or written speech.'
    sentences:
      - id: module-3-0002-s1
        text: Kami berkunjung ke pura hari ini.
        blank: berkunjung
        en: We are visiting a temple today.
      - id: module-3-0002-s2
        text: Dia berkunjung ke pasar setiap minggu.
        blank: berkunjung
        en: She visits the market every week.
      - id: module-3-0002-s3
        text: Saya ingin berkunjung ke Bali.
        blank: berkunjung
        en: I want to visit Bali.
  - id: module-3-0003
    indonesian: kurang (time)
    english: to, before (when telling the time)
    audio: c37610a10dee.ogg
    note:
      en: '"Kurang" means "to" or "before" when telling the time, e.g. "kurang lima" =
        "five to"; often confused with "kurang" meaning "less/not enough".'
    sentences:
      - id: module-3-0003-s1
        text: Sekarang jam tiga kurang sepuluh menit.
        blank: kurang
        en: It is now ten to three.
      - id: module-3-0003-s2
        text: Bus datang jam delapan kurang lima.
        blank: kurang
        en: The bus arrives at five to eight.
      - id: module-3-0003-s3
        text: Kelas mulai jam sembilan kurang seperempat.
        blank: kurang
        en: Class starts at a quarter to nine.
  - id: module-3-0004
    indonesian: lewat
    english: past (when telling the time),to go past
    audio: 876e900f70ea.ogg
    note:
      en: "\"Lewat\" means 'past' in time expressions (e.g., jam tiga lewat lima =
        five past three) and also 'to pass/go past' a place; don't confuse with
        \"melewati\" which is the formal verb form."
    sentences:
      - id: module-3-0004-s1
        text: Sekarang jam dua lewat sepuluh menit.
        blank: lewat
        en: It is now ten past two.
      - id: module-3-0004-s2
        text: Bus ini lewat pasar setiap pagi.
        blank: lewat
        en: This bus goes past the market every morning.
      - id: module-3-0004-s3
        text: Dia lewat rumah saya tadi.
        blank: lewat
        en: He passed by my house just now.
  - id: module-3-0005
    indonesian: makan pagi
    english: to have breakfast
    audio: 3fa3bb64815f.ogg
    note:
      en: "'Makan pagi' is the everyday informal term for breakfast; 'sarapan' is a
        common synonym you will also hear often."
    sentences:
      - id: module-3-0005-s1
        text: Saya makan pagi di rumah setiap hari.
        blank: makan pagi
        en: I have breakfast at home every day.
      - id: module-3-0005-s2
        text: Kami makan pagi bersama di warung.
        blank: makan pagi
        en: We have breakfast together at the warung.
      - id: module-3-0005-s3
        text: Dia belum makan pagi pagi ini.
        blank: makan pagi
        en: She has not had breakfast yet this morning.
  - id: module-3-0006
    indonesian: makan siang
    english: to have lunch
    audio: a13c1c94358d.ogg
    note:
      en: '"Makan siang" literally means "eat midday"; use it for lunch around noon,
        distinct from "makan pagi" (breakfast) and "makan malam" (dinner).'
    sentences:
      - id: module-3-0006-s1
        text: Saya makan siang di warung setiap hari.
        blank: makan siang
        en: I have lunch at the food stall every day.
      - id: module-3-0006-s2
        text: Kami makan siang bersama di kantin.
        blank: makan siang
        en: We have lunch together in the canteen.
      - id: module-3-0006-s3
        text: Dia belum makan siang hari ini.
        blank: makan siang
        en: She has not had lunch yet today.
  - id: module-3-0007
    indonesian: makan malam
    english: to have dinner
    audio: 4a158966c39e.ogg
    note:
      en: '"Makan malam" literally means "eat night" and refers to dinner; similar
        forms are "makan pagi" (breakfast) and "makan siang" (lunch).'
    sentences:
      - id: module-3-0007-s1
        text: Kami makan malam bersama keluarga setiap hari.
        blank: makan malam
        en: We have dinner together with family every day.
      - id: module-3-0007-s2
        text: Saya ingin makan malam di restoran ini.
        blank: makan malam
        en: I want to have dinner at this restaurant.
      - id: module-3-0007-s3
        text: Dia sudah makan malam tadi malam.
        blank: makan malam
        en: She already had dinner last night.
  - id: module-3-0008
    indonesian: perusahaan
    english: company, business enterprise
    audio: bd7cab2ec0ac.ogg
    note:
      en: '"Perusahaan" means a formal company or business enterprise; more formal
        than "toko" (shop) or "usaha" (small business/effort).'
    sentences:
      - id: module-3-0008-s1
        text: Ayah saya bekerja di perusahaan besar.
        blank: perusahaan
        en: My father works at a big company.
      - id: module-3-0008-s2
        text: Perusahaan itu menjual air minum.
        blank: perusahaan
        en: That company sells drinking water.
      - id: module-3-0008-s3
        text: Dia ingin bekerja di perusahaan terkenal.
        blank: perusahaan
        en: She wants to work at a famous company.
  - id: module-3-0009
    indonesian: pukul
    english: o'clock[a marker word used to express the time of day in hours and minutes]
    audio: 36130c0176d1.ogg
    note:
      en: '"Pukul" is the formal/neutral word for telling time in hours; it is
        interchangeable with "jam" in many contexts but sounds slightly more
        formal, and is never used to mean the physical object clock.'
    sentences:
      - id: module-3-0009-s1
        text: Kelas dimulai pukul delapan pagi.
        blank: pukul
        en: Class starts at eight o'clock in the morning.
      - id: module-3-0009-s2
        text: Kami makan siang pukul dua belas.
        blank: pukul
        en: We have lunch at twelve o'clock.
      - id: module-3-0009-s3
        text: Toko itu tutup pukul sembilan malam.
        blank: pukul
        en: That shop closes at nine o'clock at night.
  - id: module-3-0010
    indonesian: sampai
    english: until (a certain time) as far as (a certain place)
    audio: 99aab4b4bef6.ogg
    note:
      en: '"Sampai" is everyday informal/neutral Indonesian for both time ("until")
        and place ("as far as / to"); very common in spoken Balinese/Indonesian
        life, often confused with "ke" (simple direction) — use "sampai" when
        emphasizing the endpoint.'
    sentences:
      - id: module-3-0010-s1
        text: Saya belajar sampai jam sepuluh malam.
        blank: sampai
        en: I study until ten o'clock at night.
      - id: module-3-0010-s2
        text: Bus ini pergi sampai pantai Kuta.
        blank: sampai
        en: This bus goes as far as Kuta beach.
      - id: module-3-0010-s3
        text: Toko itu buka sampai sore.
        blank: sampai
        en: That shop is open until the afternoon.
  - id: module-3-0011
    indonesian: sarapan
    english: breakfast, to have breakfast
    audio: 3e6812ad7ef9.ogg
    note:
      en: "'Sarapan' means both 'breakfast' (noun) and 'to have breakfast' (verb);
        commonly confused with 'makan pagi' which means the same thing but is
        slightly more formal."
    sentences:
      - id: module-3-0011-s1
        text: Saya sarapan nasi goreng setiap pagi.
        blank: sarapan
        en: I have breakfast with fried rice every morning.
      - id: module-3-0011-s2
        text: Ayo kita sarapan di warung itu!
        blank: sarapan
        en: Let's have breakfast at that small restaurant!
      - id: module-3-0011-s3
        text: Dia belum sarapan hari ini.
        blank: sarapan
        en: She has not had breakfast today.
  - id: module-3-0012
    indonesian: seperempat
    english: a quarter
    audio: 84fbc9fc1d61.ogg
    note:
      en: '"Seperempat" means "a quarter" (1/4); commonly used for time (seperempat
        jam = quarter hour) and fractions of food or money; related: "setengah"
        (half), "sepertiga" (one third).'
    sentences:
      - id: module-3-0012-s1
        text: Saya makan seperempat semangka di pantai.
        blank: seperempat
        en: I eat a quarter of a watermelon at the beach.
      - id: module-3-0012-s2
        text: Dia datang seperempat jam yang lalu.
        blank: seperempat
        en: She arrived a quarter of an hour ago.
      - id: module-3-0012-s3
        text: Berikan aku seperempat kue itu.
        blank: seperempat
        en: Give me a quarter of that cake.
  - id: module-3-0013
    indonesian: setengah
    english: a half
    audio: 83b751d2ce7c.ogg
    note:
      en: "\"Setengah\" means \"half\" and is used for fractions, time (setengah tiga
        = 2:30), and quantities; don't confuse with \"separuh\" which is a
        near-synonym but less common in daily speech."
    sentences:
      - id: module-3-0013-s1
        text: Saya minum setengah gelas air putih.
        blank: setengah
        en: I drink half a glass of water.
      - id: module-3-0013-s2
        text: Dia makan setengah porsi nasi goreng.
        blank: setengah
        en: She eats half a portion of fried rice.
      - id: module-3-0013-s3
        text: Sekarang jam setengah delapan pagi.
        blank: setengah
        en: It is now seven-thirty in the morning.
  - id: module-3-0014
    indonesian: tengah malam
    english: at midnight, in the middle of the night
    audio: 961a608ecf75.ogg
    note:
      en: "'Tengah malam' literally means 'middle of the night'; used in everyday
        speech for midnight or very late at night, similar to 'jam dua belas
        malam'."
    sentences:
      - id: module-3-0014-s1
        text: Dia pulang ke rumah tengah malam.
        blank: tengah malam
        en: He went home in the middle of the night.
      - id: module-3-0014-s2
        text: Saya lapar tengah malam.
        blank: tengah malam
        en: I am hungry at midnight.
      - id: module-3-0014-s3
        text: Anjing itu menggonggong tengah malam.
        blank: tengah malam
        en: The dog barked in the middle of the night.
  - id: module-3-0015
    indonesian: tertawa
    english: to laugh
    audio: 8a680019382c.ogg
    note:
      en: "'Tertawa' means 'to laugh'; it is a standard/neutral word — related words
        include 'senyum' (smile) and 'tawa' (laughter/noun form)."
    sentences:
      - id: module-3-0015-s1
        text: Anak-anak tertawa di taman setiap hari.
        blank: tertawa
        en: The children laugh in the park every day.
      - id: module-3-0015-s2
        text: Kami tertawa bersama saat makan malam.
        blank: tertawa
        en: We laugh together during dinner.
      - id: module-3-0015-s3
        text: Dia tertawa karena cerita itu lucu.
        blank: tertawa
        en: She laughs because the story is funny.
  - id: module-3-0016
    indonesian: apaan
    english: (slangy) what kind of...
    audio: 93ad450c50b4.ogg
    note:
      en: '"Apaan" is informal/slang for "apa" (what), often expressing surprise or
        mild annoyance; avoid in formal speech; related to "apa ini" (what is
        this).'
    sentences:
      - id: module-3-0016-s1
        text: Apaan ini, kok aneh banget?
        blank: Apaan
        en: What is this, it's so weird?
      - id: module-3-0016-s2
        text: Kamu makan apaan tadi?
        blank: apaan
        en: What kind of thing did you eat just now?
      - id: module-3-0016-s3
        text: Apaan sih, itu bukan makananku!
        blank: Apaan
        en: What the heck, that's not my food!
  - id: module-3-0017
    indonesian: banget
    english: (slangy)very, really
    audio: a8b680db4ebd.ogg
    note:
      en: "'Banget' is informal/slang for 'very' or 'really'; placed after the
        adjective (e.g. 'enak banget'), common in everyday speech; formal
        equivalent is 'sekali'."
    sentences:
      - id: module-3-0017-s1
        text: Makanan ini enak banget!
        blank: banget
        en: This food is really delicious!
      - id: module-3-0017-s2
        text: Cuacanya panas banget hari ini.
        blank: banget
        en: The weather is very hot today.
      - id: module-3-0017-s3
        text: Saya capek banget setelah jalan jauh.
        blank: banget
        en: I am really tired after walking far.
  - id: module-3-0018
    indonesian: beres
    english: fixed up, put right, all okay, resolved
    audio: 7fd15c2d261b.ogg
    note:
      en: "'Beres' is informal/colloquial, used to mean everything is settled or done;
        similar to 'sudah selesai' but more casual; related: 'beres-beres' means
        to tidy up."
    sentences:
      - id: module-3-0018-s1
        text: Kamar saya sudah beres sekarang.
        blank: beres
        en: My room is all tidied up now.
      - id: module-3-0018-s2
        text: Masalah itu sudah beres, terima kasih.
        blank: beres
        en: That problem is resolved now, thank you.
      - id: module-3-0018-s3
        text: Apakah semuanya sudah beres?
        blank: beres
        en: Is everything all okay?
  - id: module-3-0019
    indonesian: berlari
    english: to run
    audio: 7302be98dcc5.ogg
    note:
      en: "'berlari' is the standard verb 'to run'; related words include 'lari'
        (run/noun) and 'berlari-lari' (to run around/leisurely); used in
        everyday and formal contexts."
    sentences:
      - id: module-3-0019-s1
        text: Anak itu berlari di pantai setiap pagi.
        blank: berlari
        en: That child runs on the beach every morning.
      - id: module-3-0019-s2
        text: Saya berlari ke sekolah karena terlambat.
        blank: berlari
        en: I run to school because I am late.
      - id: module-3-0019-s3
        text: Mereka berlari bersama di taman.
        blank: berlari
        en: They run together in the park.
  - id: module-3-0020
    indonesian: doyan
    english: (slangy) to like (especially food)
    audio: cce41b437412.ogg
    note:
      en: "'Doyan' is informal/slang for liking food or activities; avoid in formal
        writing; similar to 'suka' but more colloquial and often implies craving
        or being fond of eating something."
    sentences:
      - id: module-3-0020-s1
        text: Saya doyan makan nasi goreng setiap pagi.
        blank: doyan
        en: I really like eating fried rice every morning.
      - id: module-3-0020-s2
        text: Anak itu doyan sekali minum es teh.
        blank: doyan
        en: That child really loves drinking iced tea.
      - id: module-3-0020-s3
        text: Kamu doyan buah mangga tidak?
        blank: doyan
        en: Do you like mangoes?
  - id: module-3-0021
    indonesian: ikut kuliah
    english: to attend a lecture, to go to a lecture
    audio: 1c613538fca1.ogg
    note:
      en: '"Ikut" means to join/follow/attend; "ikut kuliah" is a natural colloquial
        way to say attending a lecture, more casual than "menghadiri kuliah";
        also related: "ikut kelas" (attend class).'
    sentences:
      - id: module-3-0021-s1
        text: Hari ini saya ikut kuliah di kampus.
        blank: ikut kuliah
        en: Today I attend a lecture at the campus.
      - id: module-3-0021-s2
        text: Dia tidak ikut kuliah kemarin.
        blank: ikut kuliah
        en: She did not attend the lecture yesterday.
      - id: module-3-0021-s3
        text: Besok kamu ikut kuliah bersama kami?
        blank: ikut kuliah
        en: Are you going to the lecture with us tomorrow?
  - id: module-3-0022
    indonesian: jam berapa?
    english: what time?
    audio: d183013634e8.ogg
    note:
      en: '"Jam berapa?" means "what time?" and is used to ask the time; pair it with
        "sekarang" (now) for "what time is it now?"'
    sentences:
      - id: module-3-0022-s1
        text: Jam berapa kita berangkat ke pantai?
        blank: jam berapa
        en: What time do we leave for the beach?
      - id: module-3-0022-s2
        text: Maaf, jam berapa warung ini buka?
        blank: jam berapa
        en: Excuse me, what time does this food stall open?
      - id: module-3-0022-s3
        text: Jam berapa kamu makan malam?
        blank: jam berapa
        en: What time do you have dinner?
  - id: module-3-0023
    indonesian: kalo
    english: (slangy) if as for (me/him/that etc.) as far as ... is concerned (informal)
    audio: 3989efa76f17.ogg
    note:
      en: '"Kalo" is an informal/slang contraction of "kalau" (if / as for); very
        common in casual speech but avoid in formal writing.'
    sentences:
      - id: module-3-0023-s1
        text: Kalo lapar, kita makan di warung.
        blank: Kalo
        en: If (you're) hungry, let's eat at the food stall.
      - id: module-3-0023-s2
        text: Kalo aku, suka nasi goreng.
        blank: Kalo
        en: As for me, I like fried rice.
      - id: module-3-0023-s3
        text: Kalo hujan, aku di rumah.
        blank: Kalo
        en: If it rains, I stay at home.
  - id: module-3-0024
    indonesian: ketemu
    english: (informal) to meet, to find
    audio: 6751e2fcf8ee.ogg
    note:
      en: Informal spoken form of 'bertemu' (to meet) and 'menemukan' (to find); very
        common in everyday speech but avoid in formal writing.
    sentences:
      - id: module-3-0024-s1
        text: Saya ketemu teman lama di pasar.
        blank: ketemu
        en: I met an old friend at the market.
      - id: module-3-0024-s2
        text: Dia ketemu dompetnya di kursi.
        blank: ketemu
        en: She found her wallet on the chair.
      - id: module-3-0024-s3
        text: Kita ketemu besok di kafe, ya?
        blank: ketemu
        en: We'll meet tomorrow at the café, okay?
  - id: module-3-0025
    indonesian: lapangan
    english: a field, a (sports) ground, an open space (especially for recreation)
    audio: 65826bfea4cc.ogg
    note:
      en: '"Lapangan" is neutral/everyday register; commonly used for sports fields
        and open plazas; related words: "ladang" (farm field), "lapangan
        terbang" (airport).'
    sentences:
      - id: module-3-0025-s1
        text: Anak-anak bermain bola di lapangan.
        blank: lapangan
        en: The children are playing football on the field.
      - id: module-3-0025-s2
        text: Lapangan itu sangat luas dan hijau.
        blank: lapangan
        en: The field is very wide and green.
      - id: module-3-0025-s3
        text: Kami berlari di lapangan setiap pagi.
        blank: lapangan
        en: We run on the field every morning.
  - id: module-3-0026
    indonesian: lebih suka
    english: to prefer,to like something better
    audio: 5d733531954e.ogg
    note:
      en: '"Lebih suka" means to prefer or like something better; use it before a noun
        or verb, e.g. "lebih suka makan" (prefer to eat); related: "suka" (to
        like).'
    sentences:
      - id: module-3-0026-s1
        text: Saya lebih suka nasi daripada roti.
        blank: lebih suka
        en: I prefer rice over bread.
      - id: module-3-0026-s2
        text: Dia lebih suka minum teh setiap pagi.
        blank: lebih suka
        en: She prefers to drink tea every morning.
      - id: module-3-0026-s3
        text: Kami lebih suka pantai daripada gunung.
        blank: lebih suka
        en: We prefer the beach over the mountain.
  - id: module-3-0027
    indonesian: lumayan
    english: not bad, quite good
    audio: 6630138cd794.ogg
    note:
      en: "'Lumayan' is casual/colloquial, used to say something is 'not bad' or
        'pretty good'; avoid confusing it with 'cukup' (enough/sufficient)."
    sentences:
      - id: module-3-0027-s1
        text: Makanan di sini lumayan enak.
        blank: lumayan
        en: The food here is pretty good.
      - id: module-3-0027-s2
        text: Harganya lumayan murah untuk wisatawan.
        blank: lumayan
        en: The price is quite cheap for tourists.
      - id: module-3-0027-s3
        text: Cuacanya lumayan panas hari ini.
        blank: lumayan
        en: The weather is quite hot today.
  - id: module-3-0028
    indonesian: nanti siang
    english: this afternoon (spoken in the morning)
    audio: 9364c0224807.ogg
    note:
      en: "\"Nanti siang\" means 'this afternoon' and is used in the morning when
        referring to later that same day; don't confuse with \"tadi siang\"
        (earlier this afternoon) or \"siang ini\" (a more formal equivalent)."
    sentences:
      - id: module-3-0028-s1
        text: Kita makan soto nanti siang, ya?
        blank: nanti siang
        en: We'll eat soto this afternoon, okay?
      - id: module-3-0028-s2
        text: Nanti siang ada hujan di Bali.
        blank: nanti siang
        en: This afternoon there will be rain in Bali.
      - id: module-3-0028-s3
        text: Saya ke pasar nanti siang.
        blank: nanti siang
        en: I'm going to the market this afternoon.
  - id: module-3-0029
    indonesian: nanti sore
    english: late this afternoon (spoken earlier in the day)
    audio: e212d5d15d1e.ogg
    note:
      en: '"Nanti sore" means "later this afternoon" and is used when speaking earlier
        in the day; "nanti" alone means "later" and "sore" means
        "afternoon/evening" (roughly 3–6 PM).'
    sentences:
      - id: module-3-0029-s1
        text: Kita pergi ke pantai nanti sore.
        blank: nanti sore
        en: We are going to the beach later this afternoon.
      - id: module-3-0029-s2
        text: Dia akan datang nanti sore.
        blank: nanti sore
        en: He/She will come later this afternoon.
      - id: module-3-0029-s3
        text: Saya makan nasi goreng nanti sore.
        blank: nanti sore
        en: I will eat fried rice later this afternoon.
  - id: module-3-0030
    indonesian: nanti malam
    english: tonight (spoken earlier in the day)
