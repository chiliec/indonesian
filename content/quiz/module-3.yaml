      - id: module-3-0201-s2
        text: Uang ini sudah cukup untuk makan.
        blank: sudah cukup
        en: This money is enough for eating.
      - id: module-3-0201-s3
        text: Sudah cukup, aku kenyang sekarang.
        blank: Sudah cukup
        en: That's enough, I'm full now.
  - id: module-3-0202
    indonesian: tidak pernah
    english: never (the opposite of 'always')
    audio: c7f72ee4bbc1.ogg
    note:
      en: '"Tidak pernah" means "never" and is the opposite of "selalu" (always); use
