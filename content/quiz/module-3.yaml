      - id: module-3-0206-s1
        text: Dia adalah seorang detektif yang pintar.
        blank: detektif
        en: He is a smart detective.
      - id: module-3-0206-s2
        text: Detektif itu mencari jejak pencuri.
        blank: Detektif
