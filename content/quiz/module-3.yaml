      - id: module-3-0204-s2
        text: Dia akhirnya makan siang hari ini.
        blank: akhirnya
        en: He finally ate lunch today.
      - id: module-3-0204-s3
        text: Akhirnya hujan berhenti sore ini.
        blank: Akhirnya
        en: Finally, the rain stopped this afternoon.
  - id: module-3-0205
    indonesian: berapa lama
    english: how long
    audio: 09486eda8804.ogg
    note:
      en: "'Berapa lama' asks about duration of time; don't confuse with 'berapa'
        alone (how much/many) or 'sudah berapa lama' (how long have you)."
    sentences:
      - id: module-3-0205-s1
        text: Berapa lama perjalanan ke pantai ini?
        blank: Berapa lama
        en: How long is the trip to this beach?
      - id: module-3-0205-s2
        text: Berapa lama kamu tinggal di Bali?
        blank: Berapa lama
        en: How long are you staying in Bali?
      - id: module-3-0205-s3
        text: Berapa lama kelas bahasa Indonesia ini?
        blank: Berapa lama
        en: How long is this Indonesian class?
  - id: module-3-0206
    indonesian: detektif
    english: detective
    audio: d98740daa9cc.ogg
