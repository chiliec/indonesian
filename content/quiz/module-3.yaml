    indonesian: hari Minggu
    english: Sunday
    audio: c427a297ba4d.ogg
    note:
      en: '"hari Minggu" means Sunday; "hari" means day, used before all day names
        (e.g. hari Senin = Monday); always capitalized.'
    sentences:
      - id: module-3-0089-s1
        text: Saya pergi ke pantai pada hari Minggu.
        blank: hari Minggu
        en: I go to the beach on Sunday.
      - id: module-3-0089-s2
        text: Hari Minggu adalah hari libur.
        blank: hari Minggu
        en: Sunday is a holiday.
      - id: module-3-0089-s3
        text: Kita makan bersama keluarga hari Minggu.
        blank: hari Minggu
        en: We eat together with family on Sunday.
  - id: module-3-0090
    indonesian: hari Senin
    english: Monday
    audio: 6b8f420af900.ogg
    note:
      en: "'hari Senin' means Monday; 'hari' means 'day' and is used before all day
        names in Indonesian; similar to 'hari Selasa' (Tuesday), 'hari Rabu'
        (Wednesday), etc."
    sentences:
      - id: module-3-0090-s1
        text: Saya pergi ke sekolah pada hari Senin.
        blank: hari Senin
        en: I go to school on Monday.
      - id: module-3-0090-s2
        text: Pasar buka pada hari Senin pagi.
        blank: hari Senin
        en: The market opens on Monday morning.
      - id: module-3-0090-s3
        text: Hari Senin adalah hari kerja.
        blank: Hari Senin
        en: Monday is a workday.
  - id: module-3-0091
    indonesian: hari Selasa
    english: Tuesday
    audio: 7f619d58b846.ogg
    note:
      en: "'Hari Selasa' means Tuesday; 'hari' means 'day' and can be dropped in
        casual speech; days of the week in Indonesian come from Arabic (Selasa =
        Tuesday, from 'thulāthāʾ')."
    sentences:
      - id: module-3-0091-s1
        text: Hari Selasa saya pergi ke pasar.
        blank: Hari Selasa
        en: On Tuesday I go to the market.
      - id: module-3-0091-s2
        text: Besok adalah hari Selasa.
        blank: hari Selasa
        en: Tomorrow is Tuesday.
      - id: module-3-0091-s3
        text: Kelas bahasa Inggris ada hari Selasa.
        blank: hari Selasa
        en: The English class is on Tuesday.
  - id: module-3-0092
    indonesian: hari Rabu
    english: Wednesday
    audio: 58e0f532fd3b.ogg
    note:
      en: "'Hari Rabu' means Wednesday; 'hari' means 'day' and is often included but
        can be dropped in casual speech."
    sentences:
      - id: module-3-0092-s1
        text: Hari Rabu saya pergi ke pasar.
        blank: hari Rabu
        en: On Wednesday I go to the market.
      - id: module-3-0092-s2
        text: Kelas bahasa Inggris ada hari Rabu.
        blank: hari Rabu
        en: The English class is on Wednesday.
      - id: module-3-0092-s3
        text: Besok adalah hari Rabu.
        blank: hari Rabu
        en: Tomorrow is Wednesday.
  - id: module-3-0093
    indonesian: hari Kamis
    english: Thursday
    audio: 3c271c7f1827.ogg
    note:
      en: '"Hari Kamis" means Thursday; "hari" means day, used before all day names in
        Indonesian (hari Senin, hari Selasa, etc.).'
    sentences:
      - id: module-3-0093-s1
        text: Saya pergi ke pasar pada hari Kamis.
        blank: hari Kamis
        en: I go to the market on Thursday.
      - id: module-3-0093-s2
        text: Kelas bahasa Inggris ada pada hari Kamis.
        blank: hari Kamis
        en: English class is on Thursday.
      - id: module-3-0093-s3
        text: Hari Kamis saya libur dari sekolah.
        blank: Hari Kamis
        en: On Thursday I have a day off from school.
  - id: module-3-0094
    indonesian: hari Jumat
    english: Friday
    audio: c06efa4c4c63.ogg
    note:
      en: "'Hari Jumat' means Friday; 'hari' means 'day', and days of the week always
        use 'hari' before the name."
    sentences:
      - id: module-3-0094-s1
        text: Saya pergi ke pasar pada hari Jumat.
        blank: hari Jumat
        en: I go to the market on Friday.
      - id: module-3-0094-s2
        text: Hari Jumat adalah hari favorit saya.
        blank: hari Jumat
        en: Friday is my favorite day.
      - id: module-3-0094-s3
        text: Kita makan bersama pada hari Jumat.
        blank: hari Jumat
        en: We eat together on Friday.
  - id: module-3-0095
    indonesian: hari Sabtu
    english: Saturday
    audio: b199f215a7eb.ogg
    note:
      en: "'hari Sabtu' means Saturday; 'hari' means 'day', often omitted in casual
        speech; related: hari Minggu (Sunday), hari Senin (Monday)."
    sentences:
      - id: module-3-0095-s1
        text: Saya pergi ke pasar pada hari Sabtu.
        blank: hari Sabtu
        en: I go to the market on Saturday.
      - id: module-3-0095-s2
        text: Besok adalah hari Sabtu.
        blank: hari Sabtu
        en: Tomorrow is Saturday.
      - id: module-3-0095-s3
        text: Kami libur pada hari Sabtu.
        blank: hari Sabtu
        en: We have a day off on Saturday.
  - id: module-3-0096
    indonesian: kapan
    english: when?
    audio: 4aa50b4c91cb.ogg
    note:
      en: "'Kapan' means 'when' used in questions about time; commonly confused with
        'ketika' (when/while, used in statements, not questions)."
    sentences:
      - id: module-3-0096-s1
        text: Kapan kamu pergi ke Bali?
        blank: Kapan
        en: When are you going to Bali?
      - id: module-3-0096-s2
        text: Kapan warung ini buka setiap hari?
        blank: Kapan
        en: When does this food stall open every day?
      - id: module-3-0096-s3
        text: Ibu mau tahu kapan kita makan.
        blank: kapan
        en: Mom wants to know when we are eating.
  - id: module-3-0097
    indonesian: agen perjalanan
    english: travel agent
    audio: 1761519839f9.ogg
    note:
      en: "'Agen perjalanan' is the formal/standard term for travel agent; informally
        people may just say 'travel' or 'agen travel'."
    sentences:
      - id: module-3-0097-s1
        text: Saya pergi ke agen perjalanan hari ini.
        blank: agen perjalanan
        en: I am going to the travel agent today.
      - id: module-3-0097-s2
        text: Agen perjalanan itu menjual tiket pesawat murah.
        blank: agen perjalanan
        en: That travel agent sells cheap plane tickets.
      - id: module-3-0097-s3
        text: Ibu membeli paket wisata di agen perjalanan.
        blank: agen perjalanan
        en: Mom bought a tour package at the travel agent.
  - id: module-3-0098
    indonesian: jadwal
    english: a schedule
    audio: a6c010c6b9f6.ogg
    note:
      en: "'Jadwal' means schedule or timetable; commonly used for class schedules,
        bus times, and work shifts; related words: 'jadwal pelajaran' (school
        timetable), 'terjadwal' (scheduled)."
    sentences:
      - id: module-3-0098-s1
        text: Jadwal kelas saya mulai jam delapan.
        blank: Jadwal
        en: My class schedule starts at eight o'clock.
      - id: module-3-0098-s2
        text: Apa jadwal bus ke Denpasar?
        blank: jadwal
        en: What is the bus schedule to Denpasar?
      - id: module-3-0098-s3
        text: Saya lupa membawa jadwal hari ini.
        blank: jadwal
        en: I forgot to bring my schedule today.
  - id: module-3-0099
    indonesian: menurut
    english: according to
    audio: 7a8f25341871.ogg
    note:
      en: "\"Menurut\" means \"according to\" and is used before a source or person's
        opinion; beginners often confuse it with \"menurut saya\" (in my
        opinion)."
    sentences:
      - id: module-3-0099-s1
        text: Menurut ibu, warung ini enak sekali.
        blank: Menurut
        en: According to mom, this food stall is very delicious.
      - id: module-3-0099-s2
        text: Menurut peta, pantai itu dekat sini.
        blank: Menurut
        en: According to the map, that beach is near here.
      - id: module-3-0099-s3
        text: Menurut saya, harga ini terlalu mahal.
        blank: Menurut
        en: In my opinion, this price is too expensive.
  - id: module-3-0100
    indonesian: penerbangan
    english: a flight
    audio: 64d5e9d06360.ogg
    note:
      en: "'Penerbangan' means a flight or aviation; commonly used at airports;
        related words: 'terbang' (to fly), 'pesawat' (airplane)."
    sentences:
      - id: module-3-0100-s1
        text: Penerbangan saya ke Bali besok pagi.
        blank: Penerbangan
        en: My flight to Bali is tomorrow morning.
      - id: module-3-0100-s2
        text: Berapa lama penerbangan dari Jakarta ke Bali?
        blank: penerbangan
        en: How long is the flight from Jakarta to Bali?
      - id: module-3-0100-s3
        text: Penerbangan itu terlambat dua jam.
        blank: Penerbangan
        en: That flight was two hours late.
  - id: module-3-0101
    indonesian: tiket
    english: a ticket
    audio: ea962803d983.ogg
    note:
      en: "'Tiket' is a loanword from Dutch/English, used for tickets of all kinds
        (transport, events); very common in everyday speech."
    sentences:
      - id: module-3-0101-s1
        text: Saya beli tiket bus ke Denpasar.
        blank: tiket
        en: I buy a bus ticket to Denpasar.
      - id: module-3-0101-s2
        text: Berapa harga tiket masuk ke pantai?
        blank: tiket
        en: How much is the entrance ticket to the beach?
      - id: module-3-0101-s3
        text: Dia sudah pesan tiket kereta api.
        blank: tiket
        en: She has already booked a train ticket.
  - id: module-3-0102
    indonesian: kepada
    english: to (when you are talking about something that is directed towards an
      individual or a group of people, not a place)
    audio: 16616087a268.ogg
    note:
      en: '"kepada" means "to" when directing something at a person or group (not a
        place); often confused with "ke" which is used for places/directions.'
    sentences:
      - id: module-3-0102-s1
        text: Dia memberi hadiah kepada ibunya.
        blank: kepada
        en: She gives a gift to her mother.
      - id: module-3-0102-s2
        text: Saya berterima kasih kepada guru saya.
        blank: kepada
        en: I am thankful to my teacher.
      - id: module-3-0102-s3
        text: Ibu berbicara kepada anak-anak.
        blank: kepada
        en: Mother speaks to the children.
  - id: module-3-0103
    indonesian: majalah
    english: magazine
    audio: 29a0eb3a2a0c.ogg
    note:
      en: "'Majalah' means magazine; commonly confused with 'koran' (newspaper);
        related word: 'buku' (book)."
    sentences:
      - id: module-3-0103-s1
        text: Saya membaca majalah di rumah.
        blank: majalah
        en: I read a magazine at home.
      - id: module-3-0103-s2
        text: Dia membeli majalah di toko.
        blank: majalah
        en: She buys a magazine at the shop.
      - id: module-3-0103-s3
        text: Majalah ini sangat menarik.
        blank: Majalah
        en: This magazine is very interesting.
  - id: module-3-0104
    indonesian: membaca (baca)
    english: to read
    audio: a82706b59501.ogg
    note:
      en: "'Membaca' is the formal/full form; 'baca' is the informal root, often used
        in casual speech and commands (e.g., 'Baca ini!'); related words:
        'bacaan' (reading material), 'pembaca' (reader)."
    sentences:
      - id: module-3-0104-s1
        text: Saya suka membaca buku setiap hari.
        blank: membaca
        en: I like to read books every day.
      - id: module-3-0104-s2
        text: Dia membaca koran di warung kopi.
        blank: membaca
        en: He/She reads the newspaper at the coffee shop.
  - id: module-3-0105
    indonesian: membersihkan (bersihkan)
    english: to clean something
    audio: 06c01ffeda4a.ogg
    note:
      en: "\"Membersihkan\" is the formal/full form; \"bersihkan\" is the imperative
        or informal shortening; both mean 'to clean something' (transitive),
        unlike \"bersih\" which is just the adjective 'clean'."
    sentences:
      - id: module-3-0105-s1
        text: Tolong bersihkan meja sebelum makan.
        blank: bersihkan
        en: Please clean the table before eating.
      - id: module-3-0105-s2
        text: Ibu membersihkan kamar setiap pagi.
        blank: membersihkan
        en: Mom cleans the room every morning.
      - id: module-3-0105-s3
        text: Ayo membersihkan pantai bersama-sama!
        blank: membersihkan
        en: Let's clean the beach together!
  - id: module-3-0106
    indonesian: mencuci (cuci)
    english: to wash
    audio: ba56a6ac470f.ogg
    note:
      en: "'Mencuci' is the formal verb form; 'cuci' is used in casual speech (e.g.,
        'cuci tangan' = wash hands); common phrases include 'cuci piring' (wash
        dishes) and 'cuci baju' (wash clothes)."
    sentences:
      - id: module-3-0106-s1
        text: Saya mencuci tangan sebelum makan.
        blank: mencuci
        en: I wash my hands before eating.
      - id: module-3-0106-s2
        text: Ibu cuci baju setiap pagi.
        blank: cuci
        en: Mom washes clothes every morning.
      - id: module-3-0106-s3
        text: Kami mencuci piring setelah makan malam.
        blank: mencuci
        en: We wash the dishes after dinner.
  - id: module-3-0107
    indonesian: mendengarkan (dengarkan)
    english: to listen to something
    audio: 5b082fa25d24.ogg
    note:
      en: "'Mendengarkan' is the formal/full form; 'dengarkan' is the imperative form
        used in commands; both mean to actively listen to something, unlike
        'mendengar' which means to simply hear."
    sentences:
      - id: module-3-0107-s1
        text: Saya suka mendengarkan musik di rumah.
        blank: mendengarkan
        en: I like to listen to music at home.
      - id: module-3-0107-s2
        text: Tolong dengarkan guru di kelas.
        blank: dengarkan
        en: Please listen to the teacher in class.
      - id: module-3-0107-s3
        text: Dia mendengarkan radio setiap pagi.
        blank: mendengarkan
        en: She listens to the radio every morning.
  - id: module-3-0108
    indonesian: menonton (tonton)
    english: to watch something (especially TV, a sports match, a performance, a
      movie, a spectacle)
    audio: 42650302e20a.ogg
    note:
      en: '"Menonton" is the formal/base form; "nonton" is the casual spoken form
        commonly used in everyday conversation; often used for watching TV,
        films, or live events, not for watching over a person (use "melihat" or
        "memperhatikan" for that).'
    sentences:
      - id: module-3-0108-s1
        text: Saya ingin menonton film di bioskop.
        blank: menonton
        en: I want to watch a movie at the cinema.
      - id: module-3-0108-s2
        text: Kami menonton pertandingan bola bersama.
        blank: menonton
        en: We watch the football match together.
      - id: module-3-0108-s3
        text: Dia suka menonton TV setiap malam.
        blank: menonton
        en: She likes to watch TV every night.
  - id: module-3-0109
    indonesian: menulis (tulis)
    english: to write
    audio: da579656cf58.ogg
    note:
      en: '"Menulis" is the active verb form (me- prefix on root "tulis"); used in
        formal and everyday contexts for writing by hand or typing.'
    sentences:
      - id: module-3-0109-s1
        text: Saya menulis surat untuk ibu saya.
        blank: menulis
        en: I am writing a letter for my mother.
      - id: module-3-0109-s2
        text: Dia menulis nama di buku.
        blank: menulis
        en: She writes her name in the book.
      - id: module-3-0109-s3
        text: Anak itu belajar menulis di sekolah.
        blank: menulis
        en: That child is learning to write at school.
  - id: module-3-0110
    indonesian: menyapu (sapu)
    english: to sweep
    audio: d6bf6006e08d.ogg
    note:
      en: '"Menyapu" is the active verb form (me- prefix + sapu); the base word "sapu"
        also means broom, so context clarifies meaning.'
    sentences:
      - id: module-3-0110-s1
        text: Ibu menyapu lantai setiap pagi.
        blank: menyapu
        en: Mom sweeps the floor every morning.
      - id: module-3-0110-s2
        text: Saya menyapu halaman rumah sekarang.
        blank: menyapu
        en: I am sweeping the yard now.
      - id: module-3-0110-s3
        text: Adik menyapu dapur dengan bersih.
        blank: menyapu
        en: My younger sibling sweeps the kitchen cleanly.
  - id: module-3-0111
    indonesian: novel
    english: novel
    audio: 7fdc31d8e4b1.ogg
    note:
      en: "'Novel' is used the same as in English; it refers to a fiction book,
        commonly confused with 'buku' (book) in general."
    sentences:
      - id: module-3-0111-s1
        text: Saya membaca novel di kamar.
        blank: novel
        en: I am reading a novel in the room.
      - id: module-3-0111-s2
        text: Novel ini sangat menarik dan seru.
        blank: novel
        en: This novel is very interesting and exciting.
      - id: module-3-0111-s3
        text: Dia membeli novel baru kemarin.
        blank: novel
        en: She bought a new novel yesterday.
  - id: module-3-0112
    indonesian: piring
    english: plate, the dishes
    audio: a5daf10bea1b.ogg
    note:
      en: "'Piring' means plate or dish; 'cuci piring' means to wash the dishes; do
        not confuse with 'mangkuk' (bowl)."
    sentences:
      - id: module-3-0112-s1
        text: Tolong ambilkan piring untuk makan malam.
        blank: piring
        en: Please get a plate for dinner.
      - id: module-3-0112-s2
        text: Saya mencuci piring setelah makan.
        blank: piring
        en: I wash the dishes after eating.
      - id: module-3-0112-s3
        text: Di meja ada dua piring bersih.
        blank: piring
        en: On the table there are two clean plates.
  - id: module-3-0113
    indonesian: sapu
    english: a broom (to sweep floor)
    audio: c3f10ee31f2a.ogg
    note:
      en: "'Sapu' means broom as a noun; 'menyapu' is the verb form meaning to sweep —
        avoid confusing the two."
    sentences:
      - id: module-3-0113-s1
        text: Ibu menggunakan sapu untuk membersihkan lantai.
        blank: sapu
        en: Mom uses a broom to clean the floor.
      - id: module-3-0113-s2
        text: Di mana sapu itu?
        blank: sapu
        en: Where is the broom?
      - id: module-3-0113-s3
        text: Anak itu memegang sapu besar.
        blank: sapu
        en: That child is holding a big broom.
  - id: module-3-0114
    indonesian: sedang apa?
    english: what are (you) doing?, what is (he/she) doing?
    audio: e538f9b40b86.ogg
    note:
      en: '"Sedang apa?" is casual spoken Indonesian for asking what someone is
        currently doing; "sedang" marks ongoing action like English "-ing";
        often shortened to "lagi apa?" in informal speech.'
    sentences:
      - id: module-3-0114-s1
        text: Kamu sedang apa di rumah?
        blank: sedang apa
        en: What are you doing at home?
      - id: module-3-0114-s2
        text: Ibu sedang apa sekarang?
        blank: sedang apa
        en: What is Mom doing now?
      - id: module-3-0114-s3
        text: Dia sedang apa di pasar?
        blank: sedang apa
        en: What is he/she doing at the market?
  - id: module-3-0115
    indonesian: surat kabar
    english: newspaper
    audio: 7ae1e1e3960e.ogg
    note:
      en: "'Surat kabar' is the formal/written word for newspaper; the informal word
        'koran' is more common in everyday speech."
    sentences:
      - id: module-3-0115-s1
        text: Ayah membaca surat kabar setiap pagi.
        blank: surat kabar
        en: Father reads the newspaper every morning.
      - id: module-3-0115-s2
        text: Saya membeli surat kabar di warung.
        blank: surat kabar
        en: I buy a newspaper at the small shop.
      - id: module-3-0115-s3
        text: Ada berita bagus di surat kabar.
        blank: surat kabar
        en: There is good news in the newspaper.
  - id: module-3-0116
    indonesian: surat
    english: a letter (i.e. an item of correspondence)
    audio: 6387aba652be.ogg
    note:
      en: "'Surat' means a physical or written letter/document; also used in 'surat
        kabar' (newspaper) and 'surat izin' (permit); do not confuse with
        'huruf' (a letter of the alphabet)."
    sentences:
      - id: module-3-0116-s1
        text: Saya menulis surat untuk ibu saya.
        blank: surat
        en: I am writing a letter to my mother.
      - id: module-3-0116-s2
        text: Ada surat di atas meja.
        blank: surat
        en: There is a letter on the table.
      - id: module-3-0116-s3
        text: Dia mengirim surat ke temannya.
        blank: surat
        en: He sends a letter to his friend.
  - id: module-3-0117
    indonesian: bangun
    english: to get up (out of bed)
    audio: 4fcd0710748d.ogg
    note:
      en: "'Bangun' means 'to wake up / get out of bed'; don't confuse with 'bangun'
        meaning 'to build' — context makes it clear; often used with 'tidur'
        (sleep)."
    sentences:
      - id: module-3-0117-s1
        text: Saya bangun pukul enam setiap pagi.
        blank: bangun
        en: I get up at six every morning.
      - id: module-3-0117-s2
        text: Dia tidak mau bangun dari tempat tidur.
        blank: bangun
        en: He doesn't want to get up from the bed.
      - id: module-3-0117-s3
        text: Ayo bangun, sudah siang!
        blank: bangun
        en: Come on, get up — it's already late morning!
  - id: module-3-0118
    indonesian: berita
    english: news
    audio: 2b6481870dc1.ogg
    note:
      en: "'Berita' means 'news' (neutral/formal register); commonly heard in 'berita
        hari ini' (today's news); related: 'kabar' (informal news/update)."
    sentences:
      - id: module-3-0118-s1
        text: Saya menonton berita di televisi setiap malam.
        blank: berita
        en: I watch the news on television every night.
      - id: module-3-0118-s2
        text: Berita itu sangat mengejutkan saya.
        blank: Berita
        en: That news really surprised me.
      - id: module-3-0118-s3
        text: Dia membaca berita pagi ini.
        blank: berita
        en: She reads the news this morning.
  - id: module-3-0119
    indonesian: berpakaian
    english: to get dressed, to be dressed
    audio: f20ec5c3b307.ogg
    note:
      en: "'Berpakaian' means to dress or be dressed; related to 'pakaian' (clothing);
        used in both active and descriptive contexts."
    sentences:
      - id: module-3-0119-s1
        text: Anak itu berpakaian rapi untuk ke sekolah.
        blank: berpakaian
        en: The child is dressed neatly to go to school.
      - id: module-3-0119-s2
        text: Dia berpakaian merah hari ini.
        blank: berpakaian
        en: She is dressed in red today.
      - id: module-3-0119-s3
        text: Saya harus berpakaian bersih setiap hari.
        blank: berpakaian
        en: I must dress cleanly every day.
  - id: module-3-0120
    indonesian: bersiap-siap
    english: to get ready, to make preparations, to prepare (for something)
    audio: b566f5f792e2.ogg
    note:
      en: "Informal/neutral register; 'bersiap-siap' implies repeated or ongoing
        preparation, similar to 'bersiap' but more emphatic; related: 'siap'
        (ready), 'mempersiapkan' (to prepare something)."
    sentences:
      - id: module-3-0120-s1
        text: Kami bersiap-siap sebelum pergi ke pantai.
        blank: bersiap-siap
        en: We are getting ready before going to the beach.
      - id: module-3-0120-s2
        text: Dia bersiap-siap untuk pergi ke sekolah.
        blank: bersiap-siap
        en: She is getting ready to go to school.
      - id: module-3-0120-s3
        text: Ayo bersiap-siap, bus sudah datang!
        blank: bersiap-siap
        en: Let's get ready, the bus is already here!
  - id: module-3-0121
    indonesian: bersisir
    english: to comb your hair
    audio: 4f641f02ebee.ogg
    note:
      en: "'Bersisir' means to comb one's own hair (reflexive); related word: 'sisir'
        (noun: comb)."
    sentences:
      - id: module-3-0121-s1
        text: Saya bersisir sebelum pergi ke sekolah.
        blank: bersisir
        en: I comb my hair before going to school.
      - id: module-3-0121-s2
        text: Adik bersisir di depan cermin.
        blank: bersisir
        en: My younger sibling combs their hair in front of the mirror.
      - id: module-3-0121-s3
        text: Ibu bersisir setiap pagi hari.
        blank: bersisir
        en: Mom combs her hair every morning.
  - id: module-3-0122
    indonesian: menggosok gigi
    english: to brush your teeth
    audio: 15b1d173d9eb.ogg
    note:
      en: '"Menggosok gigi" literally means "rubbing/scrubbing teeth"; commonly said
        morning and night routines; related: "sikat gigi" (toothbrush), "pasta
        gigi" (toothpaste).'
    sentences:
      - id: module-3-0122-s1
        text: Saya menggosok gigi setiap pagi.
        blank: menggosok gigi
        en: I brush my teeth every morning.
      - id: module-3-0122-s2
        text: Ibu menyuruh saya menggosok gigi sekarang.
        blank: menggosok gigi
        en: Mom tells me to brush my teeth now.
      - id: module-3-0122-s3
        text: Anak itu menggosok gigi sebelum tidur.
        blank: menggosok gigi
        en: That child brushes their teeth before sleeping.
  - id: module-3-0123
    indonesian: kemudian
    english: then (after that)
    audio: 02ed1da91614.ogg
    note:
      en: "'Kemudian' means 'then/after that' and is slightly more formal than 'lalu';
        both are common in everyday speech for sequencing events."
    sentences:
      - id: module-3-0123-s1
        text: Saya makan nasi, kemudian minum air.
        blank: kemudian
        en: I eat rice, then drink water.
      - id: module-3-0123-s2
        text: Dia pergi ke pasar, kemudian pulang.
        blank: kemudian
        en: She goes to the market, then goes home.
      - id: module-3-0123-s3
        text: Kami mandi, kemudian tidur siang.
        blank: kemudian
        en: We shower, then take a nap.
  - id: module-3-0124
    indonesian: membeli (beli)
    english: to buy something
    audio: 07de8839e512.ogg
    note:
      en: "'Membeli' is the formal/written form; 'beli' is the casual spoken form —
        both mean 'to buy'; often confused with 'menjual' (to sell)."
    sentences:
      - id: module-3-0124-s1
        text: Saya ingin membeli nasi goreng di warung.
        blank: membeli
        en: I want to buy nasi goreng at the food stall.
      - id: module-3-0124-s2
        text: Dia beli oleh-oleh untuk keluarganya.
        blank: beli
        en: She buys souvenirs for her family.
      - id: module-3-0124-s3
        text: Kami beli buah di pasar pagi ini.
        blank: beli
        en: We buy fruit at the market this morning.
  - id: module-3-0125
    indonesian: mengambil (ambil)
    english: to go and get something, to fetch something, to reach out and remove,
      to pick up something
    audio: e852696c0cb3.ogg
    note:
      en: '"Mengambil" is the formal/active form; "ambil" is the casual imperative or
        base form — both very common in everyday speech.'
    sentences:
      - id: module-3-0125-s1
        text: Tolong ambil air dari dapur.
        blank: ambil
        en: Please fetch some water from the kitchen.
      - id: module-3-0125-s2
        text: Dia mengambil buku di atas meja.
        blank: mengambil
        en: He picks up the book on the table.
      - id: module-3-0125-s3
        text: Saya mengambil tas saya di kamar.
        blank: mengambil
        en: I go and get my bag from the room.
  - id: module-3-0126
    indonesian: pemandangan (pandang)
    english: view, scene, panorama, (natural) scenery
    audio: 9e0072d8cea5.ogg
    note:
      en: '"Pemandangan" is the noun form from root "pandang" (to look/gaze); commonly
        used for natural scenery like mountains, rice fields, or ocean views;
        not used for indoor scenes or art.'
    sentences:
      - id: module-3-0126-s1
        text: Pemandangan di Bali sangat indah sekali.
        blank: Pemandangan
        en: The scenery in Bali is very beautiful.
      - id: module-3-0126-s2
        text: Saya suka pemandangan sawah dari sini.
        blank: pemandangan
        en: I like the view of the rice fields from here.
      - id: module-3-0126-s3
        text: Pemandangan laut itu sangat bagus.
        blank: Pemandangan
        en: That ocean view is very nice.
  - id: module-3-0127
    indonesian: sebelum
    english: before (a certain time/event)
    audio: 44ed30a4bda4.ogg
    note:
      en: "\"Sebelum\" means \"before\" in time or sequence; don't confuse with
        \"sesudah\" (after) or \"setelah\" (after/following)."
    sentences:
      - id: module-3-0127-s1
        text: Cuci tangan sebelum makan.
        blank: sebelum
        en: Wash your hands before eating.
      - id: module-3-0127-s2
        text: Dia mandi sebelum pergi ke sekolah.
        blank: sebelum
        en: She showers before going to school.
      - id: module-3-0127-s3
        text: Saya tidur sebelum jam sepuluh.
        blank: sebelum
        en: I sleep before ten o'clock.
  - id: module-3-0128
    indonesian: sendiri
    english: self, by oneself (without help from anyone), alone
    audio: 46df2e942779.ogg
    note:
      en: "'Sendiri' means alone, by oneself, or without help; often confused with
        'saja' (just/only); related: 'diri sendiri' (oneself)."
    sentences:
      - id: module-3-0128-s1
        text: Dia pergi ke pasar sendiri.
        blank: sendiri
        en: She goes to the market alone.
      - id: module-3-0128-s2
        text: Aku bisa makan sendiri, terima kasih.
        blank: sendiri
        en: I can eat by myself, thank you.
      - id: module-3-0128-s3
        text: Anak itu tidur sendiri di kamar.
        blank: sendiri
        en: That child sleeps alone in the room.
  - id: module-3-0129
    indonesian: alat
    english: device, tool, implement
    audio: 05aeb2769121.ogg
    note:
      en: "'Alat' is a neutral, everyday word for tools or devices; 'alat tulis' means
        stationery, 'alat musik' means musical instrument — it combines freely
        with other nouns."
    sentences:
      - id: module-3-0129-s1
        text: Saya butuh alat untuk memasak nasi.
        blank: alat
        en: I need a tool to cook rice.
      - id: module-3-0129-s2
        text: Alat musik ini sangat indah.
        blank: alat
        en: This musical instrument is very beautiful.
      - id: module-3-0129-s3
        text: Di mana alat tulis saya?
        blank: alat
        en: Where is my stationery?
  - id: module-3-0130
    indonesian: baju
    english: "a shirt, a dress, an upper-body garment, (also loosely: clothes)"
    audio: 8b02c1f8535c.ogg
    note:
      en: "'Baju' broadly means any upper-body garment or clothing; closely related to
        'pakaian' (clothing in general) and 'kemeja' (a formal shirt
        specifically)."
    sentences:
      - id: module-3-0130-s1
        text: Saya memakai baju merah hari ini.
        blank: baju
        en: I am wearing a red shirt today.
      - id: module-3-0130-s2
        text: Baju adik saya ada di sana.
        blank: baju
        en: My younger sibling's clothes are over there.
      - id: module-3-0130-s3
        text: Ibu membeli baju baru di pasar.
        blank: baju
        en: Mom bought a new dress at the market.
  - id: module-3-0131
    indonesian: elektronik
    english: electronic
    audio: ce2fa2fb8311.ogg
    note:
      en: "'Elektronik' is a neutral everyday word used as an adjective or noun;
        commonly seen in store signs like 'toko elektronik' (electronics store);
        related: 'listrik' (electricity/electric)."
    sentences:
      - id: module-3-0131-s1
        text: Toko elektronik itu menjual televisi baru.
        blank: elektronik
        en: That electronics store sells new televisions.
      - id: module-3-0131-s2
        text: Ayah membeli peralatan elektronik di pasar.
        blank: elektronik
        en: Dad bought electronic equipment at the market.
      - id: module-3-0131-s3
        text: Barang elektronik ini mahal sekali.
        blank: elektronik
        en: This electronic item is very expensive.
  - id: module-3-0132
    indonesian: habis (informal for 'sesudah')
    english: after (informal)
    audio: 0fab9801eea0.ogg
    note:
      en: "'Habis' literally means 'finished/run out', but informally it means
        'after'; don't confuse with 'sesudah' (formal) or 'setelah' (also
        formal)."
    sentences:
      - id: module-3-0132-s1
        text: Habis makan, aku minum kopi.
        blank: Habis
        en: After eating, I drink coffee.
      - id: module-3-0132-s2
        text: Habis sekolah, dia pulang ke rumah.
        blank: Habis
        en: After school, he goes home.
      - id: module-3-0132-s3
        text: Aku tidur habis nonton film.
        blank: habis
        en: I sleep after watching a movie.
  - id: module-3-0133
    indonesian: ingin
    english: to wish (to...), to want (to...)
    audio: e7ab32b09817.ogg
    note:
      en: "'Ingin' is a polite/neutral way to say 'want to' or 'wish to'; more formal
        than 'mau' but both are very common in everyday speech."
    sentences:
      - id: module-3-0133-s1
        text: Saya ingin makan nasi goreng hari ini.
        blank: ingin
        en: I want to eat fried rice today.
      - id: module-3-0133-s2
        text: Dia ingin pergi ke pantai besok.
        blank: ingin
        en: She wants to go to the beach tomorrow.
      - id: module-3-0133-s3
        text: Kami ingin belajar bahasa Indonesia bersama.
        blank: ingin
        en: We want to learn Indonesian together.
  - id: module-3-0134
    indonesian: jadi (verb)
    english: to happen, occur, transpire, take place
    audio: 1e5f4f794809.ogg
    note:
      en: "\"Jadi\" as a verb means something happened or took place; don't confuse
        with \"jadi\" meaning \"so/therefore\" or \"become\" — context
        determines meaning."
    sentences:
      - id: module-3-0134-s1
        text: Pesta itu tidak jadi karena hujan deras.
        blank: jadi
        en: The party did not take place because of heavy rain.
      - id: module-3-0134-s2
        text: Apakah pertemuan besok jadi?
        blank: jadi
        en: Will tomorrow's meeting take place?
      - id: module-3-0134-s3
        text: Acara di pantai jadi kemarin malam.
        blank: jadi
        en: The event at the beach took place last night.
  - id: module-3-0135
    indonesian: kita
    english: we (including the person or persons you are talking to)
    audio: 35ff4952b485.ogg
    note:
      en: '"kita" means "we/us" including the listener; contrast with "kami" which
        excludes the listener.'
    sentences:
      - id: module-3-0135-s1
        text: Kita pergi ke pantai bersama-sama.
        blank: Kita
        en: We are going to the beach together.
      - id: module-3-0135-s2
        text: Hari ini kita makan nasi goreng.
        blank: kita
        en: Today we eat fried rice.
      - id: module-3-0135-s3
        text: Kita belajar bahasa Indonesia setiap hari.
        blank: Kita
        en: We study Indonesian every day.
  - id: module-3-0136
    indonesian: kami
    english: we (excluding the person or persons you are talking to)
    audio: 0025054c85e8.ogg
    note:
      en: '"Kami" means "we/us" but excludes the listener; contrast with "kita" which
        includes everyone present.'
    sentences:
      - id: module-3-0136-s1
        text: Kami tinggal di Bali.
        blank: Kami
        en: We live in Bali.
      - id: module-3-0136-s2
        text: Kami makan nasi goreng tadi malam.
        blank: Kami
        en: We ate fried rice last night.
      - id: module-3-0136-s3
        text: Kami pergi ke pantai besok.
        blank: Kami
        en: We are going to the beach tomorrow.
  - id: module-3-0137
    indonesian: keren
    english: stylish, trendy
    audio: ee816ad29660.ogg
    note:
      en: "'Keren' is casual/colloquial for cool, stylish, or awesome; avoid in formal
        writing; related: 'bagus' (good), 'hebat' (great)."
    sentences:
      - id: module-3-0137-s1
        text: Baju kamu sangat keren hari ini.
        blank: keren
        en: Your clothes are very stylish today.
      - id: module-3-0137-s2
        text: Motor baru dia keren sekali.
        blank: keren
        en: His new motorcycle is very cool.
      - id: module-3-0137-s3
        text: Rambut kamu keren, seperti artis.
        blank: keren
        en: Your hair is stylish, like a celebrity.
  - id: module-3-0138
    indonesian: mencoba (coba)
    english: to try to do something, to try something out, to try on (clothes)
    audio: 889d1c7d5e99.ogg
    note:
      en: "\"Mencoba\" is the formal verb form; \"coba\" is the casual/imperative form
        often used in speech; don't confuse with \"mencicipi\" (to taste food
        specifically)."
    sentences:
      - id: module-3-0138-s1
        text: Saya ingin mencoba baju baru itu.
        blank: mencoba
        en: I want to try on that new shirt.
      - id: module-3-0138-s2
        text: Dia mencoba makanan khas Bali.
        blank: mencoba
        en: She is trying the typical Balinese food.
      - id: module-3-0138-s3
        text: Coba sepatu ini dulu, ya!
        blank: Coba
        en: Try on these shoes first, okay!
  - id: module-3-0139
    indonesian: minggu
    english: week
    audio: 48a77b2f107b.ogg
    note:
      en: "'Minggu' means 'week' but also 'Sunday'; use context to tell them apart —
        e.g. 'hari Minggu' means Sunday, 'satu minggu' means one week."
    sentences:
      - id: module-3-0139-s1
        text: Saya belajar bahasa Indonesia dua minggu.
        blank: minggu
        en: I have been studying Indonesian for two weeks.
      - id: module-3-0139-s2
        text: Kami pergi ke Bali minggu depan.
        blank: minggu
        en: We are going to Bali next week.
      - id: module-3-0139-s3
        text: Dia bekerja lima hari setiap minggu.
        blank: minggu
        en: He works five days every week.
  - id: module-3-0140
    indonesian: nonton (tonton)
    english: (informal) to go to the movies, to watch something (especially TV, a
      sports match, a parade etc.)
    audio: 69026f7350d4.ogg
    note:
      en: '"Nonton" is the informal spoken form of "menonton"; use it for watching TV,
        films, or live events — not for reading or listening.'
    sentences:
      - id: module-3-0140-s1
        text: Aku mau nonton film di bioskop.
        blank: nonton
        en: I want to watch a movie at the cinema.
      - id: module-3-0140-s2
        text: Mereka nonton sepak bola bersama.
        blank: nonton
        en: They watch football together.
      - id: module-3-0140-s3
        text: Kamu mau nonton TV malam ini?
        blank: nonton
        en: Do you want to watch TV tonight?
  - id: module-3-0141
    indonesian: sampai di + name of places
    english: to arrive in/at (a place), to reach (a destination)
    audio: 141b28c7ce23.ogg
    note:
      en: '"Sampai di" means to arrive at a specific place; use "di" before place
        names, not "ke" (which shows direction/movement toward).'
    sentences:
      - id: module-3-0141-s1
        text: Kami sampai di Bali tadi pagi.
        blank: sampai di
        en: We arrived in Bali this morning.
      - id: module-3-0141-s2
        text: Bus sampai di terminal jam tiga.
        blank: sampai di
        en: The bus arrived at the terminal at three o'clock.
      - id: module-3-0141-s3
        text: Dia sampai di rumah sakit kemarin.
        blank: sampai di
        en: She arrived at the hospital yesterday.
  - id: module-3-0142
    indonesian: yang lalu
    english: ...ago, last...
    audio: 19fe5bade89e.ogg
    note:
      en: "\"Yang lalu\" follows a time word (e.g. minggu, bulan, tahun) to mean
        'last' or 'ago'; do not confuse with \"yang lain\" (the other)."
    sentences:
      - id: module-3-0142-s1
        text: Saya pergi ke Bali minggu yang lalu.
        blank: yang lalu
        en: I went to Bali last week.
      - id: module-3-0142-s2
        text: Dia lahir tahun yang lalu.
        blank: yang lalu
        en: She was born last year.
      - id: module-3-0142-s3
        text: Kami makan nasi goreng kemarin yang lalu.
        blank: yang lalu
        en: We ate fried rice the day before yesterday.
  - id: module-3-0143
    indonesian: bahasa Belanda
    english: Dutch
    audio: 9825acea3387.ogg
    note:
      en: '"Bahasa Belanda" means the Dutch language; "Belanda" alone refers to the
        Netherlands or Dutch people, similar to how "bahasa Inggris" means
        English.'
    sentences:
      - id: module-3-0143-s1
        text: Dia belajar bahasa Belanda di sekolah.
        blank: bahasa Belanda
        en: She studies Dutch at school.
      - id: module-3-0143-s2
        text: Apakah kamu bisa berbicara bahasa Belanda?
        blank: bahasa Belanda
        en: Can you speak Dutch?
      - id: module-3-0143-s3
        text: Bahasa Belanda sulit untuk dipelajari.
        blank: bahasa Belanda
        en: Dutch is difficult to learn.
  - id: module-3-0144
    indonesian: berkuasa
    english: to be in power, to be the dominant force
    audio: c6e92b53c329.ogg
    note:
      en: "'Berkuasa' means to hold power or be dominant; often used for leaders or
        rulers; related to 'kuasa' (power) and 'penguasa' (ruler/authority)."
    sentences:
      - id: module-3-0144-s1
        text: Raja itu berkuasa di seluruh kerajaan.
        blank: berkuasa
        en: That king is in power over the entire kingdom.
      - id: module-3-0144-s2
        text: Siapa yang berkuasa di desa ini?
        blank: berkuasa
        en: Who is in power in this village?
      - id: module-3-0144-s3
        text: Presiden berkuasa selama lima tahun.
        blank: berkuasa
        en: The president is in power for five years.
  - id: module-3-0145
    indonesian: bikin
    english: (informal) to make (something)
    audio: 4f86db9c2d12.ogg
    note:
      en: "'Bikin' is an informal/colloquial synonym of 'membuat' (to make/create);
        very common in casual speech but avoid in formal writing."
    sentences:
      - id: module-3-0145-s1
        text: Dia bikin kue untuk ulang tahun.
        blank: bikin
        en: She makes a cake for the birthday.
      - id: module-3-0145-s2
        text: Aku mau bikin nasi goreng sekarang.
        blank: bikin
        en: I want to make fried rice now.
      - id: module-3-0145-s3
        text: Tolong bikin kopi untuk tamu ya.
        blank: bikin
        en: Please make coffee for the guest.
  - id: module-3-0146
    indonesian: membuat (buat)
    english: to make (something)
    audio: 86ca6dbe9b68.ogg
    note:
      en: '"Membuat" is the formal/written form; "buat" is the casual spoken
        shortform. Often confused with "memasak" (to cook), but "membuat" is
        broader—used for making any object or thing.'
    sentences:
      - id: module-3-0146-s1
        text: Saya membuat kue untuk keluarga saya.
        blank: membuat
        en: I am making a cake for my family.
      - id: module-3-0146-s2
        text: Dia buat minuman dingin di dapur.
        blank: buat
        en: She is making a cold drink in the kitchen.
      - id: module-3-0146-s3
        text: Kami membuat kerajinan tangan di sekolah.
        blank: membuat
        en: We are making handicrafts at school.
  - id: module-3-0147
    indonesian: duduk-duduk
    english: to sit around (in a casual or leisurely way)
    audio: 6421652f9a4d.ogg
    note:
      en: Informal/casual reduplication of 'duduk'; implies relaxing or lounging, not
        purposeful sitting; similar to 'santai-santai' (hanging out lazily).
    sentences:
      - id: module-3-0147-s1
        text: Mereka duduk-duduk di pantai sore ini.
        blank: duduk-duduk
        en: They are sitting around at the beach this afternoon.
      - id: module-3-0147-s2
        text: Aku suka duduk-duduk di teras rumah.
        blank: duduk-duduk
        en: I like to sit around on the house porch.
      - id: module-3-0147-s3
        text: Kami duduk-duduk sambil minum kopi.
        blank: duduk-duduk
        en: We are sitting around while drinking coffee.
  - id: module-3-0148
    indonesian: dulu (2)
    english: in former times, a long time ago, used to (i.e. regularly happened in
