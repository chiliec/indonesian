        en: We practice cooking fried rice together.
  - id: module-8-0239
    indonesian: seharusnya
    english: should, ought to
    audio: 69c301c4b922.ogg
    note:
      en: "'Seharusnya' expresses moral obligation or what is expected; slightly
        stronger than 'harus' (must) and often implies something is not being
        done correctly."
    sentences:
      - id: module-8-0239-s1
        text: Kamu seharusnya minum air putih setiap hari.
        blank: seharusnya
        en: You should drink plain water every day.
      - id: module-8-0239-s2
        text: Dia seharusnya tidur lebih awal malam ini.
        blank: seharusnya
        en: He should sleep earlier tonight.
      - id: module-8-0239-s3
        text: Kita seharusnya sampai di sini lebih pagi.
        blank: seharusnya
        en: We should have arrived here earlier.
  - id: module-8-0240
    indonesian: sempurna
    english: perfect, impeccable, flawless
    audio: f72808031a16.ogg
    note:
      en: "'Sempurna' is a common everyday adjective meaning perfect or flawless;
        often used in compliments and descriptions, and is also a well-known
        Indonesian song title."
    sentences:
      - id: module-8-0240-s1
        text: Masakan ibu sangat sempurna dan enak.
        blank: sempurna
        en: Mom's cooking is very perfect and delicious.
      - id: module-8-0240-s2
        text: Pantai ini sempurna untuk berenang.
        blank: sempurna
        en: This beach is perfect for swimming.
      - id: module-8-0240-s3
        text: Pekerjaanmu sempurna, terima kasih banyak!
        blank: sempurna
        en: Your work is flawless, thank you very much!
  - id: module-8-0241
    indonesian: seseorang
    english: a certain person, someone
    audio: d3db24fb8a97.ogg
    note:
      en: "'Seseorang' means 'someone/a certain person'; more formal than 'orang'
        alone; often used when the person is unknown or unnamed."
    sentences:
      - id: module-8-0241-s1
        text: Seseorang mengetuk pintu rumah kami tadi.
        blank: Seseorang
        en: Someone knocked on our door just now.
      - id: module-8-0241-s2
        text: Ada seseorang menunggu kamu di luar.
        blank: seseorang
        en: There is someone waiting for you outside.
      - id: module-8-0241-s3
        text: Seseorang meninggalkan tas ini di sini.
        blank: Seseorang
        en: Someone left this bag here.
  - id: module-8-0242
    indonesian: silikon
    english: silicone
    audio: 93e0e54ffaf5.ogg
    note:
      en: "'Silikon' is a loanword for the material silicone (used in kitchen tools,
        phone cases, etc.); do not confuse with 'silikon' vs 'silikon dioksida'
        (silicon dioxide); very common in everyday shopping contexts."
    sentences:
      - id: module-8-0242-s1
        text: Casing ponsel ini terbuat dari silikon.
        blank: silikon
        en: This phone case is made of silicone.
      - id: module-8-0242-s2
        text: Sendok silikon aman untuk memasak.
        blank: silikon
        en: A silicone spoon is safe for cooking.
      - id: module-8-0242-s3
        text: Saya beli gelang silikon di pasar.
        blank: silikon
        en: I bought a silicone bracelet at the market.
