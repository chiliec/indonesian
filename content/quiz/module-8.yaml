id: module-8
title:
  en: Module 8
cards:
  - id: module-8-0001
    indonesian: mengalami (alami)
    english: to experience something
    audio: 2b0118d99750.ogg
    note:
      en: "'Mengalami' means to go through or experience something, often challenges
        or events; root word 'alami' also means 'natural', so context matters."
    sentences:
      - id: module-8-0001-s1
        text: Saya mengalami macet di jalan tadi.
        blank: mengalami
        en: I experienced traffic on the road earlier.
      - id: module-8-0001-s2
        text: Dia mengalami sakit kepala kemarin.
        blank: mengalami
        en: She experienced a headache yesterday.
      - id: module-8-0001-s3
        text: Kami mengalami hujan deras di pantai.
        blank: mengalami
        en: We experienced heavy rain at the beach.
  - id: module-8-0002
    indonesian: anggota
    english: a member, parts of something
    audio: 5cbfae7c9d3e.ogg
    note:
      en: "'Anggota' means member (of a group) or body part; commonly used in phrases
        like 'anggota keluarga' (family member) and 'anggota tubuh' (body
        part)."
    sentences:
      - id: module-8-0002-s1
        text: Dia adalah anggota klub sepak bola.
        blank: anggota
        en: He is a member of the soccer club.
      - id: module-8-0002-s2
        text: Berapa anggota dalam kelompok kamu?
        blank: anggota
        en: How many members are in your group?
      - id: module-8-0002-s3
        text: Tangan adalah anggota tubuh kita.
        blank: anggota
        en: Hands are parts of our body.
  - id: module-8-0003
    indonesian: badan
    english: a body
    audio: 58b234dc998c.ogg
    note:
      en: "'Badan' means body (physical), also used informally for
        'organization/agency'; don't confuse with 'tubuh' which is more
        formal/anatomical."
    sentences:
      - id: module-8-0003-s1
        text: Badan saya sakit setelah olahraga tadi.
        blank: Badan
        en: My body hurts after exercising earlier.
      - id: module-8-0003-s2
        text: Dia menjaga badan dengan makan sehat.
        blank: badan
        en: She takes care of her body by eating healthy.
      - id: module-8-0003-s3
        text: Badan anak itu sangat kuat.
        blank: Badan
        en: That child's body is very strong.
  - id: module-8-0004
    indonesian: bahu
    english: shoulders
    audio: 17c178c536e5.ogg
    note:
      en: "'Bahu' means shoulders; often confused with 'pundak' (a more
        informal/Javanese-influenced synonym); used in everyday body-part and
        clothing contexts."
    sentences:
      - id: module-8-0004-s1
        text: Tas itu berat di bahu saya.
        blank: bahu
        en: That bag is heavy on my shoulders.
      - id: module-8-0004-s2
        text: Dia meletakkan tangan di bahu saya.
        blank: bahu
        en: He/She put a hand on my shoulder.
      - id: module-8-0004-s3
        text: Bahu saya sakit setelah berenang.
        blank: bahu
        en: My shoulders hurt after swimming.
  - id: module-8-0005
    indonesian: buah dada
    english: female breasts
    audio: 661e0f810607.ogg
    note:
      en: "'Buah dada' is the formal/medical term for female breasts; the informal
        term 'payudara' is also widely used in health contexts; avoid slang
        equivalents in formal settings."
    sentences:
      - id: module-8-0005-s1
        text: Dokter memeriksa buah dada pasien dengan hati-hati.
        blank: buah dada
        en: The doctor carefully examined the patient's breasts.
      - id: module-8-0005-s2
        text: Ibu menyusui bayi dengan buah dada.
        blank: buah dada
        en: The mother breastfeeds her baby.
      - id: module-8-0005-s3
        text: Kesehatan buah dada sangat penting bagi wanita.
        blank: buah dada
        en: Breast health is very important for women.
  - id: module-8-0006
    indonesian: bulu
    english: body hair
    audio: a81ed27cf345.ogg
    note:
      en: "'bulu' means body/animal hair or feathers; don't confuse with 'rambut'
        (head hair); also used in 'bulu mata' (eyelashes) and 'bulu ayam'
        (chicken feathers)."
    sentences:
      - id: module-8-0006-s1
        text: Kucing itu memiliki bulu yang lembut.
        blank: bulu
        en: That cat has soft fur.
      - id: module-8-0006-s2
        text: Bulu di tanganku tumbuh panjang.
        blank: bulu
        en: The hair on my arm grew long.
      - id: module-8-0006-s3
        text: Anak ayam itu berbulu kuning.
        blank: berbulu
        en: That chick is covered in yellow feathers.
  - id: module-8-0007
    indonesian: dada
    english: chest
    audio: ccbd0ee1979b.ogg
    note:
      en: "'Dada' means chest (body part); not to be confused with 'dada' as an
        informal term for waving goodbye in some regions; related words:
        'jantung' (heart), 'paru-paru' (lungs)."
    sentences:
      - id: module-8-0007-s1
        text: Dada saya sakit setelah berlari jauh.
        blank: Dada
        en: My chest hurts after running far.
      - id: module-8-0007-s2
        text: Dia memegang dada karena terkejut.
        blank: dada
        en: He held his chest because he was surprised.
      - id: module-8-0007-s3
        text: Dokter memeriksa dada saya dengan seksama.
        blank: dada
        en: The doctor examined my chest carefully.
  - id: module-8-0008
    indonesian: dewasa
    english: adult
    audio: 279750f967b5.ogg
    note:
      en: "'Dewasa' means adult or grown-up; also used in 'dewasa ini' (nowadays);
        don't confuse with 'tua' (old/elderly)."
    sentences:
      - id: module-8-0008-s1
        text: Tiket ini hanya untuk penumpang dewasa.
        blank: dewasa
        en: This ticket is only for adult passengers.
      - id: module-8-0008-s2
        text: Anak itu sudah dewasa sekarang.
        blank: dewasa
        en: That child is already grown up now.
      - id: module-8-0008-s3
        text: Film ini khusus untuk orang dewasa.
        blank: dewasa
        en: This film is only for adults.
  - id: module-8-0009
    indonesian: dioperasi
    english: to undergo surgery
    audio: 64a9feb662a3.ogg
    note:
      en: "'Dioperasi' is passive voice meaning 'to be operated on / to undergo
        surgery'; related words: 'operasi' (surgery/operation), 'dokter'
        (doctor), 'rumah sakit' (hospital)."
    sentences:
      - id: module-8-0009-s1
        text: Kakak saya dioperasi di rumah sakit.
        blank: dioperasi
        en: My older sibling is undergoing surgery at the hospital.
      - id: module-8-0009-s2
        text: Dia dioperasi oleh dokter kemarin.
        blank: dioperasi
        en: He/She underwent surgery by the doctor yesterday.
      - id: module-8-0009-s3
        text: Kaki nenek harus dioperasi sekarang.
        blank: dioperasi
        en: Grandma's leg has to be operated on now.
  - id: module-8-0010
    indonesian: disikat
    english: to be brushed
    audio: 99768e9229c9.ogg
    note:
      en: "'Disikat' is the passive form of 'sikat' (brush); used for brushing teeth,
        floors, or clothes; beginners often confuse active 'menyikat' vs passive
        'disikat'."
    sentences:
      - id: module-8-0010-s1
        text: Gigi saya harus disikat setiap hari.
        blank: disikat
        en: My teeth must be brushed every day.
      - id: module-8-0010-s2
        text: Lantai itu disikat oleh ibu.
        blank: disikat
        en: The floor was brushed by mother.
      - id: module-8-0010-s3
        text: Sepatu kotor itu perlu disikat sekarang.
        blank: disikat
        en: Those dirty shoes need to be brushed now.
  - id: module-8-0011
    indonesian: hidung
    english: the nose
    audio: 434f967e1eb6.ogg
    note:
      en: "'Hidung' means 'nose'; commonly used in health and body vocabulary; related
        words: 'bersin' (to sneeze), 'flu' (cold/flu)."
    sentences:
      - id: module-8-0011-s1
        text: Hidung saya sakit karena flu.
        blank: Hidung
        en: My nose hurts because of a cold.
      - id: module-8-0011-s2
        text: Dia memegang hidung karena bau busuk.
        blank: hidung
        en: He is holding his nose because of a bad smell.
      - id: module-8-0011-s3
        text: Hidung anak itu kecil dan lucu.
        blank: Hidung
        en: That child's nose is small and cute.
  - id: module-8-0012
    indonesian: jantung
    english: the heart
    audio: f768466db076.ogg
    note:
      en: "'Jantung' means heart (the organ); for the emotional heart use 'hati';
        common in health contexts."
    sentences:
      - id: module-8-0012-s1
        text: Dokter memeriksa jantung saya hari ini.
        blank: jantung
        en: The doctor is checking my heart today.
      - id: module-8-0012-s2
        text: Jantung saya berdetak sangat cepat.
        blank: jantung
        en: My heart is beating very fast.
      - id: module-8-0012-s3
        text: Makan sayur bagus untuk jantung kita.
        blank: jantung
        en: Eating vegetables is good for our heart.
  - id: module-8-0013
    indonesian: jari
    english: finger(s), toe(s)
    audio: 6f95d585ced2.ogg
    note:
      en: '"Jari" means both fingers and toes; specify "jari tangan" (finger) or "jari
        kaki" (toe) to avoid confusion.'
    sentences:
      - id: module-8-0013-s1
        text: Saya punya sepuluh jari di tangan.
        blank: jari
        en: I have ten fingers on my hands.
      - id: module-8-0013-s2
        text: Jari kaki saya sakit hari ini.
        blank: jari
        en: My toes hurt today.
      - id: module-8-0013-s3
        text: Dia menunjuk dengan jari telunjuknya.
        blank: jari
        en: She points with her index finger.
  - id: module-8-0014
    indonesian: kemaluan
    english: genitals
    audio: b3b78444f5ef.ogg
    note:
      en: '"Kemaluan" is the polite/clinical Indonesian term for genitals; commonly
        used in medical or educational contexts — avoid slang alternatives in
        formal settings.'
    sentences:
      - id: module-8-0014-s1
        text: Dokter memeriksa kemaluan pasien dengan hati-hati.
        blank: kemaluan
        en: The doctor carefully examined the patient's genitals.
      - id: module-8-0014-s2
        text: Jaga kebersihan kemaluan setiap hari.
        blank: kemaluan
        en: Keep your genitals clean every day.
      - id: module-8-0014-s3
        text: Ibu mengajarkan anak tentang kemaluan mereka.
        blank: kemaluan
        en: The mother taught her child about their genitals.
  - id: module-8-0015
    indonesian: leher
    english: neck
    audio: bc6cd62c8465.ogg
    note:
      en: "'Leher' means neck; commonly used in health/body contexts; related words:
        tenggorokan (throat), bahu (shoulder)."
    sentences:
      - id: module-8-0015-s1
        text: Leher saya sakit hari ini.
        blank: Leher
        en: My neck hurts today.
      - id: module-8-0015-s2
        text: Dia memakai kalung di lehernya.
        blank: lehernya
        en: She is wearing a necklace on her neck.
      - id: module-8-0015-s3
        text: Leher jerapah sangat panjang.
        blank: Leher
        en: A giraffe's neck is very long.
  - id: module-8-0016
    indonesian: merokok (rokok)
    english: to smoke
    audio: 14ef4d9e696b.ogg
    note:
      en: "'Merokok' is the verb 'to smoke'; 'rokok' is the noun 'cigarette' — both
        are very common in everyday Indonesian conversation."
    sentences:
      - id: module-8-0016-s1
        text: Ayah saya suka merokok di luar rumah.
        blank: merokok
        en: My father likes to smoke outside the house.
      - id: module-8-0016-s2
        text: Dilarang merokok di sini.
        blank: merokok
        en: Smoking is not allowed here.
      - id: module-8-0016-s3
        text: Dia membeli rokok di warung.
        blank: rokok
        en: He buys cigarettes at the small shop.
  - id: module-8-0017
    indonesian: mulut
    english: the mouth
    audio: dc47eb5c6782.ogg
    note:
      en: "'Mulut' means mouth (body part); commonly used in health and eating
        contexts; related words: 'bibir' (lips), 'gigi' (teeth), 'lidah'
        (tongue)."
    sentences:
      - id: module-8-0017-s1
        text: Tutup mulut kamu saat makan.
        blank: mulut
        en: Close your mouth when eating.
      - id: module-8-0017-s2
        text: Dokter melihat ke dalam mulut saya.
        blank: mulut
        en: The doctor looked inside my mouth.
      - id: module-8-0017-s3
        text: Mulut saya sakit hari ini.
        blank: mulut
        en: My mouth hurts today.
  - id: module-8-0018
    indonesian: otak
    english: the brain
    audio: 2bc91e60ca3f.ogg
    note:
      en: "'Otak' means brain (the organ); also used informally to mean 'mind' or
        'intelligence', e.g. 'otak encer' (smart); not to be confused with
        'pikiran' (thoughts/mind)."
    sentences:
      - id: module-8-0018-s1
        text: Otak kita butuh istirahat yang cukup.
        blank: Otak
        en: Our brain needs enough rest.
      - id: module-8-0018-s2
        text: Belajar setiap hari bagus untuk otak.
        blank: otak
        en: Studying every day is good for the brain.
  - id: module-8-0019
    indonesian: pantat
    english: the buttocks
    audio: a97ea8c0c139.ogg
    note:
      en: "Neutral anatomical term for buttocks; commonly used in everyday speech,
        though context matters — avoid in formal settings; related: 'bokong'
        (more colloquial synonym)."
    sentences:
      - id: module-8-0019-s1
        text: Adik jatuh dan pantatnya sakit.
        blank: pantatnya
        en: The younger sibling fell and their buttocks hurt.
      - id: module-8-0019-s2
        text: Dia duduk di pantat kursi.
        blank: pantat
        en: They are sitting on the bottom of the chair.
  - id: module-8-0020
    indonesian: paru-paru
    english: the lungs
    audio: 2360b502d8e3.ogg
    note:
      en: "'Paru-paru' means 'lungs'; it is a reduplication noun, always written with
        a hyphen; related word: 'jantung' (heart)."
    sentences:
      - id: module-8-0020-s1
        text: Merokok itu berbahaya untuk paru-paru kita.
        blank: paru-paru
        en: Smoking is dangerous for our lungs.
      - id: module-8-0020-s2
        text: Dokter memeriksa paru-paru saya hari ini.
        blank: paru-paru
        en: The doctor examined my lungs today.
      - id: module-8-0020-s3
        text: Paru-paru kita butuh udara bersih.
        blank: Paru-paru
        en: Our lungs need clean air.
  - id: module-8-0021
    indonesian: pembuluh darah
    english: a blood vessel, a vein, an artery
    audio: 8961d4015b20.ogg
    note:
      en: "'Pembuluh darah' is the general term for blood vessels; 'vena' (vein) and
        'arteri' (artery) are more medical/formal; commonly heard in health and
        doctor contexts."
    sentences:
      - id: module-8-0021-s1
        text: Dokter memeriksa pembuluh darah saya hari ini.
        blank: pembuluh darah
        en: The doctor checked my blood vessel today.
      - id: module-8-0021-s2
        text: Pembuluh darah di tangan saya terlihat biru.
        blank: pembuluh darah
        en: The blood vessel in my hand looks blue.
      - id: module-8-0021-s3
        text: Olahraga baik untuk pembuluh darah kita.
        blank: pembuluh darah
        en: Exercise is good for our blood vessels.
  - id: module-8-0022
    indonesian: punggung
    english: the back
    audio: 9ff55318bea9.ogg
    note:
      en: "'Punggung' means the back of the body; not to be confused with 'belakang'
        (behind/rear of a place or object)."
    sentences:
      - id: module-8-0022-s1
        text: Punggung saya sakit setelah banyak berjalan.
        blank: Punggung
        en: My back hurts after walking a lot.
      - id: module-8-0022-s2
        text: Dia menggosok punggung adiknya dengan lembut.
        blank: punggung
        en: She gently rubbed her younger sibling's back.
      - id: module-8-0022-s3
        text: Tolong oleskan minyak di punggung saya.
        blank: punggung
        en: Please apply oil on my back.
  - id: module-8-0023
    indonesian: rambut
    english: hair
    audio: d09b37ee4933.ogg
    note:
      en: "'Rambut' means hair on the head; use 'bulu' for body/animal hair. Common
        phrase: 'rambut panjang' (long hair), 'rambut pendek' (short hair)."
    sentences:
      - id: module-8-0023-s1
        text: Rambut saya panjang dan hitam.
        blank: Rambut
        en: My hair is long and black.
      - id: module-8-0023-s2
        text: Dia mencuci rambut setiap hari.
        blank: rambut
        en: She washes her hair every day.
      - id: module-8-0023-s3
        text: Adik saya punya rambut pendek.
        blank: rambut
        en: My younger sibling has short hair.
  - id: module-8-0024
    indonesian: serangan
    english: an attack
    audio: 56db7a3924e1.ogg
    note:
      en: "'Serangan' means 'an attack' or 'assault'; also used for medical episodes
        like 'serangan jantung' (heart attack); not to be confused with 'serang'
        (to attack, verb)."
    sentences:
      - id: module-8-0024-s1
        text: Anjing itu melakukan serangan terhadap kucing.
        blank: serangan
        en: That dog made an attack on the cat.
      - id: module-8-0024-s2
        text: Serangan nyamuk sangat banyak malam ini.
        blank: Serangan
        en: The mosquito attacks are very many tonight.
      - id: module-8-0024-s3
        text: Dia selamat dari serangan itu.
        blank: serangan
        en: He survived the attack.
  - id: module-8-0025
    indonesian: siap
    english: ready
    audio: 15bdc157ca64.ogg
    note:
      en: "'Siap' means 'ready' and is also used as a polite affirmative 'yes,
        sir/ma'am' in formal or service contexts; related: 'sudah siap' (already
        ready), 'belum siap' (not yet ready)."
    sentences:
      - id: module-8-0025-s1
        text: Saya sudah siap pergi ke pantai.
        blank: siap
        en: I am already ready to go to the beach.
      - id: module-8-0025-s2
        text: Apakah kamu siap untuk makan malam?
        blank: siap
        en: Are you ready for dinner?
      - id: module-8-0025-s3
        text: Makanan ini belum siap.
        blank: siap
        en: This food is not ready yet.
  - id: module-8-0026
    indonesian: telinga
    english: ear(s)
    audio: 24dd3781a3f1.ogg
    note:
      en: '"Telinga" means ear or ears (same form for singular and plural); commonly
        confused with "kuping", an informal/colloquial synonym used in casual
        speech.'
    sentences:
      - id: module-8-0026-s1
        text: Telinga saya sakit setelah mendengarkan musik keras.
        blank: Telinga
        en: My ear hurts after listening to loud music.
      - id: module-8-0026-s2
        text: Dia memakai anting di telinga kirinya.
        blank: telinga
        en: She is wearing an earring in her left ear.
      - id: module-8-0026-s3
        text: Kucing itu memiliki telinga yang sangat kecil.
        blank: telinga
        en: That cat has very small ears.
  - id: module-8-0027
    indonesian: terasa
    english: to feel (sensation in your body/heart)
    audio: 892f11a3696a.ogg
    note:
      en: "'Terasa' describes a sensation you passively feel (pain, warmth, emotion);
        different from 'merasa' which is more about personal emotion or
        opinion."
    sentences:
      - id: module-8-0027-s1
        text: Makanan ini terasa pedas sekali.
        blank: terasa
        en: This food tastes very spicy.
      - id: module-8-0027-s2
        text: Angin pantai terasa dingin malam ini.
        blank: terasa
        en: The beach wind feels cold tonight.
      - id: module-8-0027-s3
        text: Kakiku terasa sakit setelah jalan jauh.
        blank: terasa
        en: My foot feels sore after walking far.
  - id: module-8-0028
    indonesian: tubuh
    english: the (human) body
    audio: eb2d2005d10f.ogg
    note:
      en: "'Tubuh' means the human body as a whole; 'badan' is a common informal
        synonym, while 'tubuh' is slightly more formal."
    sentences:
      - id: module-8-0028-s1
        text: Tubuh saya sakit setelah olahraga tadi.
        blank: Tubuh
        en: My body hurts after exercising earlier.
      - id: module-8-0028-s2
        text: Minum air putih baik untuk tubuh kita.
        blank: tubuh
        en: Drinking water is good for our body.
      - id: module-8-0028-s3
        text: Dia menjaga tubuhnya dengan makan sehat.
        blank: tubuhnya
        en: She takes care of her body by eating healthy.
  - id: module-8-0029
    indonesian: tulang
    english: a bone
    audio: f80f5c9e190d.ogg
    note:
      en: "'Tulang' means bone (body part or in food); also used in 'tulang punggung'
        (backbone/spine); not to be confused with 'duri' (fish bone/thorn)."
    sentences:
      - id: module-8-0029-s1
        text: Anjing itu suka makan tulang ayam.
        blank: tulang
        en: That dog likes to eat chicken bones.
      - id: module-8-0029-s2
        text: Tulang kaki saya sakit sekali.
        blank: Tulang
        en: My leg bone hurts a lot.
      - id: module-8-0029-s3
        text: Dokter memeriksa tulang tangan saya.
        blank: tulang
        en: The doctor examined the bone in my hand.
  - id: module-8-0030
    indonesian: usus
    english: the intestines, the guts, bowels
    audio: f51f1163e6b2.ogg
    note:
      en: "'Usus' is a neutral, everyday medical/body word; common phrases include
        'usus besar' (large intestine) and 'usus kecil' (small intestine)."
    sentences:
      - id: module-8-0030-s1
        text: Dokter memeriksa usus saya kemarin.
        blank: usus
        en: The doctor examined my intestines yesterday.
      - id: module-8-0030-s2
        text: Usus saya sakit setelah makan pedas.
        blank: usus
        en: My intestines hurt after eating spicy food.
      - id: module-8-0030-s3
        text: Usus besar ada di dalam perut.
        blank: usus
        en: The large intestine is inside the stomach.
  - id: module-8-0031
    indonesian: botak
    english: bald
    audio: e904c804fd82.ogg
    note:
      en: "'Botak' is a casual, everyday word for bald; can be playful or slightly
        blunt, so use carefully with elders; related: 'rambut' (hair), 'gundul'
        (shaved/bald, more informal)."
    sentences:
      - id: module-8-0031-s1
        text: Kepala kakek saya sudah botak sekarang.
        blank: botak
        en: My grandfather's head is already bald now.
