id: module-7
title:
  en: Module 7
cards:
  - id: module-7-0001
    indonesian: baju hangat
    english: sweater
    audio: 2a1924990c79.ogg
    note:
      en: "'Baju hangat' literally means 'warm clothes/shirt' and is the common
        everyday term for a sweater or jacket; sometimes interchangeable with
        'jaket' for light jackets."
    sentences:
      - id: module-7-0001-s1
        text: Aku pakai baju hangat karena dingin.
        blank: baju hangat
        en: I wear a sweater because it is cold.
      - id: module-7-0001-s2
        text: Di Bali, baju hangat jarang dipakai.
        blank: baju hangat
        en: In Bali, sweaters are rarely worn.
      - id: module-7-0001-s3
        text: Dia membeli baju hangat baru kemarin.
        blank: baju hangat
        en: She bought a new sweater yesterday.
  - id: module-7-0002
    indonesian: baju tidur
    english: a pajama
    audio: 3c32fbf3ffc0.ogg
    note:
      en: "'Baju tidur' literally means 'sleep clothes'; often interchangeable with
        'piyama', and more commonly used in everyday Indonesian speech than the
        borrowed word."
    sentences:
      - id: module-7-0002-s1
        text: Saya memakai baju tidur yang nyaman.
        blank: baju tidur
        en: I am wearing comfortable pajamas.
      - id: module-7-0002-s2
        text: Dia membeli baju tidur baru kemarin.
        blank: baju tidur
        en: She bought new pajamas yesterday.
      - id: module-7-0002-s3
        text: Baju tidur saya ada di kamar.
        blank: baju tidur
        en: My pajamas are in the bedroom.
  - id: module-7-0003
    indonesian: blus
    english: blouse
    audio: a9b5fdfd146e.ogg
    note:
      en: "'Blus' is the standard Indonesian word for blouse; it is a loanword from
        Dutch, used in everyday and formal contexts, related to 'kemeja' (shirt)
        and 'baju' (clothing/top)."
    sentences:
      - id: module-7-0003-s1
        text: Ibu membeli blus baru di pasar.
        blank: blus
        en: Mom bought a new blouse at the market.
      - id: module-7-0003-s2
        text: Blus merah itu sangat cantik.
        blank: blus
        en: That red blouse is very pretty.
      - id: module-7-0003-s3
        text: Saya suka blus biru ini.
        blank: blus
        en: I like this blue blouse.
  - id: module-7-0004
    indonesian: buatan
    english: made in
    audio: ee7c5dd198c2.ogg
    note:
      en: "'Buatan' means 'made in' or 'made by'; often used before a country or
        person, e.g. 'buatan Indonesia'; related to 'buat' (to make)."
    sentences:
      - id: module-7-0004-s1
        text: Sepatu ini buatan Indonesia.
        blank: buatan
        en: These shoes are made in Indonesia.
      - id: module-7-0004-s2
        text: Kue ini buatan ibu saya.
        blank: buatan
        en: This cake is made by my mother.
      - id: module-7-0004-s3
        text: Tas itu buatan Bali.
        blank: buatan
        en: That bag is made in Bali.
  - id: module-7-0005
    indonesian: celana
    english: pants
    audio: f3049953a4ba.ogg
    note:
      en: "'Celana' means pants/trousers; say 'celana pendek' for shorts and 'celana
        panjang' for long pants; commonly used in everyday shopping and clothing
        talk."
    sentences:
      - id: module-7-0005-s1
        text: Saya membeli celana baru di pasar.
        blank: celana
        en: I bought new pants at the market.
      - id: module-7-0005-s2
        text: Celana ini terlalu besar untuk saya.
        blank: Celana
        en: These pants are too big for me.
      - id: module-7-0005-s3
        text: Dia memakai celana pendek berwarna biru.
        blank: celana
        en: He is wearing blue shorts.
  - id: module-7-0006
    indonesian: celana dalam
    english: underpants
    audio: 83fd213a3dd4.ogg
    note:
      en: "'Celana dalam' is the neutral everyday term for underpants/underwear; it is
        not vulgar but is considered a private topic, so use it matter-of-factly
        in practical contexts like shopping or laundry."
    sentences:
      - id: module-7-0006-s1
        text: Saya membeli celana dalam di toko.
        blank: celana dalam
        en: I buy underpants at the store.
      - id: module-7-0006-s2
        text: Celana dalam saya ada di lemari.
        blank: celana dalam
        en: My underpants are in the wardrobe.
      - id: module-7-0006-s3
        text: Dia mencuci celana dalam setiap hari.
        blank: celana dalam
        en: She washes her underpants every day.
  - id: module-7-0007
    indonesian: celana pendek
    english: shorts
    audio: e22a26312087.ogg
    note:
      en: '"Celana pendek" literally means "short pants"; use "celana panjang" for
        long pants; common casual/everyday clothing word.'
    sentences:
      - id: module-7-0007-s1
        text: Saya memakai celana pendek di pantai.
        blank: celana pendek
        en: I am wearing shorts at the beach.
      - id: module-7-0007-s2
        text: Dia membeli celana pendek baru kemarin.
        blank: celana pendek
        en: He bought new shorts yesterday.
      - id: module-7-0007-s3
        text: Celana pendek ini sangat nyaman.
        blank: celana pendek
        en: These shorts are very comfortable.
  - id: module-7-0008
    indonesian: cucian
    english: laundry
    audio: e960dde16831.ogg
    note:
      en: "'Cucian' means laundry (clothes to be washed or already washed); related to
        'cuci' (to wash); common in everyday household talk."
    sentences:
      - id: module-7-0008-s1
        text: Cucian saya belum kering hari ini.
        blank: Cucian
        en: My laundry is not dry yet today.
      - id: module-7-0008-s2
        text: Ibu mencuci cucian di belakang rumah.
        blank: cucian
        en: Mom washes the laundry behind the house.
      - id: module-7-0008-s3
        text: Tolong taruh cucian di keranjang itu.
        blank: cucian
        en: Please put the laundry in that basket.
  - id: module-7-0009
    indonesian: dasi
    english: neck tie
    audio: b0493ba6c8be.ogg
    note:
      en: "'Dasi' means necktie; commonly worn in formal or office settings in
        Indonesia; related word: 'kemeja' (dress shirt)."
    sentences:
      - id: module-7-0009-s1
        text: Ayah memakai dasi merah ke kantor.
        blank: dasi
        en: Father wears a red necktie to the office.
      - id: module-7-0009-s2
        text: Dasi ini bagus sekali.
        blank: Dasi
        en: This necktie is very nice.
      - id: module-7-0009-s3
        text: Saya beli dasi baru kemarin.
        blank: dasi
        en: I bought a new necktie yesterday.
  - id: module-7-0010
    indonesian: jaket
    english: a coat
    audio: c37c6670f025.ogg
    note:
      en: "'Jaket' means jacket or light coat; more common than 'mantel' (heavy coat);
        used for hoodies and zip-ups too."
    sentences:
      - id: module-7-0010-s1
        text: Saya memakai jaket karena cuaca dingin.
        blank: jaket
        en: I am wearing a jacket because the weather is cold.
      - id: module-7-0010-s2
        text: Jaket merah itu milik Budi.
        blank: jaket
        en: That red jacket belongs to Budi.
      - id: module-7-0010-s3
        text: Dia membeli jaket baru di pasar.
        blank: jaket
        en: She bought a new jacket at the market.
  - id: module-7-0011
    indonesian: kaus
    english: a t-shirt
    audio: c8ea3ed0c3c3.ogg
    note:
      en: "'Kaus' means t-shirt; also spelled 'kaos'; not to be confused with 'kaus
        kaki' (socks)."
    sentences:
      - id: module-7-0011-s1
        text: Saya membeli kaus baru di pasar.
        blank: kaus
        en: I bought a new t-shirt at the market.
      - id: module-7-0011-s2
        text: Kaus ini berwarna merah dan murah.
        blank: kaus
        en: This t-shirt is red and cheap.
      - id: module-7-0011-s3
        text: Dia memakai kaus putih setiap hari.
        blank: kaus
        en: He wears a white t-shirt every day.
  - id: module-7-0012
    indonesian: kemeja
    english: a shirt
    audio: 12f43fafff6b.ogg
    note:
      en: "'Kemeja' refers specifically to a collared button-up shirt; often confused
        with 'baju' (generic top/shirt) or 'kaos' (T-shirt)."
    sentences:
      - id: module-7-0012-s1
        text: Dia memakai kemeja putih ke kantor.
        blank: kemeja
        en: He wears a white shirt to the office.
      - id: module-7-0012-s2
        text: Saya beli kemeja baru di pasar.
        blank: kemeja
        en: I bought a new shirt at the market.
      - id: module-7-0012-s3
        text: Kemeja ini sangat bagus dan murah.
        blank: Kemeja
        en: This shirt is very nice and cheap.
  - id: module-7-0013
    indonesian: lengan
    english: arm, sleeve
    audio: 85cf3fa1d710.ogg
    note:
      en: "'Lengan' means both 'arm' (body part) and 'sleeve' (of clothing); beginners
        often confuse it with 'tangan' which refers to the hand or entire arm
        casually."
    sentences:
      - id: module-7-0013-s1
        text: Lengan saya sakit setelah jatuh kemarin.
        blank: Lengan
        en: My arm hurts after falling yesterday.
      - id: module-7-0013-s2
        text: Baju ini punya lengan yang panjang.
        blank: lengan
        en: This shirt has long sleeves.
      - id: module-7-0013-s3
        text: Dia memegang tas di lengan kirinya.
        blank: lengan
        en: She is holding a bag on her left arm.
  - id: module-7-0014
    indonesian: rok
    english: a skirt
    audio: c0ce173d12b9.ogg
    note:
      en: "'Rok' means skirt; commonly used in everyday clothing talk; related words
        include 'baju' (shirt) and 'celana' (pants)."
    sentences:
      - id: module-7-0014-s1
        text: Saya memakai rok biru hari ini.
        blank: rok
        en: I am wearing a blue skirt today.
      - id: module-7-0014-s2
        text: Ibu membeli rok baru di pasar.
        blank: rok
        en: Mom bought a new skirt at the market.
      - id: module-7-0014-s3
        text: Rok adik sangat cantik dan panjang.
        blank: rok
        en: My younger sister's skirt is very beautiful and long.
  - id: module-7-0015
    indonesian: sapu tangan
    english: handkerchiefs
    audio: 42a3eefc915f.ogg
    note:
      en: '"Sapu tangan" literally means "hand broom"; it refers to a cloth
        handkerchief, not a tissue ("tisu"); commonly used in formal or
        traditional contexts.'
    sentences:
      - id: module-7-0015-s1
        text: Ibu memberi saya sapu tangan baru.
        blank: sapu tangan
        en: Mother gave me a new handkerchief.
      - id: module-7-0015-s2
        text: Saya pakai sapu tangan untuk lap muka.
        blank: sapu tangan
        en: I use a handkerchief to wipe my face.
      - id: module-7-0015-s3
        text: Di mana sapu tangan saya?
        blank: sapu tangan
        en: Where is my handkerchief?
  - id: module-7-0016
    indonesian: sedang (size)
    english: medium (of size)
    audio: 824de3edccaf.ogg
    note:
      en: "'Sedang' has two meanings: 'medium/middle (size)' and 'currently doing
        something'; context usually clarifies, but pair it with size words to
        avoid confusion."
    sentences:
      - id: module-7-0016-s1
        text: Saya mau beli baju ukuran sedang.
        blank: sedang
        en: I want to buy a shirt in medium size.
      - id: module-7-0016-s2
        text: Tolong ambilkan tas sedang itu.
        blank: sedang
        en: Please hand me that medium bag.
      - id: module-7-0016-s3
        text: Ukuran sedang pas untuk saya.
        blank: sedang
        en: Medium size fits me well.
  - id: module-7-0017
    indonesian: topi
    english: a hat
    audio: c0b43e05b352.ogg
    note:
      en: "'Topi' means hat or cap; common in everyday speech; related: 'topi pantai'
        (sun hat), 'topi baseball' (baseball cap)."
    sentences:
      - id: module-7-0017-s1
        text: Saya memakai topi di pantai.
        blank: topi
        en: I wear a hat at the beach.
      - id: module-7-0017-s2
        text: Topi merah itu milik Budi.
        blank: topi
        en: That red hat belongs to Budi.
      - id: module-7-0017-s3
        text: Dia membeli topi baru kemarin.
        blank: topi
        en: She bought a new hat yesterday.
  - id: module-7-0018
    indonesian: ukuran
    english: size, measurement
    audio: dd4b4e18897b.ogg
    note:
      en: "\"Ukuran\" means both 'size' (e.g. clothing) and 'measurement'; commonly
        used in shopping and cooking contexts; related words: 'besar' (big),
        'kecil' (small), 'mengukur' (to measure)."
    sentences:
      - id: module-7-0018-s1
        text: Berapa ukuran baju kamu?
        blank: ukuran
        en: What is your shirt size?
      - id: module-7-0018-s2
        text: Ukuran sepatunya terlalu kecil.
        blank: ukuran
        en: The shoe size is too small.
      - id: module-7-0018-s3
        text: Saya tidak tahu ukuran meja ini.
        blank: ukuran
        en: I don't know the measurement of this table.
  - id: module-7-0019
    indonesian: agar
    english: in order to
    audio: dd315a1fb922.ogg
    note:
      en: '"Agar" means "in order to / so that"; similar to "supaya" (interchangeable
        in most casual speech); slightly more formal than "supaya".'
    sentences:
      - id: module-7-0019-s1
        text: Dia belajar keras agar lulus ujian.
        blank: agar
        en: He studies hard in order to pass the exam.
      - id: module-7-0019-s2
        text: Minum air banyak agar tidak sakit.
        blank: agar
        en: Drink a lot of water so that you don't get sick.
      - id: module-7-0019-s3
        text: Saya bangun pagi agar tidak terlambat.
        blank: agar
        en: I wake up early in order to not be late.
  - id: module-7-0020
    indonesian: helm
    english: a helmet
    audio: 5b5114832c8c.ogg
    note:
      en: "'Helm' is the everyday Indonesian word for helmet; commonly used for
        motorcycle helmets since motorbikes are very common in Indonesia."
    sentences:
      - id: module-7-0020-s1
        text: Kamu harus pakai helm saat naik motor.
        blank: helm
        en: You must wear a helmet when riding a motorbike.
      - id: module-7-0020-s2
        text: Helm saya warnanya merah.
        blank: helm
        en: My helmet is red.
      - id: module-7-0020-s3
        text: Dia lupa membawa helm hari ini.
        blank: helm
        en: He forgot to bring a helmet today.
  - id: module-7-0021
    indonesian: ingat
    english: to remember
    audio: a7b1608d5d11.ogg
    note:
      en: "'Ingat' means 'to remember' or 'to recall'; commonly used in daily speech;
        related words: 'mengingat' (to remember something), 'mengingatkan' (to
        remind someone)"
    sentences:
      - id: module-7-0021-s1
        text: Aku ingat nama teman baruku.
        blank: ingat
        en: I remember my new friend's name.
      - id: module-7-0021-s2
        text: Dia tidak ingat di mana tasnya.
        blank: ingat
        en: He doesn't remember where his bag is.
      - id: module-7-0021-s3
        text: Ingat, kita harus pulang sekarang.
        blank: Ingat
        en: Remember, we have to go home now.
  - id: module-7-0022
    indonesian: diingat-ingat
    english: to give it a good long thought
    note:
      en: '"Diingat-ingat" is a colloquial reduplication meaning to think carefully or
        recall something thoroughly; commonly used in everyday speech as a
        gentle reminder.'
    sentences:
      - id: module-7-0022-s1
        text: Tolong diingat-ingat alamat rumah saya ya.
        blank: diingat-ingat
        en: Please give it a good long thought about my home address.
      - id: module-7-0022-s2
        text: Kata ibu harus diingat-ingat baik-baik.
        blank: diingat-ingat
        en: Mother's words should be given a good long thought.
      - id: module-7-0022-s3
        text: Jadwal belajar kita perlu diingat-ingat lagi.
        blank: diingat-ingat
        en: Our study schedule needs to be given a good long thought again.
  - id: module-7-0023
    indonesian: jas
    english: suit jacket
    audio: b2504ae4f247.ogg
    note:
      en: "'Jas' refers specifically to a suit jacket or blazer; not to be confused
        with 'jaket' (casual jacket) or 'baju' (shirt/top)."
    sentences:
      - id: module-7-0023-s1
        text: Dia memakai jas biru ke kantor.
        blank: jas
        en: He wears a blue suit jacket to the office.
      - id: module-7-0023-s2
        text: Jas ini sangat bagus dan mahal.
        blank: jas
        en: This suit jacket is very nice and expensive.
      - id: module-7-0023-s3
        text: Ayah membeli jas baru kemarin.
        blank: jas
        en: Dad bought a new suit jacket yesterday.
  - id: module-7-0024
    indonesian: kan
    english: derived from bukan to show a knowledge or understanding shared by
      speaker and listener
    audio: f766c5bf5a10.ogg
    note:
      en: "\"Kan\" is an informal tag word (like \"right?\" or \"isn't it?\") used to
        confirm shared knowledge; it comes from \"bukan\" and is common in
        casual speech."
    sentences:
      - id: module-7-0024-s1
        text: Ini kopi, kan?
        blank: kan
        en: This is coffee, right?
      - id: module-7-0024-s2
        text: Kamu tinggal di Bali, kan?
        blank: kan
        en: You live in Bali, right?
      - id: module-7-0024-s3
        text: Besok libur, kan?
        blank: kan
        en: Tomorrow is a holiday, right?
  - id: module-7-0025
    indonesian: kau
    english: you
    audio: 949f0b4096d4.ogg
    note:
      en: "'kau' means 'you' and is informal/casual, similar to 'kamu'; avoid in
        formal situations; related words: 'Anda' (formal), 'kamu' (informal)"
    sentences:
      - id: module-7-0025-s1
        text: Kau mau makan apa malam ini?
        blank: Kau
        en: What do you want to eat tonight?
      - id: module-7-0025-s2
        text: Di mana kau tinggal sekarang?
        blank: kau
        en: Where do you live now?
      - id: module-7-0025-s3
        text: Kau sangat baik hati.
        blank: Kau
        en: You are very kind.
  - id: module-7-0026
    indonesian: kelupaan
    english: have forgotten
    audio: 594de359e9b4.ogg
    note:
      en: "'kelupaan' means to have forgotten something accidentally;
        informal/colloquial register, related to 'lupa' (forget), often used in
        everyday speech"
    sentences:
      - id: module-7-0026-s1
        text: Saya kelupaan membawa dompet ke pasar.
        blank: kelupaan
        en: I forgot to bring my wallet to the market.
      - id: module-7-0026-s2
        text: Dia kelupaan nama teman barunya.
        blank: kelupaan
        en: She forgot her new friend's name.
      - id: module-7-0026-s3
        text: Kami kelupaan memesan nasi di warung.
        blank: kelupaan
        en: We forgot to order rice at the food stall.
  - id: module-7-0027
    indonesian: kurang
    english: lacking
    audio: c37610a10dee.ogg
    note:
      en: "'Kurang' means lacking/not enough; also used before adjectives to mean 'not
        very' (e.g. kurang baik = not very good); related: kekurangan
        (shortage)."
    sentences:
      - id: module-7-0027-s1
        text: Nasi ini kurang garam.
        blank: kurang
        en: This rice lacks salt.
      - id: module-7-0027-s2
        text: Saya kurang tidur semalam.
        blank: kurang
        en: I didn't sleep enough last night.
      - id: module-7-0027-s3
        text: Uang saya kurang untuk beli buku.
        blank: kurang
        en: My money is not enough to buy a book.
  - id: module-7-0028
    indonesian: rasanya
    english: it seems to me
    audio: c13b8f66d6da.ogg
    note:
      en: "\"Rasanya\" literally means \"its taste/feeling\" but commonly means \"it
        seems to me\" or \"I feel like\"; don't confuse with \"rasa\"
        (taste/feeling) alone; related: \"sepertinya\" (it seems)."
    sentences:
      - id: module-7-0028-s1
        text: Rasanya hari ini akan hujan.
        blank: Rasanya
        en: It seems to me it will rain today.
      - id: module-7-0028-s2
        text: Rasanya saya sudah pernah ke sini.
        blank: Rasanya
        en: It seems to me I have been here before.
      - id: module-7-0028-s3
        text: Rasanya dia tidak datang hari ini.
        blank: Rasanya
        en: It seems to me he is not coming today.
  - id: module-7-0029
    indonesian: resmi
    english: formal
    audio: b1bdcd85576c.ogg
    note:
      en: '"Resmi" means formal or official; often confused with "formal" (borrowed
        word); related: "resmi" vs. "santai" (casual).'
    sentences:
      - id: module-7-0029-s1
        text: Pertemuan ini bersifat resmi dan penting.
        blank: resmi
        en: This meeting is formal and important.
      - id: module-7-0029-s2
        text: Dia memakai baju resmi ke kantor.
        blank: resmi
        en: He wears formal clothes to the office.
      - id: module-7-0029-s3
        text: Acara resmi itu mulai jam tujuh.
        blank: resmi
        en: The formal event starts at seven o'clock.
  - id: module-7-0030
    indonesian: SIM
    english: driver's license (acronym)
    audio: 035c0f67c20c.ogg
    note:
      en: "'SIM' stands for 'Surat Izin Mengemudi'; always use the acronym in everyday
        speech, never the full form."
    sentences:
      - id: module-7-0030-s1
        text: Saya perlu membuat SIM bulan ini.
        blank: SIM
        en: I need to make a driver's license this month.
      - id: module-7-0030-s2
        text: Apakah kamu sudah punya SIM?
        blank: SIM
        en: Do you already have a driver's license?
      - id: module-7-0030-s3
        text: Polisi meminta SIM saya di jalan.
        blank: SIM
        en: The police asked for my driver's license on the road.
  - id: module-7-0031
    indonesian: Surat Izin Mengemudi
    english: driver's license
    note:
      en: "\"Surat Izin Mengemudi\" is the formal term for driver's license, commonly
        abbreviated as \"SIM\"; always carry it while driving in Indonesia."
    sentences:
      - id: module-7-0031-s1
        text: Saya harus membuat Surat Izin Mengemudi baru.
        blank: Surat Izin Mengemudi
        en: I have to make a new driver's license.
      - id: module-7-0031-s2
        text: Surat Izin Mengemudi saya ada di dompet.
        blank: Surat Izin Mengemudi
        en: My driver's license is in my wallet.
      - id: module-7-0031-s3
        text: Polisi meminta Surat Izin Mengemudi saya.
        blank: Surat Izin Mengemudi
        en: The police asked for my driver's license.
  - id: module-7-0032
    indonesian: siap-siap
