        blank: Kebun Raya
        en: The Botanical Garden is very beautiful and green.
      - id: module-7-0121-s3
        text: Banyak pohon besar di Kebun Raya.
        blank: Kebun Raya
        en: There are many big trees in the Botanical Garden.
  - id: module-7-0122
    indonesian: kredit
