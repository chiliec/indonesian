  - id: module-7-0125
    indonesian: lokasi
    english: a location, a site
    audio: 1551c091b02c.ogg
    note:
      en: "'Lokasi' is a neutral everyday word for location or site; commonly used
        when asking for directions or describing a place; related words include
        'tempat' (place) and 'alamat' (address)."
