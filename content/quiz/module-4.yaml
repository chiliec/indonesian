      - id: module-4-0084-s2
        text: Pasar modern itu menjual banyak barang.
        blank: modern
        en: That modern market sells many goods.
      - id: module-4-0084-s3
        text: Dia suka gaya hidup modern.
        blank: modern
        en: She likes a modern lifestyle.
  - id: module-4-0085
    indonesian: pokoknya
    english: the main thing is
    audio: a7107eaa6414.ogg
    note:
      en: "'Pokoknya' is informal/colloquial, used to summarize or stress the main
