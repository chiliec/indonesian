      - id: module-4-0085-s2
        text: Pokoknya makanan ini enak sekali.
        blank: Pokoknya
        en: The main thing is this food is very delicious.
      - id: module-4-0085-s3
        text: Pokoknya jangan lupa bawa uang.
        blank: Pokoknya
        en: The main thing is don't forget to bring money.
  - id: module-4-0086
    indonesian: pendapat
    english: opinion
    audio: 69cd6d815547.ogg
    note:
      en: '"Pendapat" means opinion or view; often used in discussions; related:
