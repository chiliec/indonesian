      - id: module-4-0088-s1
        text: Aku sekamar dengan teman di hostel.
        blank: sekamar
        en: I share a room with a friend at the hostel.
      - id: module-4-0088-s2
        text: Dia sekamar dengan kakaknya setiap liburan.
        blank: sekamar
