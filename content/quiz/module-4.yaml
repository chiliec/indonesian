      - id: module-4-0063-s2
        text: Saya ingin mendaki gunung besok pagi.
        blank: gunung
        en: I want to climb the mountain tomorrow morning.
      - id: module-4-0063-s3
        text: Pemandangan gunung itu sangat bagus.
        blank: gunung
        en: The view of that mountain is very beautiful.
  - id: module-4-0064
    indonesian: hutan
    english: forest
    audio: 0acb0aa7f4ad.ogg
    note:
      en: "'Hutan' means forest or jungle; commonly used in everyday speech; related
        words include 'pohon' (tree) and 'hewan' (animal)."
