      - id: module-4-0090-s2
        text: Mereka serumah di Bali sejak lama.
        blank: serumah
        en: They have lived in one house in Bali for a long time.
      - id: module-4-0090-s3
        text: Kami serumah dan selalu makan bersama.
        blank: serumah
        en: We live in one house and always eat together.
  - id: module-4-0091
