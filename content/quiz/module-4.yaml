  - id: module-4-0065
    indonesian: losmen
    english: small hotel
    audio: 56a2f9ca91b6.ogg
    note:
      en: "'Losmen' refers to a small, budget guesthouse or inn, more basic than a
        'hotel'; commonly found in tourist areas across Indonesia."
    sentences:
      - id: module-4-0065-s1
        text: Kami menginap di losmen yang murah.
        blank: losmen
        en: We are staying at a cheap small hotel.
      - id: module-4-0065-s2
        text: Losmen ini dekat dengan pantai.
        blank: losmen
        en: This small hotel is near the beach.
      - id: module-4-0065-s3
        text: Saya mencari losmen untuk malam ini.
        blank: losmen
        en: I am looking for a small hotel for tonight.
  - id: module-4-0066
    indonesian: misalnya
    english: for example
    audio: 63e0f302847d.ogg
