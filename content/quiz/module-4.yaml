      en: "'misalnya' means 'for example' and is used in everyday speech; similar to
        'contohnya', both are interchangeable but 'misalnya' is slightly more
        conversational"
    sentences:
      - id: module-4-0066-s1
        text: Saya suka buah, misalnya mangga dan pisang.
        blank: misalnya
        en: I like fruit, for example mango and banana.
      - id: module-4-0066-s2
        text: Ada banyak tempat wisata, misalnya Pantai Kuta.
        blank: misalnya
        en: There are many tourist spots, for example Kuta Beach.
  - id: module-4-0067
    indonesian: pantai
    english: coast, coastline, shore, beach
    audio: 2bfa085c2016.ogg
    note:
      en: "'Pantai' means beach or coast and is very common in everyday Indonesian;
        not to be confused with 'sungai' (river) or 'danau' (lake)."
    sentences:
      - id: module-4-0067-s1
        text: Saya suka pergi ke pantai setiap hari.
        blank: pantai
