        text: Pelajaran itu membosankan dan lama.
        blank: membosankan
        en: That lesson is boring and long.
      - id: module-4-0083-s3
        text: Cuaca hujan membuat hari ini membosankan.
        blank: membosankan
        en: Rainy weather makes today boring.
