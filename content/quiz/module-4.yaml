      - id: module-4-0080-s2
        text: Lho, ini bukan tas saya!
        blank: Lho
        en: Wait, this isn't my bag!
      - id: module-4-0080-s3
        text: Lho, warung itu sudah tutup?
        blank: Lho
        en: Hey, that warung is already closed?
  - id: module-4-0081
    indonesian: mana
    english: what, which one
    audio: 594368ad409b.ogg
    note:
      en: '"Mana" means "which" or "where" depending on context; often confused with
        "apa" (what); used in questions like "yang mana" (which one).'
    sentences:
      - id: module-4-0081-s1
        text: Baju mana yang kamu suka?
        blank: mana
