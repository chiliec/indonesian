      - id: module-4-0067-s2
        text: Pantai di Bali sangat indah.
        blank: pantai
        en: The beach in Bali is very beautiful.
      - id: module-4-0067-s3
        text: Kami bermain di pantai bersama keluarga.
        blank: pantai
        en: We play at the beach together with family.
  - id: module-4-0068
    indonesian: pemandangan alam
    english: view, vista, scenery
    audio: 2e30b0c9605b.ogg
    note:
      en: '"Pemandangan alam" refers to natural scenery or landscape; more specific
        than "pemandangan" alone, which can mean any view; related: "alam"
        (nature), "indah" (beautiful).'
    sentences:
      - id: module-4-0068-s1
        text: Pemandangan alam di Bali sangat indah.
        blank: pemandangan alam
        en: The natural scenery in Bali is very beautiful.
      - id: module-4-0068-s2
        text: Saya suka melihat pemandangan alam dari sini.
        blank: pemandangan alam
        en: I like looking at the natural scenery from here.
      - id: module-4-0068-s3
        text: Foto pemandangan alam ini bagus sekali.
        blank: pemandangan alam
        en: This photo of natural scenery is really nice.
  - id: module-4-0069
    indonesian: satu dua
    english: just one or two, just a few, a couple
    audio: b2f2b0d64f1c.ogg
    note:
      en: "'Satu dua' is casual spoken Indonesian meaning 'just a few/couple'; often
        used to downplay quantity, similar to saying 'only one or two' in
        English."
    sentences:
      - id: module-4-0069-s1
        text: Saya hanya punya satu dua teman di sini.
        blank: satu dua
        en: I only have a couple of friends here.
      - id: module-4-0069-s2
        text: Dia makan satu dua potong roti saja.
        blank: satu dua
        en: She ate just one or two pieces of bread.
      - id: module-4-0069-s3
        text: Ada satu dua turis di pantai itu.
        blank: satu dua
        en: There are just a few tourists at that beach.
  - id: module-4-0070
    indonesian: pariwisata
    english: tourist (as an adjective)
    audio: d27e60a52225.ogg
    note:
      en: "'Pariwisata' is a noun meaning 'tourism', but often used as an adjective
        modifier in phrases like 'daerah pariwisata' (tourist area); related
        words: 'wisata' (trip/tour), 'wisatawan' (tourist/person)."
    sentences:
      - id: module-4-0070-s1
        text: Bali adalah daerah pariwisata yang terkenal.
        blank: pariwisata
        en: Bali is a famous tourist area.
      - id: module-4-0070-s2
        text: Kota ini punya banyak objek pariwisata.
        blank: pariwisata
        en: This city has many tourist attractions.
      - id: module-4-0070-s3
        text: Industri pariwisata sangat penting di Indonesia.
        blank: pariwisata
        en: The tourist industry is very important in Indonesia.
  - id: module-4-0071
    indonesian: wisatawan
    english: tourist
    audio: 05a621f68a3d.ogg
    note:
      en: "'Wisatawan' means tourist or visitor; commonly used in formal and everyday
        speech; related words: 'turis' (informal for tourist), 'wisata'
        (tourism/trip)"
    sentences:
      - id: module-4-0071-s1
        text: Banyak wisatawan datang ke Bali setiap hari.
        blank: wisatawan
        en: Many tourists come to Bali every day.
      - id: module-4-0071-s2
        text: Wisatawan itu membeli oleh-oleh di pasar.
        blank: wisatawan
        en: That tourist buys souvenirs at the market.
      - id: module-4-0071-s3
        text: Pemandu membantu wisatawan menemukan jalan.
        blank: wisatawan
        en: The guide helps the tourist find the way.
  - id: module-4-0072
    indonesian: aneh
    english: strange, weird, puzzling
    audio: 64452ed9022a.ogg
    note:
      en: "'Aneh' is a common informal adjective meaning strange or weird; often
        confused with 'asing' (foreign/unfamiliar); related word: 'keanehan'
        (strangeness)."
    sentences:
      - id: module-4-0072-s1
        text: Rasanya aneh, aku tidak suka.
        blank: aneh
        en: It tastes strange, I don't like it.
      - id: module-4-0072-s2
        text: Ada suara aneh di luar rumah.
        blank: aneh
        en: There is a strange sound outside the house.
      - id: module-4-0072-s3
        text: Kenapa dia bertingkah aneh hari ini?
        blank: aneh
        en: Why is he acting weird today?
  - id: module-4-0073
    indonesian: benar
    english: "true"
    audio: a4fbee934387.ogg
    note:
      en: "\"Benar\" means 'true' or 'correct'; often confused with \"betul\" (same
        meaning); commonly used in \"benar atau salah\" (true or false)."
    sentences:
      - id: module-4-0073-s1
        text: Jawaban kamu benar sekali.
        blank: benar
        en: Your answer is absolutely correct.
      - id: module-4-0073-s2
        text: Apakah berita itu benar?
        blank: benar
        en: Is that news true?
      - id: module-4-0073-s3
        text: Ya, itu benar.
        blank: benar
        en: Yes, that is true.
  - id: module-4-0074
    indonesian: daripada
    english: than
    audio: 912d44c2c5b7.ogg
    note:
      en: "'Daripada' means 'than' in comparisons; beginners often confuse it with
        'dari' (from/of), but 'daripada' is specifically used for comparing two
        things."
    sentences:
      - id: module-4-0074-s1
        text: Apel ini lebih murah daripada jeruk itu.
        blank: daripada
        en: This apple is cheaper than that orange.
      - id: module-4-0074-s2
        text: Bali lebih panas daripada Jakarta.
        blank: daripada
        en: Bali is hotter than Jakarta.
      - id: module-4-0074-s3
        text: Saya lebih suka teh daripada kopi.
        blank: daripada
        en: I prefer tea more than coffee.
  - id: module-4-0075
    indonesian: kasar
    english: crude, oafish, impolite, rough to the touch
    audio: 36a1cb3efcb6.ogg
    note:
      en: '"Kasar" covers both physical roughness (texture) and rude/rough behavior;
        opposite is "halus" (smooth, refined, polite).'
    sentences:
      - id: module-4-0075-s1
        text: Permukaan batu itu sangat kasar.
        blank: kasar
        en: The surface of that stone is very rough.
      - id: module-4-0075-s2
        text: Jangan bicara kasar kepada orang tua.
        blank: kasar
        en: Don't speak rudely to elderly people.
      - id: module-4-0075-s3
        text: Anak itu kasar kepada temannya.
        blank: kasar
        en: That child is rude to his friend.
  - id: module-4-0076
    indonesian: ketimbang
    english: by comparison with, than
    audio: 33b066913e88.ogg
    note:
      en: "'Ketimbang' is informal/colloquial for 'daripada' (than/rather than);
        common in spoken Indonesian, especially in Java and Bali."
    sentences:
      - id: module-4-0076-s1
        text: Saya lebih suka nasi ketimbang roti.
        blank: ketimbang
        en: I prefer rice rather than bread.
      - id: module-4-0076-s2
        text: Berjalan kaki lebih sehat ketimbang naik motor.
        blank: ketimbang
        en: Walking is healthier than riding a motorbike.
      - id: module-4-0076-s3
        text: Buah ini lebih murah ketimbang di pasar.
        blank: ketimbang
        en: This fruit is cheaper than at the market.
  - id: module-4-0077
    indonesian: kok
    english: (informal)how come?, why?
    audio: ebac51955fb3.ogg
    note:
      en: "'Kok' is a casual, slightly surprised 'how come/why'; used in spoken
        Indonesian, not formal writing; similar to 'kenapa' but more expressive
        of surprise."
    sentences:
      - id: module-4-0077-s1
        text: Kok kamu tidak makan nasi?
        blank: Kok
        en: How come you're not eating rice?
      - id: module-4-0077-s2
        text: Kok toko ini tutup hari ini?
        blank: Kok
        en: How come this shop is closed today?
      - id: module-4-0077-s3
        text: Kamu kok pulang cepat sekali.
        blank: kok
        en: How come you came home so early?
  - id: module-4-0078
    indonesian: lebih
    english: more, -er (when comparing qualities to quantities)
    audio: 42d7c51f2b6b.ogg
