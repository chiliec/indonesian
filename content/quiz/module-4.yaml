      en: "'Lebih' means 'more' or '-er' in comparisons; often paired with 'dari'
        (than), e.g. 'lebih besar dari' (bigger than); do not confuse with
        'lagi' (more/again in other contexts)."
    sentences:
      - id: module-4-0078-s1
        text: Kopi ini lebih manis dari teh.
        blank: lebih
        en: This coffee is sweeter than tea.
      - id: module-4-0078-s2
        text: Bali lebih panas dari Jakarta hari ini.
        blank: lebih
        en: Bali is hotter than Jakarta today.
      - id: module-4-0078-s3
        text: Saya mau lebih banyak nasi, terima kasih.
        blank: lebih
        en: I want more rice, thank you.
  - id: module-4-0079
    indonesian: lebih banyak
    english: more
    audio: be13de40d94e.ogg
    note:
      en: '"Lebih banyak" means "more" in quantity; use "lebih" alone before
        adjectives, but pair it with "banyak" when referring to a greater amount
        or number of things.'
    sentences:
      - id: module-4-0079-s1
        text: Saya mau lebih banyak nasi, terima kasih.
        blank: lebih banyak
        en: I want more rice, thank you.
      - id: module-4-0079-s2
        text: Di pasar ada lebih banyak buah segar.
        blank: lebih banyak
        en: At the market there is more fresh fruit.
      - id: module-4-0079-s3
        text: Dia minum lebih banyak air setiap hari.
        blank: lebih banyak
        en: She drinks more water every day.
  - id: module-4-0080
    indonesian: lho
    english: (informal) A slangy exclamation which, when it appears at the beginning
      of a phrase or sentence, expresses mild surprise and incredulity
    audio: d0f7fdf48c51.ogg
