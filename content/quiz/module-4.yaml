id: module-4
title:
  en: Module 4
cards:
  - id: module-4-0001
    indonesian: andai kata
    english: supposing, supposing that, in the event that...
    audio: f8e25b232bea.ogg
    note:
      en: '"Andai kata" is a slightly formal/literary way to say "supposing" or "what
        if"; everyday speech often uses "kalau" or "seandainya" instead.'
    sentences:
      - id: module-4-0001-s1
        text: Andai kata hujan, kita tidak ke pantai.
        blank: Andai kata
        en: Supposing it rains, we won't go to the beach.
      - id: module-4-0001-s2
        text: Andai kata dia datang, aku senang.
        blank: Andai kata
        en: Supposing she comes, I would be happy.
      - id: module-4-0001-s3
        text: Andai kata ada waktu, ayo ke pasar.
        blank: Andai kata
        en: In the event that there is time, let's go to the market.
  - id: module-4-0002
    indonesian: anak kecil
    english: a small child, a little boy/girl
    audio: a00abb288e0d.ogg
    note:
      en: '"Anak kecil" literally means "small child"; "anak" alone means "child", and
        "kecil" means "small/little" — commonly used in everyday speech for
        young children; related: "anak-anak" (children).'
    sentences:
      - id: module-4-0002-s1
        text: Ada anak kecil di taman itu.
        blank: anak kecil
        en: There is a little child in that park.
      - id: module-4-0002-s2
        text: Anak kecil itu makan es krim.
        blank: anak kecil
        en: That little child is eating ice cream.
      - id: module-4-0002-s3
        text: Ibu menjaga anak kecil di rumah.
        blank: anak kecil
        en: Mother is looking after the small child at home.
  - id: module-4-0003
    indonesian: apa acara...
    english: what's on the agenda...?, what are (we/you, they) up to...?, what will
      (we/they) do...?
    audio: dc01cd1246f9.ogg
    note:
      en: '"Apa acara" is casual/informal, used to ask about plans or events; similar
        to "apa rencana" but more about scheduled activities or agenda items.'
    sentences:
      - id: module-4-0003-s1
        text: Apa acara kamu hari ini?
        blank: apa acara
        en: What are you up to today?
      - id: module-4-0003-s2
        text: Apa acara keluarga kita minggu depan?
        blank: apa acara
        en: What's on the agenda for our family next week?
  - id: module-4-0004
    indonesian: barangkali
    english: maybe, probably, hopefully
    audio: 76403449d0d7.ogg
    note:
      en: "'Barangkali' means 'maybe/perhaps' and is slightly more formal than
        'mungkin'; often used in polite speech or soft suggestions."
    sentences:
      - id: module-4-0004-s1
        text: Barangkali dia ada di rumah sekarang.
        blank: Barangkali
        en: Maybe he is at home now.
      - id: module-4-0004-s2
        text: Kita barangkali bisa makan bersama nanti.
        blank: barangkali
        en: We can maybe eat together later.
      - id: module-4-0004-s3
        text: Barangkali besok cuaca lebih bagus.
        blank: Barangkali
        en: Maybe tomorrow the weather will be better.
  - id: module-4-0005
    indonesian: berdansa
    english: to dance (western style, disco style)
    audio: 1709d50718b1.ogg
    note:
      en: "'Berdansa' refers to Western or disco-style dancing (e.g., at a club or
        party); for traditional Indonesian dance, use 'menari' instead."
    sentences:
      - id: module-4-0005-s1
        text: Mereka berdansa di pesta semalam.
        blank: berdansa
        en: They danced at the party last night.
      - id: module-4-0005-s2
        text: Aku ingin berdansa di pantai.
        blank: berdansa
        en: I want to dance at the beach.
      - id: module-4-0005-s3
        text: Dia berdansa dengan teman barunya.
        blank: berdansa
        en: She danced with her new friend.
  - id: module-4-0006
    indonesian: berjudi
    english: to gamble
    audio: 51f255f44098.ogg
    note:
      en: "'Berjudi' is an informal/neutral verb meaning 'to gamble'; often considered
        negative in context, related words: 'judi' (gambling/noun), 'penjudi'
        (gambler)."
    sentences:
      - id: module-4-0006-s1
        text: Dia suka berjudi di kasino setiap malam.
        blank: berjudi
        en: He likes to gamble at the casino every night.
      - id: module-4-0006-s2
        text: Ibu melarang anak-anak berjudi di rumah.
        blank: berjudi
        en: Mother forbids the children to gamble at home.
      - id: module-4-0006-s3
        text: Berjudi bisa membuat orang kehilangan uang.
        blank: Berjudi
        en: Gambling can make people lose money.
  - id: module-4-0007
    indonesian: dansa
    english: dancing, dance (popular western style), disco/ballroom dancing,
    audio: 753c530725e2.ogg
    note:
      en: '"Dansa" refers specifically to Western-style social dancing (ballroom,
        disco, clubbing), distinct from traditional Indonesian dance ("tari").'
    sentences:
      - id: module-4-0007-s1
        text: Kami suka dansa di pesta itu.
        blank: dansa
        en: We like to dance at that party.
      - id: module-4-0007-s2
        text: Dia belajar dansa setiap hari Sabtu.
        blank: dansa
        en: She learns to dance every Saturday.
      - id: module-4-0007-s3
        text: Mau dansa bersama saya?
        blank: dansa
        en: Do you want to dance with me?
  - id: module-4-0008
    indonesian: hangat
    english: warm
    audio: 736fd4142bee.ogg
    note:
      en: "'Hangat' means warm (temperature or atmosphere); also used figuratively for
        a warm welcome; don't confuse with 'panas' (hot)."
    sentences:
      - id: module-4-0008-s1
        text: Teh ini masih hangat dan enak.
        blank: hangat
        en: This tea is still warm and delicious.
      - id: module-4-0008-s2
        text: Cuaca hari ini terasa hangat sekali.
        blank: hangat
        en: The weather today feels very warm.
      - id: module-4-0008-s3
        text: Ibu membuat sup hangat untuk kami.
        blank: hangat
        en: Mom made warm soup for us.
  - id: module-4-0009
    indonesian: hidangan
    english: the food served at a meal
    audio: 1cbfb8c509fb.ogg
    note:
      en: '"Hidangan" is a slightly formal word for food/dishes served at a meal;
        everyday speech often uses "makanan" instead, but "hidangan" is common
        at events and restaurants.'
    sentences:
      - id: module-4-0009-s1
        text: Hidangan di pesta itu sangat lezat.
        blank: Hidangan
        en: The food served at the party was very delicious.
      - id: module-4-0009-s2
        text: Ibu menyiapkan hidangan untuk makan malam.
        blank: hidangan
        en: Mom is preparing the food for dinner.
      - id: module-4-0009-s3
        text: Hidangan ini enak sekali.
        blank: Hidangan
        en: This food served is very tasty.
  - id: module-4-0010
    indonesian: larut malam
    english: the middle of the night, late at night
    audio: f249e52c5226.ogg
    note:
      en: '"Larut malam" means late at night (typically after midnight); more specific
        than "malam" (night) alone; often paired with "sampai" (until) to
        describe staying up late.'
    sentences:
      - id: module-4-0010-s1
        text: Dia tidur sangat larut malam tadi.
        blank: larut malam
        en: He slept very late last night.
      - id: module-4-0010-s2
        text: Kami makan di warung larut malam.
        blank: larut malam
        en: We ate at a food stall late at night.
      - id: module-4-0010-s3
        text: Jangan keluar rumah larut malam ya.
        blank: larut malam
        en: Don't go out of the house late at night, okay.
  - id: module-4-0011
    indonesian: kalau...sudah
    english: when (i.e. after something in the future has happened)
    audio: ddc72f030623.ogg
    note:
      en: Used for future completed actions ('once/when X has happened'); often
        confused with 'kalau' alone (meaning 'if') or 'ketika' (meaning 'when'
        in the past/present).
    sentences:
      - id: module-4-0011-s1
        text: Kalau sudah makan, kita pergi ke pantai.
        blank: Kalau sudah
        en: When we have eaten, we will go to the beach.
      - id: module-4-0011-s2
        text: Kalau sudah sampai, tolong hubungi saya.
        blank: Kalau sudah
        en: When you have arrived, please contact me.
      - id: module-4-0011-s3
        text: Kalau sudah siap, kita mulai belajar.
        blank: Kalau sudah
        en: When you are ready, we will start studying.
  - id: module-4-0012
    indonesian: kasino
    english: casino
    audio: 1a74abe06831.ogg
    note:
      en: "'Kasino' is a loanword from English/Dutch; gambling is largely illegal in
        Indonesia, so casinos are rarely discussed in daily life."
    sentences:
      - id: module-4-0012-s1
        text: Ada kasino besar di kota itu.
        blank: kasino
        en: There is a big casino in that city.
      - id: module-4-0012-s2
        text: Dia tidak mau pergi ke kasino.
        blank: kasino
        en: He does not want to go to the casino.
  - id: module-4-0013
    indonesian: lotre
    english: lottery
    audio: 2b5edf7c752c.ogg
    note:
      en: "'Lotre' means lottery or raffle; common in everyday Indonesian, sometimes
        confused with 'undian' (draw/raffle), both are used interchangeably in
        casual speech."
    sentences:
      - id: module-4-0013-s1
        text: Dia menang lotre hari ini.
        blank: lotre
        en: He/She won the lottery today.
      - id: module-4-0013-s2
        text: Saya beli tiket lotre di pasar.
        blank: lotre
        en: I bought a lottery ticket at the market.
      - id: module-4-0013-s3
        text: Lotre itu sangat populer di sini.
        blank: lotre
        en: The lottery is very popular here.
  - id: module-4-0014
    indonesian: bulan depan
    english: next month
    audio: a1643924a9ec.ogg
    note:
      en: "'Bulan depan' means 'next month'; 'bulan' also means 'moon', and 'depan'
        means 'front/next' — also used in 'minggu depan' (next week) and 'tahun
        depan' (next year)."
    sentences:
      - id: module-4-0014-s1
        text: Saya pergi ke Bali bulan depan.
        blank: bulan depan
        en: I am going to Bali next month.
      - id: module-4-0014-s2
        text: Dia ulang tahun bulan depan.
        blank: bulan depan
        en: Her birthday is next month.
      - id: module-4-0014-s3
        text: Kami pindah rumah bulan depan.
        blank: bulan depan
        en: We are moving house next month.
  - id: module-4-0015
    indonesian: minggu depan
    english: next week
    audio: e491c7cd1e08.ogg
    note:
      en: "'Minggu depan' means 'next week'; note that 'minggu' also means 'Sunday',
        so context matters — related: 'minggu lalu' (last week), 'minggu ini'
        (this week)."
    sentences:
      - id: module-4-0015-s1
        text: Saya pergi ke Bali minggu depan.
        blank: minggu depan
        en: I am going to Bali next week.
      - id: module-4-0015-s2
        text: Dia mulai kerja minggu depan.
        blank: minggu depan
        en: He/She starts work next week.
      - id: module-4-0015-s3
        text: Kami ada ujian minggu depan.
        blank: minggu depan
        en: We have an exam next week.
  - id: module-4-0016
    indonesian: tahun depan
    english: next year
    audio: c54058295548.ogg
    note:
      en: "'Tahun depan' means 'next year'; 'depan' literally means 'front/ahead',
        also used in 'minggu depan' (next week) and 'bulan depan' (next month)."
    sentences:
      - id: module-4-0016-s1
        text: Tahun depan saya mau ke Bali.
        blank: tahun depan
        en: Next year I want to go to Bali.
      - id: module-4-0016-s2
        text: Dia akan menikah tahun depan.
        blank: tahun depan
        en: She will get married next year.
      - id: module-4-0016-s3
        text: Tahun depan kami pindah rumah baru.
        blank: tahun depan
        en: Next year we are moving to a new house.
  - id: module-4-0017
    indonesian: sarang
    english: nest
    audio: 272e6f666f5c.ogg
    note:
      en: "'Sarang' means nest (bird or insect); also used informally for a hideout or
        den; related: 'burung' (bird), 'lebah' (bee)."
    sentences:
      - id: module-4-0017-s1
        text: Burung itu membuat sarang di pohon.
        blank: sarang
        en: That bird makes a nest in the tree.
      - id: module-4-0017-s2
        text: Ada sarang lebah di dekat rumah.
        blank: sarang
        en: There is a beehive near the house.
      - id: module-4-0017-s3
        text: Anak-anak melihat sarang burung kecil.
        blank: sarang
        en: The children see a small bird's nest.
  - id: module-4-0018
    indonesian: seandainya
    english: what if, supposing, supposing that..., in the event that...
    audio: 3bb85872e3e7.ogg
    note:
      en: "'Seandainya' expresses hypothetical or wishful conditions (like 'if only /
        what if'); more formal/literary than 'kalau', often implies an unlikely
        or imagined scenario."
    sentences:
      - id: module-4-0018-s1
        text: Seandainya aku punya uang, aku beli.
        blank: Seandainya
        en: What if I had money, I would buy it.
      - id: module-4-0018-s2
        text: Seandainya cuaca bagus, kita ke pantai.
        blank: Seandainya
        en: If only the weather were nice, we'd go to the beach.
      - id: module-4-0018-s3
        text: Seandainya dia datang, aku senang.
        blank: Seandainya
        en: Supposing she came, I would be happy.
  - id: module-4-0019
    indonesian: selesai
    english: finished, completed (doing or making something), over,
    audio: fa7ebe687a41.ogg
    note:
      en: "\"Selesai\" means finished or over; it often follows \"sudah\" (already) to
        say something is done; don't confuse with \"habis\" which more often
        means 'run out of / used up'."
    sentences:
      - id: module-4-0019-s1
        text: Saya sudah selesai makan siang.
        blank: selesai
        en: I have already finished eating lunch.
      - id: module-4-0019-s2
        text: Pekerjaan rumah saya sudah selesai.
        blank: selesai
        en: My homework is already finished.
      - id: module-4-0019-s3
        text: Film itu selesai jam delapan malam.
        blank: selesai
        en: That movie is over at eight in the evening.
  - id: module-4-0020
    indonesian: sop
    english: soup
    audio: 9ab0d0927805.ogg
    note:
      en: '"Sop" is the common Indonesian spelling for soup, often seen on menus;
        related words include "soto" (a traditional spiced broth) and "kuah"
        (broth/gravy).'
    sentences:
      - id: module-4-0020-s1
        text: Saya makan sop ayam setiap hari.
        blank: sop
        en: I eat chicken soup every day.
      - id: module-4-0020-s2
        text: Sop ini panas dan enak sekali.
        blank: sop
        en: This soup is hot and very delicious.
      - id: module-4-0020-s3
        text: Ibu memasak sop untuk makan malam.
        blank: sop
        en: Mom cooks soup for dinner.
  - id: module-4-0021
    indonesian: berlibur
    english: to take a holiday, to go on vacation
    audio: 562be8b52a79.ogg
    note:
      en: "'Berlibur' is an informal/neutral verb meaning to vacation or holiday;
        closely related to 'liburan' (the noun: a holiday/vacation), commonly
        used in everyday speech."
    sentences:
      - id: module-4-0021-s1
        text: Kami berlibur ke Bali minggu depan.
        blank: berlibur
        en: We are going on vacation to Bali next week.
      - id: module-4-0021-s2
        text: Dia berlibur bersama keluarganya.
        blank: berlibur
        en: She is on holiday with her family.
      - id: module-4-0021-s3
        text: Saya ingin berlibur ke pantai.
        blank: berlibur
        en: I want to go on vacation to the beach.
  - id: module-4-0022
    indonesian: bulan
    english: moon, month
    audio: 25b7308fa793.ogg
    note:
      en: "'Bulan' means both 'moon' and 'month'; context usually makes the meaning
        clear."
    sentences:
      - id: module-4-0022-s1
        text: Bulan di langit sangat indah malam ini.
        blank: Bulan
        en: The moon in the sky is very beautiful tonight.
      - id: module-4-0022-s2
        text: Saya lahir pada bulan Januari.
        blank: bulan
        en: I was born in the month of January.
      - id: module-4-0022-s3
        text: Bulan ini kami pergi ke Bali.
        blank: Bulan
        en: This month we are going to Bali.
  - id: module-4-0023
    indonesian: bulan yang lalu
    english: last month
    audio: 52d1c10bb7ed.ogg
    note:
      en: "\"Bulan yang lalu\" means \"last month\"; use it after the main verb or at
        the start of a sentence; don't confuse with \"bulan lalu\" (same
        meaning, slightly more informal)."
    sentences:
      - id: module-4-0023-s1
        text: Saya pergi ke Bali bulan yang lalu.
        blank: bulan yang lalu
        en: I went to Bali last month.
      - id: module-4-0023-s2
        text: Bulan yang lalu, dia beli sepeda baru.
        blank: bulan yang lalu
        en: Last month, he bought a new bicycle.
      - id: module-4-0023-s3
        text: Kami makan di restoran itu bulan yang lalu.
        blank: bulan yang lalu
        en: We ate at that restaurant last month.
  - id: module-4-0024
    indonesian: hari Natal
    english: Christmas Day
    audio: afc67c2f0531.ogg
    note:
      en: "'Hari Natal' means Christmas Day; 'hari' means 'day', used similarly in
        'hari Minggu' (Sunday) and 'hari ulang tahun' (birthday); commonly
        celebrated in Indonesia despite Muslim majority."
    sentences:
      - id: module-4-0024-s1
        text: Kami merayakan hari Natal bersama keluarga.
        blank: hari Natal
        en: We celebrate Christmas Day with family.
      - id: module-4-0024-s2
        text: Hari Natal adalah hari yang menyenangkan.
        blank: hari Natal
        en: Christmas Day is a fun day.
      - id: module-4-0024-s3
        text: Saya suka hari Natal.
        blank: hari Natal
        en: I like Christmas Day.
  - id: module-4-0025
    indonesian: hari ulang tahun
    english: birthday
    audio: 1a30489a4007.ogg
    note:
      en: "'Hari ulang tahun' (lit. 'day returns year') is the standard term for
        birthday; often shortened to 'HUT' in writing or 'ulang tahun' in casual
        speech; related: 'selamat ulang tahun' means 'happy birthday'."
    sentences:
      - id: module-4-0025-s1
        text: Hari ini hari ulang tahun saya.
        blank: hari ulang tahun
        en: Today is my birthday.
      - id: module-4-0025-s2
        text: Selamat hari ulang tahun, Budi!
        blank: hari ulang tahun
        en: Happy birthday, Budi!
      - id: module-4-0025-s3
        text: Kita makan kue hari ulang tahun bersama.
        blank: hari ulang tahun
        en: We eat birthday cake together.
  - id: module-4-0026
    indonesian: kemerdekaan
    english: independence
    audio: 00cfd27a6295.ogg
    note:
      en: "'Kemerdekaan' means independence or freedom; commonly used for Indonesia's
        Independence Day (Hari Kemerdekaan); related: 'merdeka'
        (free/independent), 'bebas' (free/unrestricted)."
    sentences:
      - id: module-4-0026-s1
        text: Indonesia merayakan kemerdekaan setiap bulan Agustus.
        blank: kemerdekaan
        en: Indonesia celebrates independence every August.
      - id: module-4-0026-s2
        text: Hari kemerdekaan Indonesia sangat penting.
        blank: kemerdekaan
        en: Indonesia's independence day is very important.
      - id: module-4-0026-s3
        text: Kita harus menghargai kemerdekaan negara kita.
        blank: kemerdekaan
        en: We must appreciate our country's independence.
  - id: module-4-0027
    indonesian: merdeka
    english: independent
    audio: ced6f6ff9e8e.ogg
    note:
      en: "'Merdeka' means independent or free; used formally for national
        independence (Hari Merdeka) and informally to mean free/liberated;
        related: kemerdekaan (independence/noun)."
    sentences:
      - id: module-4-0027-s1
        text: Indonesia merdeka pada tanggal tujuh belas Agustus.
        blank: merdeka
        en: Indonesia became independent on the seventeenth of August.
      - id: module-4-0027-s2
        text: Hari ini adalah hari merdeka kita.
        blank: merdeka
        en: Today is our independence day.
      - id: module-4-0027-s3
        text: Kita harus bangga dengan negara merdeka ini.
        blank: merdeka
        en: We must be proud of this independent country.
  - id: module-4-0028
    indonesian: pindah
    english: to shift, to move
    audio: c3e957bd128f.ogg
    note:
      en: "'Pindah' means to move or relocate (house, seat, city); common in everyday
        speech; related words: 'pindahan' (moving/relocation), 'memindahkan' (to
        move something)."
    sentences:
      - id: module-4-0028-s1
        text: Saya mau pindah ke rumah baru.
        blank: pindah
        en: I want to move to a new house.
      - id: module-4-0028-s2
        text: Dia pindah ke Bali tahun lalu.
        blank: pindah
        en: She moved to Bali last year.
      - id: module-4-0028-s3
        text: Boleh saya pindah kursi di sini?
        blank: pindah
        en: May I move seats here?
  - id: module-4-0029
    indonesian: sering
    english: often
    audio: 85c1e78a25d7.ogg
    note:
      en: "'Sering' means 'often/frequently'; place it before the verb; related:
        'jarang' (rarely), 'selalu' (always), 'kadang-kadang' (sometimes)."
    sentences:
      - id: module-4-0029-s1
        text: Saya sering makan nasi goreng di sini.
        blank: sering
        en: I often eat fried rice here.
      - id: module-4-0029-s2
        text: Dia sering pergi ke pasar pagi.
        blank: sering
        en: She often goes to the morning market.
      - id: module-4-0029-s3
        text: Kami sering bermain di pantai.
        blank: sering
        en: We often play at the beach.
  - id: module-4-0030
    indonesian: Tahun Baru
    english: New Year
    audio: 10ad35163f85.ogg
    note:
      en: "'Tahun Baru' means 'New Year'; often paired with 'Selamat' (Happy) as
        'Selamat Tahun Baru'; do not confuse 'tahun' (year) with 'tahu' (tofu/to
        know)."
    sentences:
      - id: module-4-0030-s1
        text: Selamat Tahun Baru untuk semua orang!
        blank: Tahun Baru
        en: Happy New Year to everyone!
      - id: module-4-0030-s2
        text: Kami merayakan Tahun Baru bersama keluarga.
        blank: Tahun Baru
        en: We celebrate New Year together with family.
      - id: module-4-0030-s3
