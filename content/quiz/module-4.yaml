      - id: module-4-0081-s2
        text: Mana restoran yang enak di sini?
        blank: mana
        en: Which restaurant is good here?
      - id: module-4-0081-s3
        text: Kamu mau pergi ke mana?
        blank: mana
        en: Where do you want to go?
  - id: module-4-0082
    indonesian: masak!
    english: (informal) I don't believe you/it!, come off it!, you're kidding me!
    audio: 05e520fe4335.ogg
  - id: module-4-0083
    indonesian: membosankan (bosankan)
