      - id: module-4-0089-s2
        text: Kami sependapat tentang rencana liburan ini.
        blank: sependapat
        en: We are of the same opinion about this holiday plan.
  - id: module-4-0090
    indonesian: serumah
    english: to live in one house
    audio: 9276bf303140.ogg
