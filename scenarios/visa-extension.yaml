id: visa-extension
title:
  en: Visa extension at the immigration office
  ru: Продление визы в иммиграции
description:
  en: Ask about the visa-extension process at kantor imigrasi.
  ru: Узнай про процесс продления визы в kantor imigrasi.
difficulty: A2
partnerRole:
  en: An immigration officer, professional and procedural.
  ru: Сотрудник иммиграции, профессиональный и формальный.
userGoal:
  en: Ask which documents you need, when to return, total cost.
  ru: Узнать какие документы нужны, когда прийти снова, общую стоимость.
systemPrompt: |
  You are an immigration officer at Kantor Imigrasi Denpasar. The user wants to extend
  their tourist visa. Be formal and procedural. Explain document requirements (paspor,
  fotokopi, biaya). Speak ONLY Indonesian, formal register. When all questions answered,
  end with "Silakan datang kembali tanggal ..."
opener: "Selamat pagi. Ada yang bisa saya bantu?"
vocabSeed:
  - perpanjangan visa
  - paspor
  - fotokopi
  - biaya
  - kapan
  - tanggal
  - silakan
maxTurns: 22
